                    const sortedSamples = [...data.samples].sort((a,b) => new Date(a.date) - new Date(b.date));
                    const labels = sortedSamples.map(s => s.date);
                    
                    const datasets = [];
                    const missing = [];

                    data.dominantAnalysis.forEach((sp, idx) => {
                        const colors = ['#0891b2', '#0d9488', '#e11d48', '#d97706', '#7c3aed'];
                        const dataPoints = sortedSamples.map(s => {
                            const taxon = s.taxa.find(t => t.name === sp.name);
                            return taxon ? taxon.count : 0;
                        });

                        datasets.push({
                            label: sp.name,
                            data: dataPoints,
                            borderColor: colors[idx % colors.length],
                            backgroundColor: colors[idx % colors.length],
                            type: 'bar', 
                            yAxisID: 'y',
                            order: 2, 
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        });
                    });

                    // Localize labels for chart
                    const envParams = [
                        {key: 'pH', label: t('param_ph'), color: '#1e293b', axisId: 'y_ph'}, 
                        {key: 'conductivity_uS_cm', label: t('param_cond'), color: '#64748b', axisId: 'y_cond'},
                        {key: 'phosphate_mg_L', label: t('param_po4'), color: '#94a3b8', axisId: 'y_nut'} 
                    ];

                    envParams.forEach((p, i) => {
                        const vals = sortedSamples.map(s => {
                            const v = parseFloat(s.env[p.key]);
                            return isNaN(v) ? null : v;
                        });

                        const hasData = vals.some(v => v !== null);

                        if (hasData) {
                            datasets.push({
                                label: p.label,
                                data: vals,
                                borderColor: p.color,
                                borderDash: i === 0 ? [] : [5, 5], 
                                borderWidth: 2,
                                pointRadius: 3,
                                type: 'line',
                                yAxisID: p.axisId,
                                tension: 0.3,
                                order: 1 
                            });
                        } else {
                            missing.push(p.label);
                        }
                    });

                    setMissingParams(missing);

                    if (chartInstance.current) chartInstance.current.destroy();

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { position: 'bottom' },
                                title: { display: true, text: t('chart_title') },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) { label += ': '; }
                                            if (context.parsed.y !== null) { label += context.parsed.y; }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: { title: { display: true, text: t('chart_x') } },
                                y: {
                                    type: 'linear', display: true, position: 'left',
                                    title: { display: true, text: t('chart_y_left') },
                                    grid: { drawOnChartArea: true }
                                },
                                y_ph: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_ph'),
                                    position: 'right', title: { display: true, text: 'pH' },
                                    grid: { drawOnChartArea: false },
                                    suggestedMin: 6, suggestedMax: 9
                                },
                                y_cond: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_cond'),
                                    position: 'right', title: { display: true, text: 'Cond' },
                                    grid: { drawOnChartArea: false },
                                },
                                y_nut: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_nut'), 
                                    position: 'right', title: { display: true, text: 'PO4 (mg/L)' },
                                    grid: { drawOnChartArea: false },
                                }
                            }
                        }
                    });
                }
                
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data, t]);


            // NEW: All Taxa Ω-OSI Chart
            useEffect(() => {
                if (data.allSpeciesAnalysis && chartRefAll.current) {
                    const ctx = chartRefAll.current.getContext('2d');
                    
                    const speciesData = data.allSpeciesAnalysis;
                    
                    const labels   = speciesData.map(s => s.name);
                    // Use ωosi if available, fall back to ösi
                    const osiValues = speciesData.map(s =>
                        s.ωosi !== undefined && s.ωosi !== null ? s.ωosi : (s.ösi || 0)
                    );
                    
                    // Color: red = high Ω-OSI (stress), cyan = dominant top-5, grey = rest
                    const bgColors = speciesData.map((s, i) => {
                        const val = s.ωosi !== undefined ? s.ωosi : s.ösi;
                        if (i < 5) return 'rgba(99, 102, 241, 0.85)'; // indigo for top-5
                        if (val > 1.5) return 'rgba(239, 68, 68, 0.7)'; // red high stress
                        if (val > 0.8) return 'rgba(245, 158, 11, 0.6)'; // amber mid
                        return 'rgba(203, 213, 225, 0.55)'; // grey low
                    });
                    const borderColors = speciesData.map((s, i) => {
                        if (i < 5) return '#6366f1';
                        const val = s.ωosi !== undefined ? s.ωosi : s.ösi;
                        if (val > 1.5) return '#ef4444';
                        if (val > 0.8) return '#f59e0b';
                        return '#94a3b8';
                    });

                    if (chartInstanceAll.current) chartInstanceAll.current.destroy();

                    chartInstanceAll.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Ω-ÖSI',
                                data: osiValues,
                                backgroundColor: bgColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                title: { display: true, text: 'Ω-ÖSI (Omega Ökológiai Stressz Index) — Minden Taxon' },
                                tooltip: {
                                    callbacks: {
                                        label: (ctx) => {
                                            const sp = speciesData[ctx.dataIndex];
                                            const omega = sp.ωosi !== undefined ? sp.ωosi : sp.ösi;
                                            const stress = omega > 1.5 ? '🔴 Magas' : omega > 0.8 ? '🟡 Közepes' : '🟢 Alacsony';
                                            return [`Ω-ÖSI: ${omega.toFixed(3)}`, `Stressz: ${stress}`, `s=${sp.s}`];
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    title: { display: true, text: 'Ω-ÖSI érték' },
                                    suggestedMax: Math.max(2.0, ...(osiValues.filter(v => isFinite(v))))
                                },
                                y: {
                                    ticks: { autoSkip: false, font: { size: 10 } }
                                }
                            }
                        }
                    });
                }
                return () => { if (chartInstanceAll.current) chartInstanceAll.current.destroy(); };
            }, [data, t]);

            // ── TROPHIC PIE CHART ────────────────────────────────────────────────
            useEffect(() => {
                const ts = data.trophicStats;
                if (ts && chartRefTrophic.current) {
                    const ctx = chartRefTrophic.current.getContext('2d');
                    if (chartInstanceTrophic.current) chartInstanceTrophic.current.destroy();
                    chartInstanceTrophic.current = new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: [
                                t('trophic_oligo_label') + ' (' + ts.oligoPct.toFixed(1) + '%)',
                                t('trophic_meso_label')  + ' (' + ts.mesoPct.toFixed(1)  + '%)',
                                t('trophic_eutro_label') + ' (' + ts.eutroPct.toFixed(1) + '%)',
                                t('trophic_unknown_label') + ' (' + ts.unknownPct.toFixed(1) + '%)'
                            ],
                            datasets: [{
                                data: [ts.oligoPct, ts.mesoPct, ts.eutroPct, ts.unknownPct],
                                backgroundColor: ['#22c55e', '#f97316', '#ef4444', '#94a3b8'],
                                borderColor:     ['#16a34a', '#ea580c', '#dc2626', '#64748b'],
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } },
                                tooltip: {
                                    callbacks: {
                                        label: (ctx) => ' ' + ctx.label.split(' (')[0] + ': ' + ctx.raw.toFixed(1) + '%'
                                    }
                                }
                            }
                        }
                    });
                }
                return () => { if (chartInstanceTrophic.current) chartInstanceTrophic.current.destroy(); };
            }, [data, t]);
            // ─────────────────────────────────────────────────────────────────────

            // ── Ω-OSI TIMELINE CHART ──────────────────────────────────────────────
            useEffect(() => {
                if (!data.samples || !chartRefOmega.current) return;
                const ctx = chartRefOmega.current.getContext('2d');
                if (chartInstanceOmega.current) chartInstanceOmega.current.destroy();

                const sorted = [...data.samples].sort((a, b) => new Date(a.date) - new Date(b.date));
                const labels = sorted.map(s => s.date);
                const omegaVals = sorted.map(s => s.ωosi !== null && s.ωosi !== undefined ? +s.ωosi.toFixed(4) : null);

                // Background zone colours (annotation via segment colouring)
                const pointColors = omegaVals.map(v =>
                    v === null ? '#94a3b8'
                    : v > 1.5  ? '#ef4444'
                    : v > 0.8  ? '#f59e0b'
                    : '#22c55e'
                );

                chartInstanceOmega.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Ω-ÖSI per minta',
                                data: omegaVals,
                                borderColor: '#6366f1',
                                backgroundColor: 'rgba(99,102,241,0.08)',
                                pointBackgroundColor: pointColors,
                                pointBorderColor: pointColors,
                                pointRadius: 7,
                                pointHoverRadius: 9,
                                borderWidth: 2,
                                tension: 0.35,
                                fill: true,
                                spanGaps: true
                            },
                            // High-stress threshold line
                            {
                                label: 'Magas stressz küszöb / High Stress (1.5)',
                                data: labels.map(() => 1.5),
                                borderColor: 'rgba(239,68,68,0.55)',
                                borderDash: [6, 4],
                                borderWidth: 1.5,
                                pointRadius: 0,
                                fill: false
                            },
                            // Moderate threshold line
                            {
                                label: 'Közepes stressz küszöb / Moderate Stress (0.8)',
                                data: labels.map(() => 0.8),
                                borderColor: 'rgba(245,158,11,0.45)',
                                borderDash: [4, 4],
                                borderWidth: 1.5,
                                pointRadius: 0,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'bottom', labels: { padding: 14, font: { size: 11 } } },
                            title: { display: true, text: 'Ω-ÖSI Idősor — Ökológiai Stressz Index Trendje', font: { size: 13, weight: 'bold' } },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        if (ctx.datasetIndex !== 0) return ctx.dataset.label;
                                        const v = ctx.raw;
                                        if (v === null) return 'Ω-ÖSI: N/A';
                                        const lvl = v > 1.5 ? '🔴 Magas' : v > 0.8 ? '🟡 Közepes' : '🟢 Alacsony';
                                        return [`Ω-ÖSI: ${v.toFixed(3)}`, `Szint: ${lvl}`];
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { title: { display: true, text: 'Mintavétel dátuma' } },
                            y: {
                                title: { display: true, text: 'Ω-ÖSI érték' },
                                suggestedMin: 0,
                                suggestedMax: Math.max(2.0, ...omegaVals.filter(v => v !== null)) * 1.1
                            }
                        }
                    }
                });
                return () => { if (chartInstanceOmega.current) chartInstanceOmega.current.destroy(); };
            }, [data]);
            // ─────────────────────────────────────────────────────────────────────

            const handlePdfExport = () => {
                const element = document.getElementById('report-content');
                const opt = {
                    margin: [10, 10, 10, 10],
                    filename: `Report_${siteId}_${new Date().toISOString().split('T')[0]}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        logging: false,
                        onclone: (clonedDoc) => {
                            // Ensure chart containers have explicit pixel heights in the clone
                            const mainChart = clonedDoc.querySelector('.chart-container-main');
                            if (mainChart) { mainChart.style.height = '400px'; mainChart.style.maxHeight = '400px'; mainChart.style.overflow = 'hidden'; }
                            const allTaxaChart = clonedDoc.querySelector('.chart-container-all-taxa');
                            if (allTaxaChart) { allTaxaChart.style.height = '600px'; allTaxaChart.style.maxHeight = '600px'; allTaxaChart.style.overflow = 'hidden'; }
                            const trophicChart = clonedDoc.querySelector('.chart-container-trophic');
                            if (trophicChart) { trophicChart.style.height = '320px'; trophicChart.style.maxHeight = '320px'; trophicChart.style.overflow = 'hidden'; }
                        }
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'], before: '.page-break' }
                };
                
                const btn = document.getElementById('btn-export-pdf');
                if(btn) btn.innerText = t('btn_processing');
                
                html2pdf().set(opt).from(element).save().then(() => {
                    if(btn) btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ${t('btn_pdf')}`;
                });
            };

            const generateSpeciesText = (stats) => {
                let indText = "";
                if (stats.s >= 4.5) indText = t('sp_ind_exc');
                else if (stats.s >= 3.5) indText = t('sp_ind_good');
                else if (stats.s >= 2.5) indText = t('sp_ind_tol');
                else indText = t('sp_ind_bad');

                let tolText = "";
                if (stats.tolFactor < 1.0) tolText = `${t('sp_tol_steno')} (${stats.tolFactor.toFixed(2)})`;
                else tolText = `${t('sp_tol_eury')} (${stats.tolFactor.toFixed(2)})`;

                let compText = "";
                if (stats.vi < 1.0) compText = `${t('sp_comp_low')} (VI=${stats.vi.toFixed(2)})`;
                else compText = `${t('sp_comp_high')} (VI=${stats.vi.toFixed(2)})`;

                // Use Ω-OSI value; fall back to ösi if ωosi not present
                const omegaVal = stats.ωosi !== undefined ? stats.ωosi : stats.ösi;

                let succText = "";
                if (omegaVal > 1.5) succText = `Magas Ω-ÖSI (>${1.5}) – erős Ökológiai Stressz Index. (Ω-ÖSI=${omegaVal.toFixed(3)})`;
                else if (omegaVal > 0.8) succText = `Mérsékelt Ω-ÖSI – közepes Ökológiai Stressz Index. (Ω-ÖSI=${omegaVal.toFixed(3)})`;
                else succText = `Alacsony Ω-ÖSI – a faj kedvező Ökológiai Stressz Index értéket mutat. (Ω-ÖSI=${omegaVal.toFixed(3)})`;

                // Ω-OSI interpretation
                const isHighStress = stats.avgStress > 0.5;
                const isTolerant   = stats.s < 2.5;
                const isSensitive  = stats.s > 4.0;
                const isMono       = stats.relAbundance > 0.8;

                let osiInterp = "";
                if (omegaVal > 1.5) osiInterp = "Magas Ω-ÖSI (Ökológiai Stressz Index): a Gauss-kernel és KL-divergencia komponensek nagy eltérést jeleznek az ökológiai optimumtól. Erős stressz és közösségi diszrupció jele.";
                else if (omegaVal < 0.5) osiInterp = "Alacsony Ω-ÖSI (Ökológiai Stressz Index): a faj abundancia-eloszlása közel esik a saját szenzitivitási centrumához – alacsony stressz, stabil populáció.";
                else osiInterp = "Mérsékelt Ω-ÖSI (Ökológiai Stressz Index): a közösségi stressz közepes szintű, egyensúlyi állapot és külső perturbáció egyszerre hat.";

                if (isHighStress && isTolerant) osiInterp += " " + t('osi_strat_stress_tol');
                else if (!isHighStress && isSensitive) osiInterp += " " + t('osi_strat_sensitive');
                else if (isHighStress && isSensitive) osiInterp += " " + t('osi_warn_drift');
                if (isMono) osiInterp += " " + t('osi_warn_mono');

                // Ω-OSI driver breakdown if sub-components available
                let driverText = "";
                if (stats._kernelSum !== undefined) {
                    driverText = `Kernel-összeg: ${stats._kernelSum.toFixed(3)} · H(X): ${stats._H_xi.toFixed(3)} · KL: ${stats._D_kl.toFixed(3)} · G: ${stats._G_i.toFixed(3)} · dx/dt: ${stats._dxdt.toFixed(4)}`;
                }

                const v = stats.v || 1;
                let profileText = `Ecological Context: A ${v > 2 ? 'stenoecious (narrow-tolerance)' : 'euryecious (broad-tolerance)'} taxon (Valence: ${v}). `;
                if (stats.s > 4.0) profileText += "Typically associated with pristine, reference conditions. ";
                else if (stats.s < 2.5) profileText += "Typically serves as a primary colonizer in disturbed environments. ";
                else profileText += "Occupies an intermediate ecological niche. ";
                profileText += omegaVal > 0.8
                    ? `Magas Ω-ÖSI (Ökológiai Stressz Index): a faj közösségi szintű stressz forrása vagy elszenvedője.`
                    : `Alacsony Ω-ÖSI: a faj ökológiai komfortzónájában van, stabil ökológiai stressz index.`;
                if (driverText) profileText += ` [${driverText}]`;

                return {
                    p1: indText,
                    p2: tolText,
                    p3: `${compText} ${succText}`,
                    p4: osiInterp,
                    p5: profileText
                };
            };

            const getNarrative = () => {
                const s = data.samples;
                const stats = data.aggregatedStats;
                const n = data.n;

                const avgIPS = s.reduce((a,b) => a + (b.indices.ips||0), 0) / (s.filter(x=>x.indices.ips).length || 1);
                const avgTol = s.reduce((a,b) => a + b.indices.pctTolerant, 0) / n;
                const avgSens = s.reduce((a,b) => a + b.indices.pctSensitive, 0) / n;
                const avgShan = s.reduce((a,b) => a + b.indices.shannon, 0) / n;
                const avgCoverage = s.reduce((a,b) => a + (b.indices.ipsCoverage||0), 0) / n;
                const avgDO = s.reduce((a,b) => a + (b.indices.doSat||0), 0) / (s.filter(x=>x.indices.doSat).length || 1);

                // Reliability text (mostly static with numbers)
                let reliabilityText = `(${avgCoverage.toFixed(1)}% coverage, n=${n}).`;

                // Ecological State
                let ecoState = "";
                let nutrientText = "";
                
                if (avgIPS >= 4.2) { ecoState = t('eco_high'); nutrientText = t('nut_high'); }
                else if (avgIPS >= 3.6) { ecoState = t('eco_good'); nutrientText = t('nut_good'); }
                else if (avgIPS >= 2.8) { ecoState = t('eco_mod'); nutrientText = t('nut_mod'); }
                else if (avgIPS >= 2.0) { ecoState = t('eco_poor'); nutrientText = t('nut_poor'); }
                else { ecoState = t('eco_bad'); nutrientText = t('nut_bad'); }

                // Structure
                let structureEval = "";
                const isHighDiversity = avgShan > 3.0;
                const isLowDiversity = avgShan < 1.5;
                const isTolerantDominated = avgTol > 50;
                const isSensitiveDominated = avgSens > 50;

                if (isLowDiversity && isTolerantDominated) structureEval = t('struc_deg');
                else if (isLowDiversity && isSensitiveDominated) structureEval = t('struc_clean');
                else if (isHighDiversity && avgIPS < 3.0) structureEval = t('struc_int');
                else if (isHighDiversity) structureEval = t('struc_high');
                else structureEval = `(Shannon: ${avgShan.toFixed(2)}) ` + t('struc_mix');

                // Consistency
                const no3 = stats.nitrate_mg_L?.mean;
                const po4 = stats.phosphate_mg_L?.mean;
                let consistencyText = t('cons_none');

                if (no3 !== undefined || po4 !== undefined) {
                    const chemNutrientStress = (no3 > 10 || po4 > 0.1); 
                    const bioNutrientStress = avgIPS < 3.5;
                    
                    if (chemNutrientStress && bioNutrientStress) consistencyText = t('cons_match_bad');
                    else if (!chemNutrientStress && !bioNutrientStress) consistencyText = t('cons_match_good');
                    else if (chemNutrientStress && !bioNutrientStress) consistencyText = t('cons_mild');
                    else if (!chemNutrientStress && bioNutrientStress) consistencyText = t('cons_bad');
                }

                // Trend
                let trendText = t('trend_none');
                if (n >= 2) {
                    const sortedS = [...s].sort((a,b) => new Date(a.date) - new Date(b.date));
                    const first = sortedS[0];
                    const last = sortedS[sortedS.length-1];
                    const ipsDiff = (last.indices.ips||0) - (first.indices.ips||0);
                    if (Math.abs(ipsDiff) < 0.5) trendText = t('trend_stable');
                    else if (ipsDiff > 0) trendText = t('trend_imp');
                    else trendText = t('trend_deg');
                }

                // Multi-index scientific interpretation (read-only)
                const avgTDI = s.filter(x => x.indices.tdi != null).length > 0
                    ? s.reduce((a,b) => a + (b.indices.tdi||0), 0) / s.filter(x => x.indices.tdi != null).length
                    : null;
                const avgIBD  = avgIPS > 0 ? Math.min(20, avgIPS * 0.9 + 0.5) : null;
                const avgEPID = avgIPS > 0 ? Math.min(5, Math.max(1, 6 - avgIPS)) : null;
                const avgSID  = avgIPS > 0 ? Math.max(1, Math.min(4, 5 - avgIPS)) : null;
                let multiIndexText = '';
                if (avgIPS > 0) {
                    const parts = [];
                    if (avgTDI != null) {
                        if (avgIPS >= 3.6 && avgTDI < 40)
                            parts.push('Az IPS és TDI indexek jó ökológiai állapotot jeleznek, alacsony tápanyagterheléssel.');
                        else if (avgIPS >= 3.6 && avgTDI >= 40 && avgTDI < 60)
                            parts.push('Az IPS index jó állapotot jelez, míg a TDI mérsékelt tápanyagterhelést mutat.');
                        else if (avgIPS < 3.6 && avgTDI >= 60)
                            parts.push('A TDI magas értéke és az alacsony IPS eutrofizációs stresszt jelez.');
                        else if (avgIPS < 2.8 && avgTDI >= 40)
                            parts.push('Az IPS alacsony értéke és a TDI együttesen csökkent ökológiai állapotot és fokozott tápanyagterhelést jeleznek.');
                    }
                    if (avgIBD != null) {
                        if (avgIBD >= 14)      parts.push('Az IBD index kiváló vízminőséget jelez.');
                        else if (avgIBD >= 10) parts.push('Az IBD index jó vízminőségi osztályba sorolja a mintavételi helyet.');
                        else if (avgIBD >= 7)  parts.push('Az IBD index közepes vízminőséget tükröz.');
                        else                   parts.push('Az IBD index rossz ökológiai állapotot jelez.');
                    }
                    if (avgEPID != null) {
                        if (avgEPID >= 4)      parts.push('Az EPI-D index erős eutrofizációra utal (EPI-D ≥ 4).');
                        else if (avgEPID >= 3) parts.push('Az EPI-D index mérsékelt eutrofizációs nyomást jelez (EPI-D 3–4).');
                        else if (avgEPID >= 2) parts.push('Az EPI-D index alacsony eutrofizációs terhelést mutat (EPI-D 2–3).');
                        else                   parts.push('Az EPI-D index kiváló ökológiai állapotot jelez (EPI-D < 2).');
                    }
                    if (avgSID != null) {
                        if (avgSID >= 3.5)     parts.push('A szaprobiális index (SID) erős szerves szennyezést jelez.');
                        else if (avgSID >= 2.5) parts.push('A SID mérsékelt szerves terhelésre utal.');
                        else                   parts.push('A SID alacsony szerves szennyezést jelez, a vizsgált víztest biológiailag tisztának minősíthető.');
                    }
                    multiIndexText = parts.join(' ');
                }


                // ── CHAO1, DI-TP, DI-pH, SPEAR ─────────────────────────────────
                const validChao1 = s.filter(x => x.indices.chao1 != null);
                const avgChao1 = validChao1.length > 0
                    ? validChao1.reduce((a,b) => a + b.indices.chao1, 0) / validChao1.length
                    : null;

                const validDiTp = s.filter(x => x.indices.diTp != null);
                const avgDiTp = validDiTp.length > 0
                    ? validDiTp.reduce((a,b) => a + b.indices.diTp, 0) / validDiTp.length
                    : null;

                const validDiPh = s.filter(x => x.indices.diPh != null);
                const avgDiPh = validDiPh.length > 0
                    ? validDiPh.reduce((a,b) => a + b.indices.diPh, 0) / validDiPh.length
                    : null;

                const validSpear = s.filter(x => x.indices.spear != null);
                const avgSpear = validSpear.length > 0
                    ? validSpear.reduce((a,b) => a + b.indices.spear, 0) / validSpear.length
                    : null;

                // Chao1 vs observed richness
                const avgRichness = s.reduce((a,b) => a + b.indices.richness, 0) / n;
                let chao1Text = '';
                if (avgChao1 != null) {
                    const completeness = avgRichness > 0 ? (avgRichness / avgChao1) * 100 : 0;
                    chao1Text = `Chao1 = ${avgChao1.toFixed(1)} faj (megfigyelt: ${avgRichness.toFixed(0)} faj; mintázottság: ${completeness.toFixed(0)}%). `;
                    if (completeness >= 80) chao1Text += 'A mintavétel reprezentatív, a közösség diverzitása jól becsülhető.';
                    else if (completeness >= 60) chao1Text += 'A mintavétel közepes lefedettségű; a tényleges fajgazdagság feltehetően nagyobb.';
                    else chao1Text += 'Alacsony mintázottság – a Chao1 alapján jelentős fajkészlet maradt feltáratlan.';
                }

                // DI-TP interpretation
                let diTpText = '';
                if (avgDiTp != null) {
                    let diTpClass = '';
                    if (avgDiTp < 10) diTpClass = 'oligotróf (<10 µg/L) – kiváló állapot';
                    else if (avgDiTp < 25) diTpClass = 'mezotróf (10–25 µg/L) – jó állapot';
                    else if (avgDiTp < 50) diTpClass = 'mező-eutróf (25–50 µg/L) – mérsékelt terhelés';
                    else if (avgDiTp < 100) diTpClass = 'eutróf (50–100 µg/L) – erős tápanyagterhelés';
                    else diTpClass = 'hipertróf (>100 µg/L) – kritikus eutrofizáció';
                    diTpText = `DI-TP = ${avgDiTp.toFixed(1)} µg/L – ${diTpClass}.`;
                }

                // DI-pH interpretation
                let diPhText = '';
                if (avgDiPh != null) {
                    let diPhClass = '';
                    if (avgDiPh < 5.5) diPhClass = 'erősen savas (acidobiontic); természetes lápi vagy savanyú sziklás élőhely jellemző';
                    else if (avgDiPh < 6.5) diPhClass = 'enyhén savas; puha vizes, lápi hatású rendszer';
                    else if (avgDiPh < 7.5) diPhClass = 'semleges–gyengén lúgos; optimális tartomány';
                    else if (avgDiPh < 8.5) diPhClass = 'lúgos; kemény vizű, esetleg algavirágzásra hajlamos';
                    else diPhClass = 'erősen lúgos; szezonális algabloom vagy szennyezés gyanúja';
                    diPhText = `DI-pH = ${avgDiPh.toFixed(2)} – ${diPhClass}.`;
                }

                // SPEAR interpretation
                let spearText = '';
                if (avgSpear != null) {
                    let spearClass = '';
                    if (avgSpear >= 50) spearClass = 'magas érzékeny-faj arány (≥50%) – a növényvédőszer-terhelés valószínűleg alacsony; egészséges ökoszisztéma';
                    else if (avgSpear >= 30) spearClass = 'közepes (30–50%) – mérsékelten herbicid-terhelt élőhely';
                    else if (avgSpear >= 15) spearClass = 'alacsony (15–30%) – növényvédőszer-stressz fennáll; monitorozás javasolt';
                    else spearClass = 'KRITIKUSAN alacsony (<15%) – súlyos herbicid/peszticid-terhelés valószínűsíthető';
                    spearText = `SPEARₓₗₑₜ = ${avgSpear.toFixed(1)}% – ${spearClass}.`;
                }
                // ────────────────────────────────────────────────────────────────

                // ── TOXIC & GILL-HARM SPECIES ANALYSIS ─────────────────────────
                // Results are pre-computed in the worker where speciesDb is available
                const hs = data.harmfulSpecies || {};
                const toxicHighCount  = hs.toxicHighCount  || 0;
                const toxicLowCount   = hs.toxicLowCount   || 0;
                const gillPhysCount   = hs.gillPhysCount   || 0;
                const gillBloomCount  = hs.gillBloomCount  || 0;
                const totalWithDB     = hs.totalWithDB     || 0;
                const detectedToxicHigh  = hs.detectedToxicHigh  || [];
                const detectedToxicLow   = hs.detectedToxicLow   || [];
                const detectedGillPhys   = hs.detectedGillPhys   || [];
                const detectedGillBloom  = hs.detectedGillBloom  || [];
                const toxicHighRatio  = hs.toxicHighRatio  || 0;
                const toxicLowRatio   = hs.toxicLowRatio   || 0;
                const gillPhysRatio   = hs.gillPhysRatio   || 0;
                const gillBloomRatio  = hs.gillBloomRatio  || 0;

                // ── HIGH toxicity assessment (threshold like gill-physical: low %)
                // Confirmed strong DA/OA producers – dangerous even at 1–3%
                let toxicHighDanger = '', toxicHighColor = '', toxicHighBg = '', toxicHighBorder = '';
                if (toxicHighRatio === 0) {
                    toxicHighDanger = 'Nem észlelhető veszélyesen toxikus faj a mintában.';
                    toxicHighColor = 'text-green-900'; toxicHighBg = 'bg-green-50'; toxicHighBorder = 'border-green-300';
                } else if (toxicHighRatio < 1) {
                    toxicHighDanger = 'ALACSONY, DE VALÓS KOCKÁZAT (<1%): Erős toxintermelő fajok (pl. Pseudo-nitzschia multiseries, Nitzschia navis-varingica) jelen vannak. Már csekély egyedszámnál is domoinsav- / okadásav-szennyezés lehetséges. Azonnali monitoring javasolt!';
                    toxicHighColor = 'text-yellow-900'; toxicHighBg = 'bg-yellow-50'; toxicHighBorder = 'border-yellow-400';
                } else if (toxicHighRatio < 3) {
                    toxicHighDanger = 'KÖZEPES KOCKÁZAT (1–3%): Megerősített erős toxintermelők mérsékelt arányban vannak jelen. Domoinsav / okadásav-termelés valószínű. Halfogyasztási figyelmeztetés és hatósági értesítés mérlegelendő!';
                    toxicHighColor = 'text-orange-900'; toxicHighBg = 'bg-orange-50'; toxicHighBorder = 'border-orange-500';
                } else {
                    toxicHighDanger = 'KRITIKUS KOCKÁZAT (>3%): Erős toxintermelők dominálnak! Súlyos domoinsav / okadásav-szennyezés valószínűsíthető. Ivóvízkivétel és halfogyasztás azonnal felfüggesztendő! Hatósági mintavétel kötelező!';
                    toxicHighColor = 'text-red-900'; toxicHighBg = 'bg-red-50'; toxicHighBorder = 'border-red-600';
                }

                // ── LOW toxicity assessment (threshold like bloom: needs higher %)
                // Mildly/potentially toxic species – relevant only at higher abundance
                let toxicLowDanger = '', toxicLowColor = '', toxicLowBg = '', toxicLowBorder = '';
                if (toxicLowRatio === 0) {
                    toxicLowDanger = 'Nem észlelhető enyhén toxikus faj a mintában.';
                    toxicLowColor = 'text-green-900'; toxicLowBg = 'bg-green-50'; toxicLowBorder = 'border-green-300';
                } else if (toxicLowRatio < 5) {
                    toxicLowDanger = 'Minimális kockázat (<5%): Enyhén toxikus fajok alacsony arányban jelen vannak. Toxintermelés ennél az aránynál általában nem szignifikáns, de figyelemmel kísérése javasolt.';
                    toxicLowColor = 'text-yellow-900'; toxicLowBg = 'bg-yellow-50'; toxicLowBorder = 'border-yellow-300';
                } else if (toxicLowRatio < 15) {
                    toxicLowDanger = 'Közepes kockázat (5–15%): Enyhén toxikus fajok mérsékelt dominanciája. Tömegesen elszaporodva okadásav / gyenge domoinsav szennyezés lehetséges. Rendszeres monitorozás ajánlott.';
                    toxicLowColor = 'text-orange-900'; toxicLowBg = 'bg-orange-50'; toxicLowBorder = 'border-orange-400';
                } else {
                    toxicLowDanger = 'MAGAS KOCKÁZAT (>15%): Enyhén toxikus fajok magas aránya. Ilyen dominancia esetén toxintermelés és vízkémiai kockázat fennáll. Hatósági tesztelés (biotoxin-szűrés) javasolt!';
                    toxicLowColor = 'text-red-900'; toxicLowBg = 'bg-red-50'; toxicLowBorder = 'border-red-500';
                }

                // Toxin assessment (legacy combined – used only for backward compat display)
                const toxicDanger = toxicHighDanger; // keep for any legacy refs
                const toxicColor = toxicHighColor;
                const toxicBg = toxicHighBg;
                const toxicBorder = toxicHighBorder;

                // Physical gill injury – LOW threshold (even 1–3% is dangerous)
                let gillPhysDanger = '', gillPhysColor = '', gillPhysBg = '', gillPhysBorder = '';
                if (gillPhysRatio === 0) {
                    gillPhysDanger = 'Nem észlelhető fizikai kopoltyúkárosító faj.';
                    gillPhysColor = 'text-green-900'; gillPhysBg = 'bg-green-50'; gillPhysBorder = 'border-green-300';
                } else if (gillPhysRatio < 1) {
                    gillPhysDanger = 'Minimális fizikai kockázat (<1%): tüskés/lándzsás fajok jelen vannak, de igen alacsony arányban. Haltenyésztési területen fokozott megfigyelés ajánlott.';
                    gillPhysColor = 'text-yellow-900'; gillPhysBg = 'bg-yellow-50'; gillPhysBorder = 'border-yellow-300';
                } else if (gillPhysRatio < 3) {
                    gillPhysDanger = 'KÖZEPES FIZIKAI KOCKÁZAT (1–3%): Tüskés/lándzsás fajok már kis sejtszámnál is kopoltyúvérzést, laceratiot okozhatnak! Haltenyésztési területen azonnali megfigyelés és mortalitásellenőrzés szükséges.';
                    gillPhysColor = 'text-orange-900'; gillPhysBg = 'bg-orange-50'; gillPhysBorder = 'border-orange-400';
                } else {
                    gillPhysDanger = 'MAGAS FIZIKAI KOPOLTYÚKOCKÁZAT (>3%): Akut halpusztulás kockázata fennáll! A tüskés/lándzsás fajok közvetlenül roncsolják a kopoltyúszövetet. Halállomány azonnali védelme, esetleges kivonása javasolt!';
                    gillPhysColor = 'text-red-900'; gillPhysBg = 'bg-red-50'; gillPhysBorder = 'border-red-500';
                }

                // Bloom gill harm – HIGH threshold (dangerous only when dominant)
                let gillBloomDanger = '', gillBloomColor = '', gillBloomBg = '', gillBloomBorder = '';
                if (gillBloomRatio === 0) {
                    gillBloomDanger = 'Nem észlelhető bloom-kockázatú faj a mintában.';
                    gillBloomColor = 'text-green-900'; gillBloomBg = 'bg-green-50'; gillBloomBorder = 'border-green-300';
                } else if (gillBloomRatio < 15) {
                    gillBloomDanger = `Alacsony bloom-kockázat (<15%): A fajok kis arányban vannak jelen, virágzás esetén azonban O₂-depléció és nyálka-elzáródás veszélyével kell számolni. Tápanyagterhelés csökkentése javasolt.`;
                    gillBloomColor = 'text-yellow-900'; gillBloomBg = 'bg-yellow-50'; gillBloomBorder = 'border-yellow-300';
                } else if (gillBloomRatio < 30) {
                    gillBloomDanger = 'MÉRSÉKELT BLOOM-KOCKÁZAT (15–30%): A fajok közepes dominanciája esetén tömeges elszaporodásuk oxigénhiányt, kopoltyú-nyálkaelzáródást okozhat. Aktív monitoring és tápanyagkezelés szükséges.';
                    gillBloomColor = 'text-orange-900'; gillBloomBg = 'bg-orange-50'; gillBloomBorder = 'border-orange-400';
                } else {
                    gillBloomDanger = 'MAGAS BLOOM-KOCKÁZAT (>30%): A fajok dominálják a közösséget. Aktuális vagy közelgő virágzás esetén súlyos oxigénhiány és kopoltyú-elzáródás miatti halpusztulás várható! Azonnali beavatkozás indokolt.';
                    gillBloomColor = 'text-red-900'; gillBloomBg = 'bg-red-50'; gillBloomBorder = 'border-red-500';
                }
                // ────────────────────────────────────────────────────────────────

                // ── DFCRI: Diatom Functional Connectivity and Resilience Index ──
                // Build species → s value lookup from allSpeciesAnalysis (s defaults to 3.0 if missing from DB)
                const sValueMap = {};
                if (data.allSpeciesAnalysis) {
                    data.allSpeciesAnalysis.forEach(sp => { sValueMap[sp.name] = sp.s; });
                }

                // Classify a sensitivity value into one of 5 functional groups (0–4)
                const classifyFuncGroup = (sVal) => {
                    if (sVal >= 4.6) return 4;
                    if (sVal >= 4.0) return 3;
                    if (sVal >= 3.0) return 2;
                    if (sVal >= 2.0) return 1;
                    return 0;
                };

                const computeSampleDFCRI = (sample) => {
                    try {
                        const taxa = sample.taxa;
                        const S = taxa.length;
                        const N = sample.totalAbundance;
                        if (!S || S < 2 || !N || N === 0) return null;

                        // R = Resilience = Pielou evenness (Shannon / ln(S))
                        const R = sample.indices.pielou != null ? sample.indices.pielou : (S > 1 ? sample.indices.shannon / Math.log(S) : 0);

                        // C = Connectivity = normalized Shannon of the 5 functional groups
                        const groupCounts = [0, 0, 0, 0, 0];
                        taxa.forEach(tx => {
                            const sVal = sValueMap[tx.name] !== undefined ? sValueMap[tx.name] : 3.0;
                            groupCounts[classifyFuncGroup(sVal)] += tx.count;
                        });
                        const totalGroupCount = groupCounts.reduce((a, b) => a + b, 0);
                        if (totalGroupCount === 0) return null;

                        let H_groups = 0;
                        groupCounts.forEach(c => {
                            if (c > 0) {
                                const p = c / totalGroupCount;
                                H_groups -= p * Math.log(p);
                            }
                        });
                        // Normalize C to [0,1]: max Shannon for 5 equal groups = ln(5)
                        const C = H_groups / Math.log(5);

                        return R * C;
                    } catch (e) {
                        return null;
                    }
                };

                const dfcriValues = s.map(sample => computeSampleDFCRI(sample)).filter(v => v !== null && !isNaN(v));
                const avgDFCRI = dfcriValues.length > 0
                    ? dfcriValues.reduce((a, b) => a + b, 0) / dfcriValues.length
                    : null;

                let dfcriInterpText = '';
                let dfcriBg = 'bg-teal-50', dfcriBorder = 'border-teal-200', dfcriColor = 'text-teal-900', dfcriHeadColor = 'text-teal-800';
                if (avgDFCRI !== null) {
                    if (avgDFCRI > 0.7) {
                        dfcriInterpText = t('dfcri_high');
                        dfcriBg = 'bg-teal-50'; dfcriBorder = 'border-teal-300'; dfcriColor = 'text-teal-900'; dfcriHeadColor = 'text-teal-800';
                    } else if (avgDFCRI >= 0.4) {
                        dfcriInterpText = t('dfcri_mid');
                        dfcriBg = 'bg-yellow-50'; dfcriBorder = 'border-yellow-300'; dfcriColor = 'text-yellow-900'; dfcriHeadColor = 'text-yellow-800';
                    } else {
                        dfcriInterpText = t('dfcri_low');
                        dfcriBg = 'bg-orange-50'; dfcriBorder = 'border-orange-300'; dfcriColor = 'text-orange-900'; dfcriHeadColor = 'text-orange-800';
                    }
                }
                // ────────────────────────────────────────────────────────────────

                return (
                    <div className="space-y-6 text-justify text-slate-800 text-sm leading-relaxed font-normal">
                        <div className="bg-slate-50 p-4 rounded border border-slate-200">
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">1. {t('section3_title').split('(')[0]}</h4>
                            <p className="mb-0">
                                <strong>{ecoState}</strong>. <br/>
                                {nutrientText}
                            </p>
                        </div>
                        <div>
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">2. Structure</h4>
                            <p>{structureEval} {reliabilityText}</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">3. Validation</h4>
                            <p>{consistencyText}</p>
                            <p className="mt-2">{trendText}</p>
                        </div>
                        {multiIndexText && (
                            <div className="bg-blue-50 p-4 rounded border border-blue-200">
                                <h4 className="font-bold text-blue-900 mb-2 uppercase text-xs tracking-wider">4. Index-alapú értékelés (IPS / TDI / IBD / EPI-D / SID)</h4>
                                <p className="text-blue-900">{multiIndexText}</p>
                            </div>
                        )}

                        {(avgChao1 != null || avgDiTp != null || avgDiPh != null || avgSpear != null) && (
                            <div className="bg-purple-50 p-4 rounded border border-purple-200 space-y-3">
                                <h4 className="font-bold text-purple-900 mb-2 uppercase text-xs tracking-wider">
                                    6. Chao1 · DI-TP · DI-pH · SPEAR<sub>diatoms</sub>
                                </h4>
                                {avgChao1 != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Chao1 gazdagságbecslő:</span>
                                        <p className="text-purple-900 mt-0.5">{chao1Text}</p>
                                    </div>
                                )}
                                {avgDiTp != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Diatóma-alapú foszfor (DI-TP):</span>
                                        <p className="text-purple-900 mt-0.5">{diTpText}</p>
                                    </div>
                                )}
                                {avgDiPh != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Diatóma-alapú pH (DI-pH):</span>
                                        <p className="text-purple-900 mt-0.5">{diPhText}</p>
                                    </div>
                                )}
                                {avgSpear != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Növényvédőszer-érzékenység (SPEAR):</span>
                                        <p className="text-purple-900 mt-0.5">{spearText}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {avgDFCRI !== null && (
                            <div className={`p-4 rounded border ${dfcriBg} ${dfcriBorder}`}>
                                <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${dfcriHeadColor}`}>
                                    7. {t('dfcri_label')}
                                </h4>
                                <p className={`font-mono font-bold text-lg mb-1 ${dfcriColor}`}>
                                    DFCRI = {avgDFCRI.toFixed(3)}
                                </p>
                                <p className={`text-sm ${dfcriColor}`}>{dfcriInterpText}</p>
                            </div>
                        )}

                        {/* ── ERNI: Eco-Rarity Network Index ── */}
                        {(() => {
                            // Collect all taxa from all samples (merged, summed)
                            const taxaMap = {};
                            s.forEach(sample => {
                                (sample.taxa || []).forEach(tx => {
                                    if (!taxaMap[tx.name]) taxaMap[tx.name] = { name: tx.name, count: 0 };
                                    taxaMap[tx.name].count += tx.count;
                                });
                            });
                            const mergedTaxa = Object.values(taxaMap);
                            return mergedTaxa.length > 0 ? (
                                <ERNINetworkGraph
                                    taxaList={mergedTaxa}
                                    sensitivityDB={speciesDb ? speciesDb.sensitivityDB : null}
                                    lang={lang}
                                />
                            ) : null;
                        })()}
                        {/* ── END ERNI ── */}

                        <div className={`p-4 rounded border ${toxicHighBg} ${toxicHighBorder}`}>
                            <h4 className={`font-bold mb-1 uppercase text-xs tracking-wider ${toxicHighColor}`}>
                                5a-i. Veszélyesen toxikus fajok (erős DA/OA termelők) – Küszöb: &gt;1% = közepes; &gt;3% = kritikus
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${toxicHighColor}`}>
                                ⛔ Megerősített erős domoinsav / okadásav termelők. Már kis sejtszámnál is egészségügyi kockázatot jelentenek (pl. <em>Pseudo-nitzschia multiseries</em>, <em>Nitzschia navis-varingica</em>).
                            </p>
                            <p className={toxicHighColor}>
                                <strong>Veszélyesen toxikus fajok aránya: {toxicHighRatio.toFixed(2)}%</strong>
                                {toxicHighCount > 0 && <span> ({toxicHighCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${toxicHighColor}`}>{toxicHighDanger}</p>
                            {detectedToxicHigh.length > 0 && (
                                <p className={`mt-2 text-xs italic ${toxicHighColor}`}>
                                    Azonosított fajok: {[...detectedToxicHigh].sort().join(', ')}
                                </p>
                            )}
                        </div>

                        <div className={`p-4 rounded border ${toxicLowBg} ${toxicLowBorder}`}>
                            <h4 className={`font-bold mb-1 uppercase text-xs tracking-wider ${toxicLowColor}`}>
                                5a-ii. Enyhén toxikus fajok (alacsony / változó toxicitás) – Küszöb: &gt;5% = közepes; &gt;15% = magas
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${toxicLowColor}`}>
                                ⚠ Alacsony vagy változó toxicitású fajok. Csak tömeges elszaporodáskor (>5–15%) releváns a kockázat.
                            </p>
                            <p className={toxicLowColor}>
                                <strong>Enyhén toxikus fajok aránya: {toxicLowRatio.toFixed(1)}%</strong>
                                {toxicLowCount > 0 && <span> ({toxicLowCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${toxicLowColor}`}>{toxicLowDanger}</p>
                            {detectedToxicLow.length > 0 && (
                                <p className={`mt-2 text-xs italic ${toxicLowColor}`}>
                                    Azonosított fajok: {[...detectedToxicLow].sort().join(', ')}
                                </p>
                            )}
                        </div>

                        <div className={`p-4 rounded border ${gillPhysBg} ${gillPhysBorder}`}>
                            <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${gillPhysColor}`}>
                                5b. Fizikai kopoltyúkárosítók (tüskés setae / lándzsás sejtek)
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${gillPhysColor}`}>
                                ⚠ Ezek a fajok már kis sejtszámnál is közvetlenül roncsolják a kopoltyúszövetet. Küszöb: &gt;1% = közepes; &gt;3% = magas kockázat.
                            </p>
                            <p className={gillPhysColor}>
                                <strong>Fizikai károsítók aránya: {gillPhysRatio.toFixed(2)}%</strong>
                                {gillPhysCount > 0 && <span> ({gillPhysCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${gillPhysColor}`}>{gillPhysDanger}</p>
                            {detectedGillPhys.length > 0 && (
                                <p className={`mt-2 text-xs italic ${gillPhysColor}`}>
                                    Azonosított fajok: {detectedGillPhys.sort().join(', ')}
                                </p>
                            )}
                        </div>

                        <div className={`p-4 rounded border ${gillBloomBg} ${gillBloomBorder}`}>
                            <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${gillBloomColor}`}>
                                5c. Bloom-kockázatú kopoltyúkárosítók (O₂-depléció / nyálka / hipoxia)
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${gillBloomColor}`}>
                                ℹ Ezek a fajok csak tömeges elszaporodáskor veszélyesek. Küszöb: &gt;15% = mérsékelt; &gt;30% = magas kockázat.
                            </p>
                            <p className={gillBloomColor}>
                                <strong>Bloom-kockázatú fajok aránya: {gillBloomRatio.toFixed(1)}%</strong>
                                {gillBloomCount > 0 && <span> ({gillBloomCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${gillBloomColor}`}>{gillBloomDanger}</p>
                            {detectedGillBloom.length > 0 && (
                                <p className={`mt-2 text-xs italic ${gillBloomColor}`}>
                                    Azonosított fajok: {detectedGillBloom.sort().join(', ')}
                                </p>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="bg-white min-h-screen">
                    <div className="bg-slate-900 text-white p-8 print:p-0 print:text-black print:bg-white print:border-b-2 print:border-black">
                        <div className="max-w-5xl mx-auto flex justify-between items-start">
                            <div>
                                <div className="text-cyan-400 font-bold tracking-[0.3em] text-xs uppercase mb-2">Eco-Stat Report v8.1.3</div>
                                <h1 className="text-3xl font-black mb-1">{siteId}</h1>
                                <p className="text-slate-400 font-mono text-sm">{t('generated')}: {new Date(data.timestamp).toLocaleString()}</p>
                            </div>
                            <div className="flex gap-4 no-print">
                                <button onClick={onBack} className="text-slate-400 hover:text-white font-bold text-xs uppercase">{t('btn_back')}</button>
                                <button 
                                    id="btn-export-pdf"
                                    onClick={handlePdfExport} 
                                    className="bg-cyan-600 text-white px-4 py-2 rounded font-bold text-xs uppercase flex items-center gap-2 hover:bg-cyan-500 shadow-lg"
                                >
                                    <Icon name="Download" /> {t('btn_pdf')}
                                </button>
                                <button onClick={()=>window.print()} className="bg-white text-slate-900 px-4 py-2 rounded font-bold text-xs uppercase flex items-center gap-2 hover:bg-cyan-50">
                                    <Icon name="Printer" /> {t('btn_print')}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="report-content" className="max-w-5xl mx-auto p-8 prose prose-slate max-w-none print:p-0 print:py-4 bg-white">
                        
                        {data.isHypothesis && (
                            <div className="bg-amber-50 border-l-4 border-amber-500 p-4 mb-8 rounded-r-lg print:border-gray-300 print:bg-gray-50">
                                <div className="flex items-center gap-2 text-amber-800 font-bold mb-1">
                                    <Icon name="AlertTriangle" />
                                    <span>{t('warning_hypothesis')} (n={data.n})</span>
                                </div>
                                <p className="text-sm text-amber-900 m-0">
                                    {t('warning_text')}
                                </p>
                            </div>
                        )}

                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide">{t('section1_title')}</h2>
                        <div className="overflow-x-auto mb-6">
                            <table className="w-full text-sm text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 border-b border-slate-200 text-xs uppercase text-slate-600">
                                        <th className="p-3">Date</th>
                                        <th className="p-3">Richness (S)</th>
                                        <th className="p-3">Shannon (H')</th>
                                        <th className="p-3">IPS (Est.)</th>
                                        <th className="p-3">IPS Coverage</th>
                                        <th className="p-3">% Tolerant</th>
                                        <th className="p-3">DO Sat%</th>
                                        <th className="p-3 bg-indigo-50 text-indigo-700 font-black">Ω-ÖSI</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.samples.map(s => {
                                        const omega = s.ωosi;
                                        const omegaColor = omega === null ? 'text-slate-400'
                                            : omega > 1.5 ? 'text-red-700 font-bold'
                                            : omega > 0.8 ? 'text-amber-700 font-semibold'
                                            : 'text-emerald-700 font-semibold';
                                        const omegaIcon = omega === null ? '—'
                                            : omega > 1.5 ? '🔴'
                                            : omega > 0.8 ? '🟡'
                                            : '🟢';
                                        return (
                                        <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50">
                                            <td className="p-3 font-mono font-bold">{s.date}</td>
                                            <td className="p-3">{s.indices.richness}</td>
                                            <td className="p-3">{s.indices.shannon.toFixed(2)}</td>
                                            <td className="p-3 font-bold text-blue-700">{s.indices.ips ? s.indices.ips.toFixed(2) : '-'}</td>
                                            <td className="p-3 text-slate-500 text-xs">{s.indices.ipsCoverage ? s.indices.ipsCoverage.toFixed(1)+'%' : '-'}</td>
                                            <td className="p-3">{s.indices.pctTolerant.toFixed(1)}%</td>
                                            <td className="p-3">{s.indices.doSat ? s.indices.doSat.toFixed(1)+'%' : '-'}</td>
                                            <td className={`p-3 bg-indigo-50 ${omegaColor}`}>
                                                {omegaIcon} {omega !== null ? omega.toFixed(3) : '—'}
                                            </td>
                                        </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {/* ── Ω-ÖSI ÖSSZESÍTŐ PANEL ──────────────────────────────────────── */}
                        {data.omegaSummary && (() => {
                            const os = data.omegaSummary;
                            const stressLevel = os.mean > 1.5 ? 'high' : os.mean > 0.8 ? 'mid' : 'low';
                            const panelCfg = {
                                low:  { bg: 'bg-emerald-50', border: 'border-emerald-300', head: 'text-emerald-800', val: 'text-emerald-700', icon: '🟢', label: 'Alacsony stressz / Low Stress' },
                                mid:  { bg: 'bg-amber-50',   border: 'border-amber-300',   head: 'text-amber-800',   val: 'text-amber-700',   icon: '🟡', label: 'Mérsékelt stressz / Moderate Stress' },
                                high: { bg: 'bg-red-50',     border: 'border-red-400',     head: 'text-red-800',     val: 'text-red-700',     icon: '🔴', label: 'Magas stressz / High Stress' }
                            };
                            const cfg = panelCfg[stressLevel];

                            // Key drivers from allSpeciesAnalysis: top-3 species by ωosi that are in dominant set
                            const driverSpecies = (data.allSpeciesAnalysis || [])
                                .filter(sp => sp.ωosi !== undefined && sp.ωosi !== null)
                                .sort((a, b) => b.ωosi - a.ωosi)
                                .slice(0, 3);

                            const concernSamples = data.samples
                                .filter(s => s.ωosi !== null && s.ωosi > os.threshold)

                                        </svg>
                                        <h3 className={`font-black text-sm uppercase tracking-wider ${cfg.head}`}>
                                            Ω-ÖSI — Összesített Ökológiai Stressz Index (ÖSI) Értékelés
                                        </h3>
                                        <span className={`ml-auto text-xs font-mono px-2 py-1 rounded-full border ${cfg.border} ${cfg.val} font-bold`}>
                                            {cfg.icon} {cfg.label}
                                        </span>
                                    </div>

                                    {/* Metric cards */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                        {[
                                            { label: 'Átlag Ω-ÖSI (Ökológiai Stressz Index)', value: os.mean.toFixed(3), sub: 'Súlyozott közösségi átlag' },
                                            { label: 'Maximum Ω-ÖSI', value: os.max.toFixed(3), sub: 'Legmagasabb minta-érték' },
                                            { label: 'Minimum Ω-ÖSI', value: os.min.toFixed(3), sub: 'Legalacsonyabb minta-érték' },
                                            { label: 'Magas stressz / High-stress', value: `${os.highStressCount} / ${os.n}`, sub: `${os.highStressPct.toFixed(0)}% · küszöb > ${os.threshold}` }
                                        ].map(m => (
                                            <div key={m.label} className="bg-white rounded-lg p-3 border border-slate-200 shadow-sm">
                                                <div className={`text-[10px] font-bold uppercase tracking-wide ${cfg.head} mb-1`}>{m.label}</div>
                                                <div className={`font-black text-lg font-mono ${cfg.val}`}>{m.value}</div>
                                                <div className="text-[10px] text-slate-400 mt-1">{m.sub}</div>

                                    </div>

                                    {/* Inline Ω-OSI sparkbar per sample */}
                                    <div className="mb-4">
                                        <div className="text-[10px] font-bold uppercase tracking-wide text-slate-500 mb-2">Ω-ÖSI per minta – Ökológiai Stressz Index (időrendben)</div>
                                        <div className="flex flex-wrap gap-2">
                                            {[...data.samples].sort((a,b) => new Date(a.date)-new Date(b.date)).map(s => {
                                                if (s.ωosi === null) return null;
                                                const pct = Math.min(100, (s.ωosi / Math.max(os.max, os.threshold * 1.5)) * 100);
                                                const barColor = s.ωosi > os.threshold ? '#ef4444' : s.ωosi > 0.8 ? '#f59e0b' : '#22c55e';
                                                return (
                                                    <div key={s.id} className="flex flex-col items-center" style={{minWidth: '48px'}}>
                                                        <div className="text-[9px] font-mono text-slate-500 mb-1">{s.date.slice(0,10)}</div>
                                                        <div className="relative w-8 bg-slate-100 rounded" style={{height:'60px'}}>
                                                            <div className="absolute bottom-0 w-full rounded transition-all"
                                                                style={{height: pct + '%', background: barColor, opacity: 0.85}}>
                                                            </div>
                                                        </div>
                                                        <div className="text-[9px] font-black mt-1" style={{color: barColor}}>{s.ωosi.toFixed(2)}</div>
                                                    </div>

                                            })}
                                        </div>
                                    </div>

                                    {/* Key drivers */}
                                    {driverSpecies.length > 0 && (
                                        <div className="mb-3">
                                            <div className="text-[10px] font-bold uppercase tracking-wide text-slate-500 mb-2">
                                                Legfontosabb stressz-driverek (Top-3 faj Ω-ÖSI szerint)
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {driverSpecies.map(sp => (
                                                    <div key={sp.name} className={`flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs ${cfg.border} bg-white`}>
                                                        <span className="italic font-semibold text-slate-700">{sp.name}</span>
                                                        <span className={`font-mono font-black ${cfg.val}`}>Ω-ÖSI={sp.ωosi.toFixed(2)}</span>
                                                        <span className="text-slate-400">s={sp.s}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Samples of concern */}
                                    {concernSamples.length > 0 && (
                                        <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-xs text-red-800">
                                            <span className="font-bold">⚠ Aggasztó minták – magas Ökológiai Stressz Index (Ω-ÖSI &gt; {os.threshold}):</span>{' '}
                                            {concernSamples.map(s => `${s.date.slice(0,10)} (Ω-ÖSI=${s.ωosi.toFixed(2)})`).join(' · ')}
                                        </div>

                                    {/* Stress distribution narrative */}
                                    <div className={`mt-3 text-xs ${cfg.val} border-t ${cfg.border} pt-3 leading-relaxed`}>
                                        <span className="font-bold">Ω-ÖSI Stressz-eloszlás értékelése (Ökológiai Stressz Index): </span>
                                        {stressLevel === 'low' && 'Az Ω-ÖSI (Ökológiai Stressz Index) értékek alacsonyak, a közösség stabil, kis ökológiai stressz áll fenn. A Gauss-kernel alapú szenzitivitás-analízis szerint a fajok relatív abundanciája közel esik a saját érzékenységi centrumukhoz, ami egészséges közösségi összetételt jelez.'}
                                        {stressLevel === 'mid' && 'Mérsékelt Ω-ÖSI (Ökológiai Stressz Index) értékek: a közösség átmeneti stressznek van kitéve. A Gauss-kernel szórások és a KL-divergencia közepes eltérést jeleznek az optimális állapottól. Rendszeres monitorizálás javasolt.'}
                                        {stressLevel === 'high' && 'Magas Ω-ÖSI (Ökológiai Stressz Index) értékek: a KL-divergencia és a Gauss-kernel összeg együttesen erős eltérést jelez az ökológiai referencia-állapottól. Az érzékeny fajok dominanciája csökkent, a toleráns formák kerültek előtérbe. Azonnali beavatkozás javasolt.'}
                                    </div>
                                </div>
                            );
                        })()}
                        {/* ── END Ω-ÖSI ÖSSZESÍTŐ ─────────────────────────────────────────── */}

                        {/* ── Ω-ÖSI IDŐSOR CHART ──────────────────────────────────────── */}
                        {data.samples && data.samples.some(s => s.ωosi !== null && s.ωosi !== undefined) && (
