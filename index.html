        // ══════════════════════════════════════════════════════════════
        // ── ERNI: Eco-Rarity Network Index – Component + Computation ──
        // ══════════════════════════════════════════════════════════════
        const computeERNI = (taxaList, sensitivityDB) => {
            if (!taxaList || taxaList.length === 0) return { erniValue: null, nodes: [], edges: [] };

            // 1. Ritkasági súly: s érték alapján (s: 1–5, ahol 5=legszennyezésintoleráns/ritka)
            // Ritkasági súly = (s - 1) / 4  →  0 (közönséges, s≈1) ... 1 (ritka, s≈5)
            // Ha nincs az adatbázisban: közepes érték (0.5)
            const nodes = taxaList.map(tx => {
                const dbEntry = sensitivityDB ? sensitivityDB[tx.name] : null;
                const sVal = dbEntry ? dbEntry.s : 3.0;
                const rarity = Math.min(1, Math.max(0, (sVal - 1) / 4));
                return {
                    id: tx.name,
                    name: tx.name,
                    rarity: rarity,
                    sVal: sVal,
                    count: tx.count,
                    inDB: !!dbEntry
                };
            });

            // 2. Taxonómiai/ökológiai élek: két faj kapcsolódik, ha azonos genus (taxonómiai közelség)
            //    vagy ha ritkasági értékük különbsége < 0.15 (ökológiai niche-közelség)
            const edges = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const ni = nodes[i], nj = nodes[j];
                    const genusI = ni.name.split(' ')[0];
                    const genusJ = nj.name.split(' ')[0];
                    const samGenus = genusI === genusJ;
                    const rarityDiff = Math.abs(ni.rarity - nj.rarity);
                    const ecoDist = rarityDiff;
                    if (samGenus || rarityDiff < 0.15) {
                        edges.push({
                            source: ni.id,
                            target: nj.id,
                            type: samGenus ? 'taxonomic' : 'ecological',
                            weight: samGenus ? 1.0 : (1 - rarityDiff / 0.15)
                        });
                    }
                }
            }

            // 3. ERNI értékszámítás
            // ERNI = (Σ rarity_i) / S  × (1 + E/S) × connectivity_bonus
            // ahol E = élek száma, S = fajszám, connectivity_bonus = connected/S
            const S = nodes.length;
            if (S === 0) return { erniValue: null, nodes, edges };
            const sumRarity = nodes.reduce((acc, n) => acc + n.rarity, 0);
            const avgRarity = sumRarity / S;
            const E = edges.length;
            const networkDensity = S > 1 ? (2 * E) / (S * (S - 1)) : 0;
            // Adjacency: which nodes have edges
            const connectedSet = new Set();
            edges.forEach(e => { connectedSet.add(e.source); connectedSet.add(e.target); });
            const connFraction = connectedSet.size / S;
            const erniValue = Math.min(1, avgRarity * (1 + networkDensity) * (0.5 + 0.5 * connFraction));

            return { erniValue, nodes, edges };
        };

                    .selectAll('g')

                    .enter().append('g')
                    .style('cursor', 'pointer')
                    .call(d3.drag()
                        .on('start', (event, d) => {
                            if (!event.active) simulation.alphaTarget(0.3).restart();
                            d.fx = d.x; d.fy = d.y;
                        })
                        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                        .on('end', (event, d) => {
                            if (!event.active) simulation.alphaTarget(0);
                            d.fx = null; d.fy = null;
                        })
                    )
                    .on('click', (event, d) => {
                        event.stopPropagation();
                        setTooltip({ x: event.offsetX, y: event.offsetY, node: d });
                    });

                // Circle
                nodeG.append('circle')
                    .attr('r', d => rScale(d.rarity))
                    .attr('fill', d => colorScale(d.rarity))
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 2)
                    .attr('opacity', 0.92)
                    .on('mouseenter', function(event, d) {
                        d3.select(this).attr('opacity', 1).attr('stroke', '#1e293b').attr('stroke-width', 2.5);
                    })
                    .on('mouseleave', function() {
                        d3.select(this).attr('opacity', 0.92).attr('stroke', '#fff').attr('stroke-width', 2);
                    });

                // Genus label (only for nodes with rarity > 0.5 or bigger ones to avoid clutter)
                nodeG.append('text')
                    .text(d => {
                        const parts = d.name.split(' ');
                        return parts[0].substring(0, 3) + (parts[1] ? '.' : '');
                    })
                    .attr('text-anchor', 'middle')
                    .attr('dy', '0.35em')
                    .attr('font-size', d => rScale(d.rarity) > 12 ? '9px' : '7px')
                    .attr('fill', '#1e293b')
                    .attr('font-weight', '700')
                    .attr('pointer-events', 'none')
                    .style('user-select', 'none');

                simulation.on('tick', () => {
                    link
                        .attr('x1', d => Math.max(20, Math.min(W - 20, d.source.x)))
                        .attr('y1', d => Math.max(20, Math.min(H - 20, d.source.y)))
                        .attr('x2', d => Math.max(20, Math.min(W - 20, d.target.x)))
                        .attr('y2', d => Math.max(20, Math.min(H - 20, d.target.y)));
                    nodeG.attr('transform', d =>
                        `translate(${Math.max(20, Math.min(W - 20, d.x))},${Math.max(20, Math.min(H - 20, d.y))})`
                    );
                });

                // Dismiss tooltip on svg click
                svg.on('click', () => setTooltip(null));

                return () => simulation.stop();
            }, [erniData]);

            if (!taxaList || taxaList.length === 0) return null;
            if (!erniData) return null;

            const { erniValue, nodes, edges } = erniData;

            // ERNI color & interpretation
            let erniBg = 'bg-green-50', erniBorder = 'border-green-300', erniColor = 'text-green-900', erniHeadColor = 'text-green-800';
            let erniInterp = t_erni('interp_low');
            if (erniValue >= 0.55) {
                erniBg = 'bg-violet-50'; erniBorder = 'border-violet-400'; erniColor = 'text-violet-900'; erniHeadColor = 'text-violet-800';
                erniInterp = t_erni('interp_high');
            } else if (erniValue >= 0.3) {
                erniBg = 'bg-amber-50'; erniBorder = 'border-amber-300'; erniColor = 'text-amber-900'; erniHeadColor = 'text-amber-800';
                erniInterp = t_erni('interp_mid');
            }

            return (
                <div className="mt-8 page-break">
                    {/* Header */}
                    <div className="flex items-center gap-3 border-b-2 border-violet-400 pb-2 mb-5">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="12" cy="5" r="3"/><circle cx="19" cy="19" r="3"/><circle cx="5" cy="19" r="3"/>
                            <line x1="12" y1="8" x2="19" y2="16"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="5" y1="19" x2="19" y2="19"/>
                        </svg>
                        <h2 className="text-xl font-black text-slate-900 uppercase tracking-wide m-0">{t_erni('title')}</h2>
                    </div>

                    {/* ERNI value box */}
                    <div className={`p-4 rounded border mb-5 ${erniBg} ${erniBorder}`}>
                        <h4 className={`font-bold mb-1 uppercase text-xs tracking-wider ${erniHeadColor}`}>
                            8. {t_erni('erni_val')}
                        </h4>
                        <p className={`font-mono font-black text-2xl mb-1 ${erniColor}`}>
                            ERNI = {erniValue !== null ? erniValue.toFixed(3) : 'N/A'}
                        </p>
                        <p className={`text-sm ${erniColor}`}>{erniInterp}</p>
                        <p className={`text-xs mt-2 opacity-70 ${erniColor} font-mono`}>
                            S={nodes.length} {t_erni('nodes')} · {edges.length} {t_erni('edges')} · {t_erni('click_hint')}
                        </p>
                    </div>

                    {/* Network Graph */}
                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-3 relative no-print" style={{minHeight: '420px'}}>
                        <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2 px-1">{t_erni('subtitle')}</div>
                        <div style={{position:'relative'}}>
                            <svg ref={svgRef} style={{display:'block', width:'100%'}}></svg>
                            {/* Tooltip */}
                            {tooltip && (
                                <div
                                    style={{
                                        position:'absolute',
                                        left: tooltip.x + 14,
                                        top: tooltip.y - 14,
                                        background:'#1e293b',
                                        color:'#f1f5f9',
                                        borderRadius:'8px',
                                        padding:'10px 14px',
                                        fontSize:'12px',
                                        pointerEvents:'none',
                                        zIndex:20,
                                        minWidth:'200px',
                                        boxShadow:'0 4px 24px rgba(0,0,0,0.4)',
                                        border:'1px solid rgba(148,163,184,0.2)'
                                    }}
                                >
                                    <div style={{fontWeight:700, fontSize:'13px', marginBottom:'6px', fontStyle:'italic', color:'#7dd3fc'}}>{tooltip.node.name}</div>
                                    <div style={{display:'flex', flexDirection:'column', gap:'3px'}}>
                                        <span><span style={{color:'#94a3b8'}}>{t_erni('rarity_weight')}:</span> <strong style={{color: tooltip.node.rarity > 0.5 ? '#f87171' : '#4ade80'}}>{tooltip.node.rarity.toFixed(3)}</strong></span>
                                        <span><span style={{color:'#94a3b8'}}>{t_erni('s_value')}:</span> {tooltip.node.sVal.toFixed(1)}</span>
                                        <span style={{fontSize:'10px', color: tooltip.node.inDB ? '#86efac' : '#fbbf24'}}>{tooltip.node.inDB ? '✓ ' + t_erni('in_db') : '⚠ ' + t_erni('not_in_db')}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                        {/* Legend */}
                        <div className="flex flex-wrap items-center gap-4 mt-3 px-2 text-xs text-slate-500">
                            <div className="flex items-center gap-1.5">
                                <div style={{width:14,height:14,borderRadius:'50%',background:'#ef4444',border:'2px solid #fff',boxShadow:'0 0 0 1px #ef4444'}}></div>
                                <span>{t_erni('legend_rare')}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <div style={{width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid #fff',boxShadow:'0 0 0 1px #22c55e'}}></div>
                                <span>{t_erni('legend_common')}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <div style={{width:18,height:2,background:'#94a3b8',borderRadius:2}}></div>
                                <span>{t_erni('legend_tax')}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <div style={{width:18,height:2,background:'#7dd3fc',borderRadius:2,backgroundImage:'repeating-linear-gradient(90deg,#7dd3fc 0,#7dd3fc 4px,transparent 4px,transparent 7px)'}}></div>
                                <span>{t_erni('legend_eco')}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        // ══════════════════════════════════════════════════════════════
        // END ERNI
        // ══════════════════════════════════════════════════════════════

        // --- APP COMPONENT ---
        const App = ({ currentUserId }) => {
            const [view, setView] = useState('input');
            const [lang, setLang] = useState('hu'); // Default: Hungarian (as per original file)

            // Helper for translation
            const t = (key) => TRANSLATIONS[lang]?.[key] || TRANSLATIONS['en']?.[key] || key;

            // Env Config Generator
            const getEnvConfig = () => ({
                mandatory: [
                    { key: 'temperature_c', label: t('param_temp'), unit: '°C', min: -5, max: 45 },
                    { key: 'conductivity_uS_cm', label: t('param_cond'), unit: 'µS/cm', min: 0, max: 50000 },
                    { key: 'pH', label: t('param_ph'), unit: '', min: 0, max: 14 }
                ],
                optional: [
                    { key: 'tds_mg_L', label: t('param_tds'), unit: 'mg/L' },
                    { key: 'dissolved_oxygen_mg_L', label: t('param_do'), unit: 'mg/L' },
                    { key: 'nitrate_mg_L', label: t('param_no3'), unit: 'mg/L' },
                    { key: 'phosphate_mg_L', label: t('param_po4'), unit: 'mg/L' },
                    { key: 'turbidity_NTU', label: t('param_turb'), unit: 'NTU' },
                    { key: 'ammonium_mg_L', label: t('param_nh4'), unit: 'mg/L' },
                    { key: 'silicate_mg_L', label: t('param_sio2'), unit: 'mg/L' }
                ]
            });

            // Site selection for INPUT (Adding new samples)
            const [inputSiteId, setInputSiteId] = useState('');
            
            // Site selection for ANALYSIS
            const [selectedAnalysisSiteId, setSelectedAnalysisSiteId] = useState(null);

            const [samplings, setSamplings] = useState([]);
            
            // Input States
            const [date, setDate] = useState('');
            const [env, setEnv] = useState({});
            const [taxaText, setTaxaText] = useState('');
            const [meta, setMeta] = useState({ collector: '', notes: '' });

            // Folder toggle states
            const [openFolders, setOpenFolders] = useState({});

            // Analysis States
            const [isProcessing, setIsProcessing] = useState(false);
            const [analysisData, setAnalysisData] = useState(null);
            const [speciesDb, setSpeciesDb] = useState(null);
            
            // Import State
            const fileInputRef = useRef(null);
            
            // Worker Ref
            const workerRef = useRef(null);

            // ── SUPABASE: Save a sample to the cloud database ─────────────────
            const saveSampleToDatabase = async (sample) => {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    const userId = session?.user?.id || currentUserId;
                    if (!userId) { console.error('No authenticated user'); return null; }
                    const { data: inserted, error } = await supabase.from('Data').insert([{
                        user_id:         userId,
                        sample_name:     sample.site_id,
                        species_list:    JSON.stringify(sample.taxa),
                        water_params:    JSON.stringify(sample.env),
                        collection_date: sample.date,
                    }]).select('id').single();
                    if (error) { console.error('Supabase insert error:', error.message); return null; }
                    return inserted?.id ? String(inserted.id) : null;
                } catch (err) {
                    console.error('saveSampleToDatabase failed:', err);
                    return null;
                }
            };

            // ── SUPABASE: Load samples from the cloud database ────────────────
            const loadSamplesFromDatabase = async () => {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    const userId = session?.user?.id || currentUserId;
                    if (!userId) return [];
                    const { data, error } = await supabase
                        .from('Data')
                        .select('*')
                        .eq('user_id', userId);
                    if (error) { console.error('Supabase select error:', error.message); return []; }
                    return (data || []).map(row => ({
                        id:      row.id ? String(row.id) : Date.now().toString(),
                        site_id: row.sample_name    || '',
                        date:    row.collection_date || '',
                        env:     (() => { try { return JSON.parse(row.water_params);  } catch { return {}; } })(),
                        taxa:    (() => { try { return JSON.parse(row.species_list); } catch { return []; } })(),
                        meta:    { collector: '', notes: '' },
                    }));
                } catch (err) {
                    console.error('loadSamplesFromDatabase failed:', err);
                    return [];
                }
            };
            // ─────────────────────────────────────────────────────────────────

            // Derived: Group samplings by site
            const groupedSamplings = useMemo(() => {
                const groups = {};
                samplings.forEach(s => {
                    if (!groups[s.site_id]) groups[s.site_id] = [];
                    groups[s.site_id].push(s);
                });
                return groups;
            }, [samplings]);

            // Derived: List of existing site IDs
            const existingSites = useMemo(() => Object.keys(groupedSamplings).sort(), [groupedSamplings]);

            // Init
            useEffect(() => {
                // Load from Supabase (cloud) first; fall back to localStorage
                const initLoad = async () => {
                    // Always load from Supabase — this is the source of truth.
                    // localStorage is only used as a one-time migration path, then cleared.
                    const cloudSamples = await loadSamplesFromDatabase();
                    if (cloudSamples.length > 0) {
                        setSamplings(cloudSamples);
                        setInputSiteId(cloudSamples[0].site_id);
                        setSelectedAnalysisSiteId(cloudSamples[0].site_id);
                        setOpenFolders({ [cloudSamples[0].site_id]: true });
                        // Cloud is authoritative — wipe any stale localStorage copy
                        localStorage.removeItem('atlas_diatom_data');
                    } else {
                        // No cloud data: check localStorage for legacy data to migrate
                        const saved = localStorage.getItem('atlas_diatom_data');
                        if (saved) {
                            try {
                                const parsed = JSON.parse(saved);
                                if (parsed.samplings && parsed.samplings.length > 0) {
                                    setSamplings(parsed.samplings);
                                    setInputSiteId(parsed.samplings[0].site_id);
                                    setSelectedAnalysisSiteId(parsed.samplings[0].site_id);
                                    setOpenFolders({ [parsed.samplings[0].site_id]: true });
                                }
                            } catch(e) { console.error("Data load error"); }
                            // Clear localStorage regardless — cloud is the store going forward
                            localStorage.removeItem('atlas_diatom_data');
                        }
                    }
                };
                initLoad();

                // Initialize Worker from Script Tag
                const WORKER_CODE = `        self.onmessage = function(e) {
            const { type, payload } = e.data;
            if (type === 'RUN_ANALYSIS') {
                try {
                    const results = runFullAnalysis(payload.samplings, payload.config, payload.speciesDb);
                    self.postMessage({ type: 'ANALYSIS_COMPLETE', results });
                } catch (err) {
                    self.postMessage({ type: 'ERROR', error: err.message });
                }
            }
        };

        // --- STATISZTIKAI MOTOR (Worker Scope) ---

        function runFullAnalysis(samplings, config, speciesDb) {
            const n = samplings.length;
            const isHypothesis = n < 5;
            
            // 1. Adat transzformáció és validálás
            const processedSamples = samplings.map(s => ({
                ...s,
                totalAbundance: s.taxa.reduce((a,b) => a + b.count, 0)
            }));

            // 2. Index számítások mintánként
            const samplesWithIndices = processedSamples.map(s => {
                const indices = calculateIndices(s, speciesDb);
                return { ...s, indices };
            });

            // 3. Faj-Környezet elemzés (csak ha n >= 3, különben nagyon instabil)
            let speciesAnalysis = [];
            if (n >= 3) {
                speciesAnalysis = performSpeciesEnvironmentAnalysis(samplesWithIndices, config);
            }

            // 4. Aggregált statisztikák
            const aggregatedStats = calculateAggregatedStats(samplesWithIndices);

            // --- NEW: DOMINANT SPECIES EXTENDED ANALYSIS (v8.1.4 Extension) ---
            // UPDATE: Returns both dominant (top 5) and all species stats
            const fullEcologicalAnalysis = performDominantAnalysis(processedSamples, speciesDb);
            const dominantAnalysis = fullEcologicalAnalysis.dominant;
            const allSpeciesAnalysis = fullEcologicalAnalysis.all;

            // 5. Harmful species analysis (toxic / gill-damaging)
            // Computed here in the worker where speciesDb is available.
            // Toxicity is split: HIGH (confirmed strong DA/OA producers, dangerous even at low %)
            //                    LOW  (mildly toxic, needs higher abundance to matter)
            const _toxicHighSet = new Set((speciesDb && speciesDb.toxicHighDB) ? speciesDb.toxicHighDB : []);
            const _toxicLowSet  = new Set((speciesDb && speciesDb.toxicLowDB)  ? speciesDb.toxicLowDB  : []);
            const _gillPhysSet  = new Set((speciesDb && speciesDb.gillPhysicalDB) ? speciesDb.gillPhysicalDB : []);
            const _gillBloomSet = new Set((speciesDb && speciesDb.gillBloomDB)    ? speciesDb.gillBloomDB    : []);
            let _toxicHighCount = 0, _toxicLowCount = 0, _gillPhysCount = 0, _gillBloomCount = 0, _totalWithDB = 0;
            const _detectedToxicHigh = [], _detectedToxicLow = [], _detectedGillPhys = [], _detectedGillBloom = [];
            samplesWithIndices.forEach(function(sample) {
                sample.taxa.forEach(function(t) {
                    var name = t.name.trim();
                    _totalWithDB++;
                    if (_toxicHighSet.has(name)) { _toxicHighCount++; if (_detectedToxicHigh.indexOf(name) === -1) _detectedToxicHigh.push(name); }
                    if (_toxicLowSet.has(name))  { _toxicLowCount++;  if (_detectedToxicLow.indexOf(name)  === -1) _detectedToxicLow.push(name);  }
                    if (_gillPhysSet.has(name))  { _gillPhysCount++;  if (_detectedGillPhys.indexOf(name)  === -1) _detectedGillPhys.push(name);  }
                    if (_gillBloomSet.has(name)) { _gillBloomCount++; if (_detectedGillBloom.indexOf(name) === -1) _detectedGillBloom.push(name); }
                });
            });
            var _tot = _totalWithDB;
            const harmfulSpecies = {
                toxicHighCount:     _toxicHighCount,
                toxicLowCount:      _toxicLowCount,
                gillPhysCount:      _gillPhysCount,
                gillBloomCount:     _gillBloomCount,
                totalWithDB:        _tot,
                detectedToxicHigh:  _detectedToxicHigh,
                detectedToxicLow:   _detectedToxicLow,
                detectedGillPhys:   _detectedGillPhys,
                detectedGillBloom:  _detectedGillBloom,
                toxicHighRatio: _tot > 0 ? (_toxicHighCount / _tot) * 100 : 0,
                toxicLowRatio:  _tot > 0 ? (_toxicLowCount  / _tot) * 100 : 0,
                gillPhysRatio:  _tot > 0 ? (_gillPhysCount  / _tot) * 100 : 0,
                gillBloomRatio: _tot > 0 ? (_gillBloomCount / _tot) * 100 : 0
            };

            // ── TROPHIC NUTRIENT PREFERENCE ANALYSIS ─────────────────────────
            const _trophicDB = (speciesDb && speciesDb.trophicDB) ? speciesDb.trophicDB : {};
            var _trophicO = 0, _trophicM = 0, _trophicE = 0, _trophicUnknown = 0;
            var _detectedTrophicO = [], _detectedTrophicM = [], _detectedTrophicE = [];
            var _trophicTotalAbund = 0;
            samplesWithIndices.forEach(function(sample) {
                sample.taxa.forEach(function(tx) {
                    var nm = tx.name.trim();
                    var cnt = tx.count || 0;
                    _trophicTotalAbund += cnt;
                    var cat = _trophicDB[nm];
                    if (cat === 'O') {
                        _trophicO += cnt;
                        if (_detectedTrophicO.indexOf(nm) === -1) _detectedTrophicO.push(nm);
                    } else if (cat === 'M') {
                        _trophicM += cnt;
                        if (_detectedTrophicM.indexOf(nm) === -1) _detectedTrophicM.push(nm);
                    } else if (cat === 'E') {
                        _trophicE += cnt;
                        if (_detectedTrophicE.indexOf(nm) === -1) _detectedTrophicE.push(nm);
                    } else {
                        _trophicUnknown += cnt;
                    }
                });
            });
            var _trophicTot = _trophicTotalAbund || 1;
            const trophicStats = {
                oligoCount: _trophicO,
                mesoCount: _trophicM,
                eutroCount: _trophicE,
                unknownCount: _trophicUnknown,
                totalAbundance: _trophicTotalAbund,
                oligoPct: (_trophicO / _trophicTot) * 100,
                mesoPct: (_trophicM / _trophicTot) * 100,
                eutroPct: (_trophicE / _trophicTot) * 100,
                unknownPct: (_trophicUnknown / _trophicTot) * 100,
                oligoSpecies: _detectedTrophicO,
                mesoSpecies: _detectedTrophicM,
                eutroSpecies: _detectedTrophicE
            };
            // ────────────────────────────────────────────────────────────────────

            // ══════════════════════════════════════════════════════════════════
            // Ω-ÖSI (Ökológiai Stressz Index) PER-SAMPLE AGGREGATION
            // For each sample, compute the abundance-weighted mean Ω-OSI across
            // its constituent species.  Uses allSpeciesAnalysis lookup.
            // ══════════════════════════════════════════════════════════════════
            // Build lookup: spName → ωosi
            const _ωosiLookup = {};
            (fullEcologicalAnalysis.all || []).forEach(sp => {
                _ωosiLookup[sp.name] = sp.ωosi !== undefined ? sp.ωosi : sp.ösi;
            });

            // Attach per-sample ωosi to each sample object
            const samplesWithOmega = samplesWithIndices.map(sm => {
                const totalN = sm.totalAbundance || 1;
                let weightedSum = 0, weightTotal = 0;
                sm.taxa.forEach(tx => {
                    const w   = tx.count / totalN;
                    const val = _ωosiLookup[tx.name];
                    if (val !== undefined && isFinite(val)) {
                        weightedSum  += w * val;
                        weightTotal  += w;
                    }
                });
                const sampleOmega = weightTotal > 0 ? weightedSum / weightTotal : null;
                return { ...sm, ωosi: sampleOmega };
            });

            // ── Summary statistics for Ω-OSI ─────────────────────────────────
            const validOmegaVals = samplesWithOmega
                .map(s => s.ωosi)
                .filter(v => v !== null && isFinite(v));

            const OMEGA_HIGH_STRESS_THRESHOLD = 1.5; // configurable; >1.5 = high stress
            const omegaSummary = validOmegaVals.length > 0 ? {
                mean:  validOmegaVals.reduce((a, b) => a + b, 0) / validOmegaVals.length,
                max:   Math.max(...validOmegaVals),
                min:   Math.min(...validOmegaVals),
                highStressCount: validOmegaVals.filter(v => v > OMEGA_HIGH_STRESS_THRESHOLD).length,
                highStressPct:   (validOmegaVals.filter(v => v > OMEGA_HIGH_STRESS_THRESHOLD).length / validOmegaVals.length) * 100,
                threshold:       OMEGA_HIGH_STRESS_THRESHOLD,
                n:               validOmegaVals.length
            } : null;
            // ──────────────────────────────────────────────────────────────────

            return {
                n,
                isHypothesis,
                samples: samplesWithOmega,
                speciesAnalysis,
                aggregatedStats,
                dominantAnalysis, 
                allSpeciesAnalysis,
                harmfulSpecies,
                trophicStats,
                omegaSummary,
                timestamp: new Date().toISOString()
            };
        }

        // --- NEW FUNCTION: DOMINANT ANALYSIS (v8.1.4) ---
        function performDominantAnalysis(samples, speciesDb) {
            const sensitivityDB = (speciesDb && speciesDb.sensitivityDB) ? speciesDb.sensitivityDB : {};

            // 1. Identify Dominant Species (Top 5 by total abundance) AND All Species
            const speciesSums = {};
            let totalAbundanceAll = 0;
            samples.forEach(s => {
                totalAbundanceAll += s.totalAbundance;
                s.taxa.forEach(t => {
                    speciesSums[t.name] = (speciesSums[t.name] || 0) + t.count;
                });
            });

            // 2. Env Stress Calculation (Normalized)
            const params = ['nitrate_mg_L', 'phosphate_mg_L', 'conductivity_uS_cm'];
            const bounds = {};
            params.forEach(p => {
                const vals = samples.map(s => parseFloat(s.env[p])).filter(v => !isNaN(v));
                if (vals.length > 0) bounds[p] = { min: Math.min(...vals), max: Math.max(...vals) };
            });

            const getSampleStress = (s) => {
                let sum = 0, count = 0;
                params.forEach(p => {
                    const val = parseFloat(s.env[p]);
                    if (!isNaN(val) && bounds[p] && bounds[p].max > bounds[p].min) {
                        sum += (val - bounds[p].min) / (bounds[p].max - bounds[p].min);

                });

            };
            
            const avgStress = samples.reduce((acc, s) => acc + getSampleStress(s), 0) / (samples.length || 1);
            const stressForCalc = Math.max(0.1, avgStress);

            // ═══════════════════════════════════════════════════════════════════
            // Ω-ÖSI  (Omega Ökológiai Stressz Index)  — teljes képlet implementáció
            // ═══════════════════════════════════════════════════════════════════
            //
            // Formula (per species i, per sample):
            //
            //   Ω_i = ( 1 - Σ_j [ w_j · exp(-0.5·(x_i-μ_j)²/σ_j²) · Φ_j ]
            //             + λ·H(X_i)  +  ξ·D_KL(P_i||Q_i) )
            //         ─────────────────────────────────────────────────────────
            //         ( mean(σ_j)  +  ε  +  γ·G_i  +  η·||dx_i/dt|| )
            //
            // Variable mapping to available diatom data:
            //   x_i        = normalised relative abundance of species i  (0–1)
            //   μ_j        = per-group sensitivity centroid  (s_val / 5)
            //   σ_j        = per-group tolerance spread      (v_val / 5, floored 0.1)
            //   w_j        = group weight  = 1 (uniform; extend if prior known)
            //   Φ_j(t)     = temporal phenological factor   = 1 (static; extend with month data)
            //   λ          = Shannon-weight  = 0.15
            //   ξ          = KL-weight       = 0.10
            //   H(X_i)     = Shannon entropy contribution of species i across all samples
            //   D_KL       = KL divergence of observed vs. uniform reference distribution
            //   γ          = gradient penalty weight   = 0.20
            //   G_i        = ecological gradient       = normalised |s_val - 3.0| / 2
            //   η          = temporal-change weight    = 0.10
            //   ||dx/dt||  = temporal rate of change of rel. abundance (0 when single sample)
            //   ε          = regularisation floor      = 1e-6  (prevents divide-by-zero)
            //   d          = dimensionality (=1, scalar implementation)

            // ── Hyper-parameters ─────────────────────────────────────────────
            const OMEGA_LAMBDA = 0.15;   // weight for Shannon entropy term
            const OMEGA_XI     = 0.10;   // weight for KL-divergence term
            const OMEGA_GAMMA  = 0.20;   // weight for ecological gradient G_i
            const OMEGA_ETA    = 0.10;   // weight for temporal rate-of-change
            const OMEGA_EPS    = 1e-6;   // denominator floor (anti-divide-by-zero)

            // ── Step A: Build temporal series per species (for ||dx/dt||) ────
            // Sort samples by date ascending for temporal gradient
            const sortedSamples = [...samples].sort(
                (a, b) => new Date(a.date) - new Date(b.date)
            );
            const nSamples = sortedSamples.length;

            // Map: spName → array of relative abundances in date order
            const spTimeSeries = {};
            sortedSamples.forEach(sm => {
                const totalN = sm.totalAbundance || 1;
                Object.keys(speciesSums).forEach(spName => {
                    if (!spTimeSeries[spName]) spTimeSeries[spName] = [];
                    const tx = sm.taxa.find(t => t.name === spName);
                    spTimeSeries[spName].push(tx ? tx.count / totalN : 0);
                });
            });

            // ||dx/dt|| = mean absolute difference between consecutive time-points
            const computeTemporalRate = (series) => {
                if (series.length < 2) return 0;
                let sumDiff = 0;
                for (let k = 1; k < series.length; k++) {
                    sumDiff += Math.abs(series[k] - series[k - 1]);
                }
                return sumDiff / (series.length - 1);
            };

            // ── Step B: Global Shannon entropy per species (H(X_i)) ──────────
            // H(X_i) = -Σ_t p_it · ln(p_it)   where p_it = rel. abund at time t
            // Normalise by ln(nSamples) so H ∈ [0, 1]
            const lnN = nSamples > 1 ? Math.log(nSamples) : 1;
            const computeSpeciesEntropy = (series) => {
                let h = 0;
                const total = series.reduce((a, b) => a + b, 0);
                if (total <= 0) return 0;
                series.forEach(v => {
                    const p = v / total;
                    if (p > 0) h -= p * Math.log(p);
                });
                return h / lnN; // normalised 0–1
            };

            // ── Step C: KL divergence vs. uniform reference ───────────────────
            // D_KL(P_i || Q_i) where Q_i = uniform over nSamples time-points
            // = Σ_t p_it · ln(p_it / (1/nSamples))
            const computeKL = (series) => {
                const total = series.reduce((a, b) => a + b, 0);
                if (total <= 0 || nSamples < 2) return 0;
                const qUnif = 1 / nSamples;
                let kl = 0;
                series.forEach(v => {
                    const p = v / total;
                    if (p > 0) kl += p * Math.log(p / qUnif);
                });
                return Math.max(0, kl); // KL is non-negative by definition
            };

            // ── Step D: Per-sensitivity-group Gaussian kernels ────────────────
            // Groups j: each unique integer s_val rounded to nearest 0.5 step
            // μ_j = s_j / 5  (maps s ∈ [1..5] → μ ∈ [0.2..1])
            // σ_j = v_j / 5  (maps valence v ∈ [1..3] → σ ∈ [0.1..0.6], min 0.1)
            // w_j = 1 (uniform)  ·  Φ_j = 1 (static)
            const gaussianKernelSum = (x_i, s_val, v_val) => {
                // Single Gaussian group centred on this species' own s-class
                const mu_j  = s_val / 5;
                const sig_j = Math.max(0.1, v_val / 5);
                const diff  = x_i - mu_j;
                // exp( -0.5 · diff² / sig_j² )   (1-D covariance = sig_j²)
                return Math.exp(-0.5 * (diff * diff) / (sig_j * sig_j));
            };

            // ── Step E: Compute mean(σ_j) over all species in the sample ─────
            // Used in denominator as mean scale estimate
            const allSVals = Object.keys(speciesSums).map(nm => {
                const e = sensitivityDB[nm];
                return e ? e.v : 1;
            });
            const meanSigma = allSVals.length > 0
                ? allSVals.reduce((a, b) => a + Math.max(0.1, b / 5), 0) / allSVals.length
                : 0.3;

            // ── Step F: Assemble Ω-OSI per species ───────────────────────────
            // 3. Analyze ALL species
            const allSpeciesKeys = Object.keys(speciesSums);
            const allSpeciesAnalysis = allSpeciesKeys.map(spName => {
                const totalCount  = speciesSums[spName];
                const relAbundance = totalCount / (totalAbundanceAll || 1);

                const entry = sensitivityDB[spName];
                const sVal  = entry ? entry.s : 3.0;
                const vVal  = entry ? entry.v : 1;

                // Legacy ÖSI (kept for backward-compat fields, not displayed)
                const tolFactor = Math.max(0.5, Math.min(2.0, 2.375 - (0.375 * sVal)));
                const ösi       = (relAbundance * tolFactor) / stressForCalc; // retained internally

                // — Ω-OSI numerator components —
                // x_i: use normalised relative abundance as the "feature vector"
                const x_i = relAbundance;

                // Gaussian kernel sum (Σ_j w_j · exp(…) · Φ_j)
                const kernelSum = gaussianKernelSum(x_i, sVal, vVal);

                // Shannon entropy H(X_i) — temporal distribution
                const series  = spTimeSeries[spName] || [relAbundance];
                const H_xi    = computeSpeciesEntropy(series);

                // KL divergence D_KL(P_i || Q_i)
                const D_kl    = computeKL(series);

                // Numerator: 1 − kernelSum + λ·H + ξ·D_KL
                const numerator = Math.max(0,
                    1 - kernelSum + OMEGA_LAMBDA * H_xi + OMEGA_XI * D_kl
                );

                // — Ω-OSI denominator components —
                // G_i: normalised ecological gradient  = |s_val − 3| / 2
                const G_i = Math.abs(sVal - 3.0) / 2;

                // ||dx/dt||: temporal rate of change
                const dxdt = computeTemporalRate(series);

                // Denominator: mean(σ_j) + ε + γ·G_i + η·||dx/dt||
                const denominator = meanSigma + OMEGA_EPS
                    + OMEGA_GAMMA * G_i
                    + OMEGA_ETA   * dxdt;

                // Final Ω-OSI (clamped to [0, ∞); practically bounded by data)
                const ωosi = numerator / denominator;

                return {
                    name:        spName,
                    s:           sVal,
                    v:           vVal,
                    relAbundance,
                    ösi,            // legacy — kept for internal use
                    ωosi,           // NEW: Omega-OSI value
                    tolFactor,
                    avgStress,
                    // expose sub-components for driver analysis
                    _kernelSum:  kernelSum,
                    _H_xi:       H_xi,
                    _D_kl:       D_kl,
                    _G_i:        G_i,
                    _dxdt:       dxdt,
                    _numerator:  numerator,
                    _denominator: denominator
                };
            });

            // Sort by abundance to get dominant
            const sortedByAbundance = [...allSpeciesAnalysis].sort((a, b) => b.relAbundance - a.relAbundance);
            const dominantSubset = sortedByAbundance.slice(0, 5);

            // 4. Refine Dominant Analysis with Competition Index (VI)
            // This maintains exact original logic for the dominant species output
            const dominantAnalysis = dominantSubset.map(sp => {
                let viSum = 0;
                dominantSubset.forEach(other => {
                    if (other.name === sp.name) return;
                    const denom = sp.relAbundance + other.relAbundance;
                    if (denom > 0) {
                        viSum += Math.abs(sp.relAbundance - other.relAbundance) / denom;
                    }
                });
                
                return {
                    ...sp,
                    vi: viSum // Add the VI specifically for the dominant report
                };
            });

            return {
                dominant: dominantAnalysis,
                all: allSpeciesAnalysis.sort((a,b) => b.relAbundance - a.relAbundance) // Return all, sorted
            };
        }




        // --- INDICES ---
        function calculateIndices(sample, speciesDb) {
            const taxa = sample.taxa;
            const N = sample.totalAbundance;
            const S = taxa.length; 

            // Shannon (H')
            const shannon = -taxa.reduce((acc, t) => {
                const p = t.count / N;
                return acc + (p * Math.log(p));
            }, 0);

            // Simpson (D) & 1-D
            const simpsonD = taxa.reduce((acc, t) => acc + (t.count/N)**2, 0);
            
            // Pielou Evenness (J')
            const pielou = S > 1 ? shannon / Math.log(S) : 0;

            // Margalef
            const margalef = N > 1 ? (S - 1) / Math.log(N) : 0;

            // IPS Proxy - Same DB as above for completeness (Simplified for length constraints in this view, assuming worker scope)
            // (Note: The DB is identical to the one in performDominantAnalysis in practice)
            const sensitivityDB = (speciesDb && speciesDb.sensitivityDB_ips) ? speciesDb.sensitivityDB_ips : {};
            const diTpOptima = (speciesDb && speciesDb.diTpOptima) ? speciesDb.diTpOptima : {};
            const diPhOptima = (speciesDb && speciesDb.diPhOptima) ? speciesDb.diPhOptima : {};
            const spearSensitive = new Set((speciesDb && speciesDb.spearSensitive) ? speciesDb.spearSensitive : []);
            
            // Full DB access assumed for worker. Using partial list for brevity above, but logic remains.
            
            let ipsNum = 0, ipsDen = 0, tolerantCount = 0, sensitiveCount = 0;
            let coveredAbundance = 0;
            
            taxa.forEach(t => {
                const taxonName = t.name.trim();
                const dbEntry = sensitivityDB[taxonName]; // Simplified lookup in this view
                
                if (dbEntry) {
                    coveredAbundance += t.count;
                    ipsNum += t.count * dbEntry.s * dbEntry.v;
                    ipsDen += t.count * dbEntry.v;

                    if (dbEntry.s < 2.5) tolerantCount += t.count;
                    if (dbEntry.s > 4.0) sensitiveCount += t.count;
                } else {
                    // Fallback for logic consistency
                    const vals = {s: 3.0, v: 1};
                    ipsNum += t.count * vals.s * vals.v;
                    ipsDen += t.count * vals.v;
                }
            });

            const ips = ipsDen > 0 ? ipsNum / ipsDen : null;
            const ipsCoverage = N > 0 ? (coveredAbundance / N) * 100 : 0;
            
            const env = sample.env;
            const doSat = (env.dissolved_oxygen_mg_L && env.temperature_c) 
                ? (env.dissolved_oxygen_mg_L / (14.6 - 0.4*env.temperature_c)) * 100
                : null;
            
            const nutrientRatio = (env.nitrate_mg_L && env.phosphate_mg_L) 
                ? env.nitrate_mg_L / env.phosphate_mg_L 
                : null;


            // ── Chao1 richness estimator ──────────────────────────────────────
            const f1 = taxa.filter(t => t.count === 1).length; // singletons
            const f2 = taxa.filter(t => t.count === 2).length; // doubletons
            const chao1 = f2 > 0
                ? S + (f1 * f1) / (2 * f2)
                : S + (f1 * (f1 - 1)) / 2;

            // ── DI-TP: Weighted-averaging inferred Total Phosphorus (µg/L) ────
            let diTpNum = 0, diTpDen = 0;
            taxa.forEach(t => {
                const opt = diTpOptima[t.name.trim()];
                if (opt !== undefined) { diTpNum += t.count * opt; diTpDen += t.count; }
            });
            const diTp = diTpDen > 0 ? diTpNum / diTpDen : null;

            // ── DI-pH: Weighted-averaging inferred pH ─────────────────────────
            let diPhNum = 0, diPhDen = 0;
            taxa.forEach(t => {
                const opt = diPhOptima[t.name.trim()];
                if (opt !== undefined) { diPhNum += t.count * opt; diPhDen += t.count; }
            });
            const diPh = diPhDen > 0 ? diPhNum / diPhDen : null;

            // ── SPEAR_diatoms: % sensitive species (pesticide indicator) ──────
            // Denominator: coveredAbundance (IPS-DB taxa only), not N (all taxa).
            // Unlabeled species must not dilute the index — only classified taxa count.
            let spearSens = 0;
            taxa.forEach(t => { if (spearSensitive.has(t.name.trim())) spearSens += t.count; });
            const spear = coveredAbundance > 0 ? (spearSens / coveredAbundance) * 100 : null;

            return {
                shannon, simpson1D: 1 - simpsonD, pielou, richness: S, margalef,
                ips, ipsCoverage,
                pctTolerant: (tolerantCount/N)*100,
                pctSensitive: (sensitiveCount/N)*100,
                doSat, nutrientRatio,
                tdi: ips ? (5.5 - ips) * 20 : null,
                chao1: chao1,
                diTp: diTp,
                diPh: diPh,
                spear: spear,
            };
        }

        function performSpeciesEnvironmentAnalysis(samples, config) {
            const envKeys = [
                'temperature_c', 'conductivity_uS_cm', 'pH', 'tds_mg_L', 
                'dissolved_oxygen_mg_L', 'nitrate_mg_L', 'phosphate_mg_L',
                'turbidity_NTU', 'ammonium_mg_L', 'silicate_mg_L'
            ];

            const allSpeciesMap = new Map();
            samples.forEach(s => s.taxa.forEach(t => {
                if(!allSpeciesMap.has(t.name)) allSpeciesMap.set(t.name, 0);
                allSpeciesMap.set(t.name, allSpeciesMap.get(t.name) + 1);
            }));

            const minOccurrences = samples.length < 5 ? 2 : 3;
            const targetSpecies = Array.from(allSpeciesMap.keys())
                .filter(name => allSpeciesMap.get(name) >= minOccurrences);

            const results = [];

            targetSpecies.forEach(sp => {
                envKeys.forEach(param => {
                    const validSamples = samples.filter(s => s.env[param] != null && s.env[param] !== "");
                    if (validSamples.length < 3) return;

                    const x = validSamples.map(s => parseFloat(s.env[param]));
                    const y = validSamples.map(s => {
                        const t = s.taxa.find(tx => tx.name === sp);
                        return t ? t.count / s.totalAbundance : 0;
                    });

                    const rho = calculateSpearman(x, y);

                    let num = 0, den = 0;
                    let values = [];
                    for(let i=0; i<x.length; i++) {
                        num += y[i] * x[i];
                        den += y[i];
                    }
                    const optimum = den > 0 ? num / den : null;
                    
                    let tolerance = 0;
                    if (optimum != null && den > 0) {
                        let varSum = 0;
                        for(let i=0; i<x.length; i++) {
                            varSum += y[i] * ((x[i] - optimum) ** 2);
                        }
                        tolerance = Math.sqrt(varSum / den);
                    }

                    let stabilityCount = 0;
                    const iterations = 1000;
                    for(let k=0; k<iterations; k++) {
                        const idxs = Array.from({length: x.length}, () => Math.floor(Math.random() * x.length));
                        const rx = idxs.map(i => x[i]);
                        const ry = idxs.map(i => y[i]);
                        const rRho = calculateSpearman(rx, ry);
                        if (Math.sign(rRho) === Math.sign(rho) && Math.abs(rRho) > 0.1) stabilityCount++;
                    }
                    const stability = stabilityCount / iterations;

                    const effectSize = rho;
                    
                    const n_local = validSamples.length;
                    const presentCount = validSamples.filter((s, i) => y[i] > 0).length;
                    
                    const dataCoverageScore = Math.min(1, presentCount / n_local);
                    const effectSizeScore = Math.min(1, Math.abs(effectSize) / 1.0);
                    const stabilityScore = stability;
                    const modelFitScore = Math.abs(rho); 

                    const rawConf = 0.30*dataCoverageScore + 0.30*effectSizeScore + 0.25*stabilityScore + 0.15*modelFitScore;
                    const sampleFactor = Math.min(1, n_local / 20);
                    const confidence = Math.round(100 * rawConf * sampleFactor);

                    if (Math.abs(rho) > 0.3 || confidence > 20) {
                        results.push({
                            species: sp,
                            parameter: param,
                            n: n_local,
                            present_n: presentCount,
                            rho: rho,
                            optimum: optimum,
                            tolerance: tolerance,
                            confidence: confidence,
                            stability: stability
                        });
                    }
                });
            });

            return results.sort((a,b) => b.confidence - a.confidence);
        }

        function calculateSpearman(x, y) {
            const n = x.length;
            if (n < 3) return 0;
            const rank = (arr) => {
                const sorted = arr.map((v, i) => ({v, i})).sort((a, b) => a.v - b.v);
                const ranks = new Array(n).fill(0);
                let i = 0;
                while (i < n) {
                    let j = i;
                    while (j < n - 1 && sorted[j].v === sorted[j+1].v) j++;
                    const r = (i + j + 2) / 2;
                    for (let k = i; k <= j; k++) ranks[sorted[k].i] = r;
                    i = j + 1;
                }
                return ranks;
            };
            const rx = rank(x);
            const ry = rank(y);
            let dSum = 0;
            for(let i=0; i<n; i++) dSum += (rx[i] - ry[i])**2;
            return 1 - ((6 * dSum) / (n * (n**2 - 1)));
        }

        function calculateAggregatedStats(samples) {

                    const variance = vals.reduce((a,b)=>a+(b-mean)**2,0) / vals.length;
                    stats[k] = { mean, sd: Math.sqrt(variance), min: Math.min(...vals), max: Math.max(...vals) };
                }
            });
            return stats;

                        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                        if (jsonData.length === 0) return alert("Empty file.");

                        const newSamples = [];
                        const currentConfig = getEnvConfig();
                        const validEnvKeys = [...currentConfig.mandatory, ...currentConfig.optional].map(k => k.key);

                        jsonData.forEach((row, idx) => {
                            let site_id = row['site_id'] || row['site'] || row['viztest'] || row['Site'] || `Import_${new Date().toLocaleDateString()}`;
                            let rowDate = row['date'] || row['datum'] || row['Date'];
                            
                            if (rowDate instanceof Date) {
                                rowDate = rowDate.toISOString().split('T')[0];
                            } else if (!rowDate) {
                                rowDate = new Date().toISOString().split('T')[0];
                            }

                            const env = {};
                            const taxa = [];

                            Object.keys(row).forEach(key => {
                                const cleanKey = key.trim();
                                if (['site_id', 'site', 'viztest', 'Site', 'date', 'datum', 'Date'].includes(cleanKey)) return;

                                const matchedEnv = validEnvKeys.find(k => k.toLowerCase() === cleanKey.toLowerCase());
                                
                                if (matchedEnv) {
                                    env[matchedEnv] = row[key];
                                } else {
                                    const val = parseFloat(row[key]);
                                    if (!isNaN(val) && val > 0) {
                                        taxa.push({ name: cleanKey, count: val });
                                    }
                                }
                            });

                            if (taxa.length > 0) {
                                newSamples.push({
                                    id: `imp_${Date.now()}_${idx}`,
                                    site_id: String(site_id),
                                    date: String(rowDate),
                                    env,
                                    taxa,
                                    meta: { notes: 'Import' }
                                });
                            }
                        });

                        if (newSamples.length > 0) {
                            if (confirm(`${newSamples.length} ${t('samples')} found. Import?`)) {
                                setSamplings(prev => [...prev, ...newSamples]);
                                setOpenFolders(prev => ({...prev, [newSamples[0].site_id]: true}));
                            }
                        } else {
                            alert("No valid samples found.");
                        }

                    } catch (err) {
                        console.error(err);
                        alert("Error: " + err.message);
                    }
                    if (fileInputRef.current) fileInputRef.current.value = '';
                };
                reader.readAsArrayBuffer(file);
            };

            const envConfig = getEnvConfig();

            if (view === 'report' && analysisData) {
                return (
                    <ReportView 
                        data={analysisData} 
                        siteId={selectedAnalysisSiteId} 
                        onBack={() => setView('input')} 
                        t={t}
                        speciesDb={speciesDb}
                        lang={lang}
                    />
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-cyan-500 p-2 rounded-lg text-slate-900">
                                    <Icon name="Flask" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-black text-xl tracking-tight">{t('app_title')} <span className="text-cyan-400">v8.1.3</span></h1>
                                    <p className="text-xs text-slate-400 font-mono">{t('subtitle')}</p>
                                </div>
                            </div>
                            <div className="flex gap-2 items-center">
                                {/* LANGUAGE SELECTOR */}
                                <select 
                                    value={lang} 
                                    onChange={(e) => setLang(e.target.value)}
                                    className="bg-slate-800 text-slate-200 text-xs font-bold py-2 px-3 rounded border border-slate-700 outline-none focus:border-cyan-500 cursor-pointer"
                                >
                                    {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.label}</option>)}
                                </select>

                                <button 
                                    onClick={runAnalysis} 
                                    disabled={!selectedAnalysisSiteId || isProcessing || !speciesDb} 
                                    className={`px-4 py-2 rounded-lg font-bold text-sm uppercase tracking-wider flex items-center gap-2 transition-all ${
                                        selectedAnalysisSiteId 
                                        ? 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-lg shadow-cyan-900/50' 
                                        : 'bg-slate-700 text-slate-400 cursor-not-allowed'
                                    }`}
                                >
                                    {isProcessing ? t('btn_processing') : t('btn_analyze')} <Icon name="Activity" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* INPUT PANEL */}
                        <div className="lg:col-span-5 space-y-6">
                            
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                <h3 className="text-xs font-black text-slate-500 uppercase mb-3 flex items-center gap-2">
                                    <Icon name="Upload" size={14} /> {t('import_title')}
                                </h3>
                                <div className="flex gap-2">
                                    <input 
                                        type="file" 
                                        ref={fileInputRef}
                                        accept=".xlsx, .xls, .csv" 
                                        onChange={handleFileUpload}
                                        className="hidden"
                                        id="file-upload"
                                    />
                                    <label htmlFor="file-upload" className="flex-1 cursor-pointer bg-slate-50 border border-dashed border-slate-300 rounded-lg p-3 text-center hover:bg-slate-100 transition-colors">
                                        <div className="text-xs font-bold text-slate-600">{t('import_hint')}</div>
                                        <div className="text-[10px] text-slate-400 mt-1">{t('import_subhint')}</div>
                                    </label>
                                </div>
                                <p className="text-[10px] text-slate-400 mt-2 px-1">
                                    {t('import_tip')}
                                </p>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-cyan-500">
                                <h2 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2">
                                    <Icon name="Database" size={20} className="text-cyan-600"/> {t('new_sample_title')}
                                </h2>

                                <div className="space-y-5">
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <label className="block text-xs font-bold text-slate-600 uppercase mb-2">{t('site_label')}</label>
                                        <div className="flex flex-col gap-2">
                                            <input 
                                                list="sites-list" 
                                                type="text" 
                                                value={inputSiteId} 
                                                onChange={e => setInputSiteId(e.target.value)}
                                                className="w-full bg-white border border-slate-300 rounded p-2 text-sm font-bold text-slate-800 focus:border-cyan-500 outline-none" 
                                                placeholder={t('site_placeholder')}
                                            />
                                            <datalist id="sites-list">
                                                {existingSites.map(site => (
                                                    <option key={site} value={site} />
                                                ))}
                                            </datalist>
                                            <p className="text-[10px] text-slate-400">
                                                {t('site_note')}
                                            </p>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">{t('date_label')}</label>
                                        <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded p-2" />
                                    </div>

                                    <div className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                                        <h3 className="text-xs font-black text-slate-900 uppercase mb-3 border-b pb-1">{t('mandatory_params')}</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            {envConfig.mandatory.map(field => (
                                                <div key={field.key}>
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1">{field.label} ({field.unit})</label>
                                                    <input 
                                                        type="number" 
                                                        step="0.1"
                                                        value={env[field.key] || ''} 
                                                        onChange={e=>handleEnvChange(field.key, e.target.value)}
                                                        className="w-full bg-white border border-slate-300 rounded p-1.5 text-sm font-mono focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none"
                                                        placeholder="-"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                                        <h3 className="text-xs font-black text-slate-900 uppercase mb-3 border-b pb-1">{t('optional_params')}</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            {envConfig.optional.map(field => (
                                                <div key={field.key}>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1 truncate" title={field.label}>{field.label}</label>
                                                    <div className="relative">
                                                        <input 
                                                            type="number" 
                                                            step="0.01"
                                                            value={env[field.key] || ''} 
                                                            onChange={e=>handleEnvChange(field.key, e.target.value)}
                                                            className="w-full bg-white border border-slate-200 rounded p-1.5 text-sm font-mono text-slate-600 focus:border-cyan-500 outline-none pr-8"
                                                        />
                                                        <span className="absolute right-2 top-1.5 text-[9px] text-slate-400">{field.unit}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">{t('taxa_list')}</label>
                                            <span className="text-[10px] text-cyan-600 cursor-help" title="Paste from Excel: Name [TAB] Count">Excel</span>
                                        </div>
                                        <textarea 
                                            value={taxaText} 
                                            onChange={e=>setTaxaText(e.target.value)} 
                                            placeholder={t('taxa_hint')}
                                            className="w-full h-32 bg-slate-50 border border-slate-200 rounded p-2 text-xs font-mono"
                                        ></textarea>
                                    </div>

                                    <button onClick={addSample} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-lg font-bold text-sm uppercase tracking-widest shadow-lg transition-all active:scale-95">
                                        {t('btn_record')}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* DATA LIST PANEL */}
                        <div className="lg:col-span-7">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 min-h-[600px] flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                                    <div>
                                        <h2 className="text-lg font-black text-slate-800">{t('list_title')}</h2>
                                        <div className="text-xs text-slate-400 font-mono mt-1">{t('list_total')}: {existingSites.length}, {samplings.length} {t('samples')}</div>
                                    </div>
                                    <button onClick={()=>{if(confirm('Delete All?')) setSamplings([])}} className="text-slate-400 hover:text-red-500 transition-colors" title={t('delete_all')}>
                                        <Icon name="Trash" />
                                    </button>
                                </div>
                                
                                <div className="p-4 space-y-4 flex-1 overflow-y-auto max-h-[800px]">
                                    {existingSites.length === 0 && (
                                        <div className="text-center py-20 opacity-40">
                                            <Icon name="FolderOpen" size={48} className="mx-auto mb-4 text-slate-300" />
                                            <p className="font-bold text-slate-500">{t('folder_empty')}</p>
                                            <p className="text-sm">{t('folder_empty_hint')}</p>
                                        </div>
                                    )}

                                    {existingSites.map(siteId => {
                                        const siteSamples = groupedSamplings[siteId];
                                        const isOpen = openFolders[siteId];
                                        const isSelected = selectedAnalysisSiteId === siteId;

                                        return (
                                            <div key={siteId} className={`border rounded-xl transition-all overflow-hidden ${isSelected ? 'border-cyan-400 ring-1 ring-cyan-100' : 'border-slate-200'}`}>
                                                <div className={`p-3 flex items-center justify-between cursor-pointer select-none ${isSelected ? 'bg-cyan-50' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                                    <div className="flex items-center gap-3 flex-1" onClick={() => toggleFolder(siteId)}>
                                                        <div className="text-slate-400">
                                                            {isOpen ? <Icon name="FolderOpen" className="text-cyan-600"/> : <Icon name="Folder" />}
                                                        </div>
                                                        <div>
                                                            <h3 className="font-bold text-slate-800 text-sm">{siteId}</h3>
                                                            <div className="text-[10px] text-slate-500 font-mono flex gap-2">
                                                                <span>{siteSamples.length} {t('samples')}</span>
                                                                {siteSamples.length < 5 && <span className="text-amber-600 font-bold">(n&lt;5)</span>}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-4">
                                                        <label className="flex items-center gap-2 cursor-pointer px-3 py-1 rounded hover:bg-white/50 border border-transparent hover:border-slate-200 transition-all">
                                                            <input 
                                                                type="radio" 
                                                                name="analysis-site-select" 
                                                                checked={isSelected} 
                                                                onChange={() => setSelectedAnalysisSiteId(siteId)}
                                                                className="accent-cyan-600 w-4 h-4 cursor-pointer"
                                                            />
                                                            <span className={`text-xs font-bold uppercase ${isSelected ? 'text-cyan-700' : 'text-slate-400'}`}>
                                                                {isSelected ? t('selected') : t('select_analysis')}
                                                            </span>
                                                        </label>

                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); deleteSite(siteId); }}
                                                            className="text-slate-300 hover:text-red-500 p-2"
                                                        >
                                                            <Icon name="Trash" size={14}/>
                                                        </button>

                                                        <div onClick={() => toggleFolder(siteId)} className="text-slate-400 p-1">
                                                            {isOpen ? <Icon name="ChevronDown" size={16}/> : <Icon name="ChevronRight" size={16}/>}
                                                        </div>
                                                    </div>
                                                </div>

                                                {isOpen && (
                                                    <div className="bg-white border-t border-slate-100 p-2 space-y-2">
                                                        {siteSamples.map(s => (
                                                            <div key={s.id} className="flex justify-between items-center p-2 rounded hover:bg-slate-50 border border-transparent hover:border-slate-100 group ml-6 border-l-2 border-l-slate-200">
                                                                <div className="flex gap-4 items-center">
                                                                    <div className="font-mono text-xs font-bold text-slate-700 w-24">{s.date}</div>
                                                                    <div className="text-xs text-slate-500">
                                                                        <span className="font-bold">{s.taxa.length} taxa</span>, {s.taxa.reduce((a,b)=>a+b.count,0)} ind.
                                                                    </div>
                                                                    <div className="flex gap-2 text-[10px] text-slate-400 font-mono">
                                                                         {s.env.pH && <span>pH:{s.env.pH}</span>}
                                                                         {s.env.conductivity_uS_cm && <span>Cond:{s.env.conductivity_uS_cm}</span>}
                                                                    </div>
                                                                </div>
                                                                <button onClick={()=>deleteSample(s.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <Icon name="Trash" size={14} />
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // --- REPORT COMPONENT ---
        const ReportView = ({ data, siteId, onBack, t, speciesDb, lang }) => {

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const chartRefAll = useRef(null); // Reference for the new All Taxa chart
            const chartInstanceAll = useRef(null);
            const chartRefTrophic = useRef(null); // Reference for trophic pie chart
            const chartInstanceTrophic = useRef(null);
            const chartRefOmega = useRef(null);   // NEW: Ω-OSI timeline chart
            const chartInstanceOmega = useRef(null);
            
            const [missingParams, setMissingParams] = useState([]);

            // Main Chart (Dominant + Env)
            useEffect(() => {
                if (data.dominantAnalysis && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
