                const WORKER_CODE = `        self.onmessage = function(e) {

        // --- STATISZTIKAI MOTOR (Worker Scope) ---

        function runFullAnalysis(samplings, config, speciesDb) {
            const n = samplings.length;
            const isHypothesis = n < 5;
            
            // 1. Adat transzformáció és validálás
            const processedSamples = samplings.map(s => ({
                ...s,
                totalAbundance: s.taxa.reduce((a,b) => a + b.count, 0)
            }));

            // 2. Index számítások mintánként
            const samplesWithIndices = processedSamples.map(s => {
                const indices = calculateIndices(s, speciesDb);
                return { ...s, indices };
            });

            // 3. Faj-Környezet elemzés (csak ha n >= 3, különben nagyon instabil)
            let speciesAnalysis = [];
            if (n >= 3) {
                speciesAnalysis = performSpeciesEnvironmentAnalysis(samplesWithIndices, config);
            }

            // 4. Aggregált statisztikák
            const aggregatedStats = calculateAggregatedStats(samplesWithIndices);

            // --- NEW: DOMINANT SPECIES EXTENDED ANALYSIS (v8.1.4 Extension) ---
            // UPDATE: Returns both dominant (top 5) and all species stats
            const fullEcologicalAnalysis = performDominantAnalysis(processedSamples, speciesDb);
            const dominantAnalysis = fullEcologicalAnalysis.dominant;
            const allSpeciesAnalysis = fullEcologicalAnalysis.all;

            // 5. Harmful species analysis (toxic / gill-damaging)
            // Computed here in the worker where speciesDb is available
            const _toxicSet     = new Set((speciesDb && speciesDb.toxicDB)        ? speciesDb.toxicDB        : []);
            const _gillPhysSet  = new Set((speciesDb && speciesDb.gillPhysicalDB) ? speciesDb.gillPhysicalDB : []);
            const _gillBloomSet = new Set((speciesDb && speciesDb.gillBloomDB)    ? speciesDb.gillBloomDB    : []);
            let _toxicCount = 0, _gillPhysCount = 0, _gillBloomCount = 0, _totalWithDB = 0;
            const _detectedToxic = [], _detectedGillPhys = [], _detectedGillBloom = [];
            samplesWithIndices.forEach(function(sample) {
                sample.taxa.forEach(function(t) {
                    var name = t.name.trim();
                    _totalWithDB++;
                    if (_toxicSet.has(name))     { _toxicCount++;     if (_detectedToxic.indexOf(name) === -1)     _detectedToxic.push(name); }
                    if (_gillPhysSet.has(name))  { _gillPhysCount++;  if (_detectedGillPhys.indexOf(name) === -1)  _detectedGillPhys.push(name); }
                    if (_gillBloomSet.has(name)) { _gillBloomCount++; if (_detectedGillBloom.indexOf(name) === -1) _detectedGillBloom.push(name); }
                });
            });
            const harmfulSpecies = {
                toxicCount:       _toxicCount,
                gillPhysCount:    _gillPhysCount,
                gillBloomCount:   _gillBloomCount,
                totalWithDB:      _totalWithDB,
                detectedToxic:    _detectedToxic,
                detectedGillPhys: _detectedGillPhys,
                detectedGillBloom:_detectedGillBloom,
                toxicRatio:    _totalWithDB > 0 ? (_toxicCount    / _totalWithDB) * 100 : 0,
                gillPhysRatio: _totalWithDB > 0 ? (_gillPhysCount / _totalWithDB) * 100 : 0,
                gillBloomRatio:_totalWithDB > 0 ? (_gillBloomCount/ _totalWithDB) * 100 : 0
            };

            return {
                n,
                isHypothesis,
                samples: samplesWithIndices,
                speciesAnalysis,
                aggregatedStats,
                dominantAnalysis, 
                allSpeciesAnalysis,
                harmfulSpecies,
                timestamp: new Date().toISOString()
            };
        }

        // --- NEW FUNCTION: DOMINANT ANALYSIS (v8.1.4) ---
        function performDominantAnalysis(samples, speciesDb) {
            const sensitivityDB = (speciesDb && speciesDb.sensitivityDB) ? speciesDb.sensitivityDB : {};

            // 1. Identify Dominant Species (Top 5 by total abundance) AND All Species
            const speciesSums = {};
            let totalAbundanceAll = 0;
            samples.forEach(s => {
                totalAbundanceAll += s.totalAbundance;
                s.taxa.forEach(t => {
                    speciesSums[t.name] = (speciesSums[t.name] || 0) + t.count;
                });
            });

            // 2. Env Stress Calculation (Normalized)
            const params = ['nitrate_mg_L', 'phosphate_mg_L', 'conductivity_uS_cm'];
            const bounds = {};
            params.forEach(p => {
                const vals = samples.map(s => parseFloat(s.env[p])).filter(v => !isNaN(v));
                if (vals.length > 0) bounds[p] = { min: Math.min(...vals), max: Math.max(...vals) };
            });

            const getSampleStress = (s) => {
                let sum = 0, count = 0;
                params.forEach(p => {
                    const val = parseFloat(s.env[p]);
                    if (!isNaN(val) && bounds[p] && bounds[p].max > bounds[p].min) {
                        sum += (val - bounds[p].min) / (bounds[p].max - bounds[p].min);
                        count++;
                    }
                });
                return count > 0 ? sum / count : 0.5;
            };
            
            const avgStress = samples.reduce((acc, s) => acc + getSampleStress(s), 0) / (samples.length || 1);
            const stressForCalc = Math.max(0.1, avgStress);

            // 3. Analyze ALL species (Additive Change)
            const allSpeciesKeys = Object.keys(speciesSums);
            const allSpeciesAnalysis = allSpeciesKeys.map(spName => {
                const totalCount = speciesSums[spName];
                const relAbundance = totalCount / (totalAbundanceAll || 1);
                
                const entry = sensitivityDB[spName];
                const sVal = entry ? entry.s : 3.0;
                const vVal = entry ? entry.v : 1;
                
                // Note: VI is computationally expensive O(N^2), so we only calculate it fully for the Dominant subset below.
                // For the "All Species" overview, we omit VI or set to 0.
                
                const tolFactor = Math.max(0.5, Math.min(2.0, 2.375 - (0.375 * sVal)));
                const ösi = (relAbundance * tolFactor) / stressForCalc;

                return {
                    name: spName,
                    s: sVal,
                    v: vVal,
                    relAbundance,
                    ösi,
                    tolFactor,
                    avgStress
                };
            });

            // Sort by abundance to get dominant
            const sortedByAbundance = [...allSpeciesAnalysis].sort((a, b) => b.relAbundance - a.relAbundance);
            const dominantSubset = sortedByAbundance.slice(0, 5);

            // 4. Refine Dominant Analysis with Competition Index (VI)
            // This maintains exact original logic for the dominant species output
            const dominantAnalysis = dominantSubset.map(sp => {
                let viSum = 0;
                dominantSubset.forEach(other => {
                    if (other.name === sp.name) return;
                    const denom = sp.relAbundance + other.relAbundance;
                    if (denom > 0) {
                        viSum += Math.abs(sp.relAbundance - other.relAbundance) / denom;
                    }
                });
                
                return {
                    ...sp,
                    vi: viSum // Add the VI specifically for the dominant report
                };
            });

            return {
                dominant: dominantAnalysis,
                all: allSpeciesAnalysis.sort((a,b) => b.relAbundance - a.relAbundance) // Return all, sorted
            };
        }




        // --- INDICES ---
        function calculateIndices(sample, speciesDb) {
            const taxa = sample.taxa;
            const N = sample.totalAbundance;
            const S = taxa.length; 

            // Shannon (H')
            const shannon = -taxa.reduce((acc, t) => {
                const p = t.count / N;
                return acc + (p * Math.log(p));
            }, 0);

            // Simpson (D) & 1-D
            const simpsonD = taxa.reduce((acc, t) => acc + (t.count/N)**2, 0);
            
            // Pielou Evenness (J')
            const pielou = S > 1 ? shannon / Math.log(S) : 0;

            // Margalef
            const margalef = N > 1 ? (S - 1) / Math.log(N) : 0;

            // IPS Proxy - Same DB as above for completeness (Simplified for length constraints in this view, assuming worker scope)
            // (Note: The DB is identical to the one in performDominantAnalysis in practice)
            const sensitivityDB = (speciesDb && speciesDb.sensitivityDB_ips) ? speciesDb.sensitivityDB_ips : {};
            const diTpOptima = (speciesDb && speciesDb.diTpOptima) ? speciesDb.diTpOptima : {};
            const diPhOptima = (speciesDb && speciesDb.diPhOptima) ? speciesDb.diPhOptima : {};
            const spearSensitive = new Set((speciesDb && speciesDb.spearSensitive) ? speciesDb.spearSensitive : []);
            
            // Full DB access assumed for worker. Using partial list for brevity above, but logic remains.
            
            let ipsNum = 0, ipsDen = 0, tolerantCount = 0, sensitiveCount = 0;
            let coveredAbundance = 0;
            
            taxa.forEach(t => {
                const taxonName = t.name.trim();
                const dbEntry = sensitivityDB[taxonName]; // Simplified lookup in this view
                
                if (dbEntry) {
                    coveredAbundance += t.count;
                    ipsNum += t.count * dbEntry.s * dbEntry.v;
                    ipsDen += t.count * dbEntry.v;

                    if (dbEntry.s < 2.5) tolerantCount += t.count;
                    if (dbEntry.s > 4.0) sensitiveCount += t.count;
                } else {
                    // Fallback for logic consistency
                    const vals = {s: 3.0, v: 1};
                    ipsNum += t.count * vals.s * vals.v;
                    ipsDen += t.count * vals.v;
                }
            });

            const ips = ipsDen > 0 ? ipsNum / ipsDen : null;
            const ipsCoverage = N > 0 ? (coveredAbundance / N) * 100 : 0;
            
            const env = sample.env;
            const doSat = (env.dissolved_oxygen_mg_L && env.temperature_c) 
                ? (env.dissolved_oxygen_mg_L / (14.6 - 0.4*env.temperature_c)) * 100
                : null;
            
            const nutrientRatio = (env.nitrate_mg_L && env.phosphate_mg_L) 
                ? env.nitrate_mg_L / env.phosphate_mg_L 
                : null;


            // ── Chao1 richness estimator ──────────────────────────────────────
            const f1 = taxa.filter(t => t.count === 1).length; // singletons
            const f2 = taxa.filter(t => t.count === 2).length; // doubletons
            const chao1 = f2 > 0
                ? S + (f1 * f1) / (2 * f2)
                : S + (f1 * (f1 - 1)) / 2;

            // ── DI-TP: Weighted-averaging inferred Total Phosphorus (µg/L) ────
            let diTpNum = 0, diTpDen = 0;
            taxa.forEach(t => {
                const opt = diTpOptima[t.name.trim()];
                if (opt !== undefined) { diTpNum += t.count * opt; diTpDen += t.count; }
            });
            const diTp = diTpDen > 0 ? diTpNum / diTpDen : null;

            // ── DI-pH: Weighted-averaging inferred pH ─────────────────────────
            let diPhNum = 0, diPhDen = 0;
            taxa.forEach(t => {
                const opt = diPhOptima[t.name.trim()];
                if (opt !== undefined) { diPhNum += t.count * opt; diPhDen += t.count; }
            });
            const diPh = diPhDen > 0 ? diPhNum / diPhDen : null;

            // ── SPEAR_diatoms: % sensitive species (pesticide indicator) ──────
            let spearSens = 0;
            taxa.forEach(t => { if (spearSensitive.has(t.name.trim())) spearSens += t.count; });
            const spear = N > 0 ? (spearSens / N) * 100 : null;

            return {
                shannon, simpson1D: 1 - simpsonD, pielou, richness: S, margalef,
                ips, ipsCoverage,
                pctTolerant: (tolerantCount/N)*100,
                pctSensitive: (sensitiveCount/N)*100,
                doSat, nutrientRatio,
                tdi: ips ? (5.5 - ips) * 20 : null,
                chao1: chao1,
                diTp: diTp,
                diPh: diPh,
                spear: spear,
            };
        }

        function performSpeciesEnvironmentAnalysis(samples, config) {
            const envKeys = [
                'temperature_c', 'conductivity_uS_cm', 'pH', 'tds_mg_L', 
                'dissolved_oxygen_mg_L', 'nitrate_mg_L', 'phosphate_mg_L',
                'turbidity_NTU', 'ammonium_mg_L', 'silicate_mg_L'
            ];

            const allSpeciesMap = new Map();
            samples.forEach(s => s.taxa.forEach(t => {
                if(!allSpeciesMap.has(t.name)) allSpeciesMap.set(t.name, 0);
                allSpeciesMap.set(t.name, allSpeciesMap.get(t.name) + 1);
            }));

            const minOccurrences = samples.length < 5 ? 2 : 3;
            const targetSpecies = Array.from(allSpeciesMap.keys())
                .filter(name => allSpeciesMap.get(name) >= minOccurrences);

            const results = [];

            targetSpecies.forEach(sp => {
                envKeys.forEach(param => {
                    const validSamples = samples.filter(s => s.env[param] != null && s.env[param] !== "");
                    if (validSamples.length < 3) return;

                    const x = validSamples.map(s => parseFloat(s.env[param]));
                    const y = validSamples.map(s => {
                        const t = s.taxa.find(tx => tx.name === sp);
                        return t ? t.count / s.totalAbundance : 0;
                    });

                    const rho = calculateSpearman(x, y);

                    let num = 0, den = 0;
                    let values = [];
                    for(let i=0; i<x.length; i++) {
                        num += y[i] * x[i];
                        den += y[i];
                    }
                    const optimum = den > 0 ? num / den : null;
                    
                    let tolerance = 0;
                    if (optimum != null && den > 0) {
                        let varSum = 0;
                        for(let i=0; i<x.length; i++) {
                            varSum += y[i] * ((x[i] - optimum) ** 2);
                        }
                        tolerance = Math.sqrt(varSum / den);
                    }

                    let stabilityCount = 0;
                    const iterations = 1000;
                    for(let k=0; k<iterations; k++) {
                        const idxs = Array.from({length: x.length}, () => Math.floor(Math.random() * x.length));
                        const rx = idxs.map(i => x[i]);
                        const ry = idxs.map(i => y[i]);
                        const rRho = calculateSpearman(rx, ry);
                        if (Math.sign(rRho) === Math.sign(rho) && Math.abs(rRho) > 0.1) stabilityCount++;
                    }
                    const stability = stabilityCount / iterations;

                    const effectSize = rho;
                    
                    const n_local = validSamples.length;
                    const presentCount = validSamples.filter((s, i) => y[i] > 0).length;
                    
                    const dataCoverageScore = Math.min(1, presentCount / n_local);
                    const effectSizeScore = Math.min(1, Math.abs(effectSize) / 1.0);
                    const stabilityScore = stability;
                    const modelFitScore = Math.abs(rho); 

                    const rawConf = 0.30*dataCoverageScore + 0.30*effectSizeScore + 0.25*stabilityScore + 0.15*modelFitScore;
                    const sampleFactor = Math.min(1, n_local / 20);
                    const confidence = Math.round(100 * rawConf * sampleFactor);

                    if (Math.abs(rho) > 0.3 || confidence > 20) {
                        results.push({
                            species: sp,
                            parameter: param,
                            n: n_local,
                            present_n: presentCount,
                            rho: rho,
                            optimum: optimum,
                            tolerance: tolerance,
                            confidence: confidence,
                            stability: stability
                        });
                    }
                });
            });

            return results.sort((a,b) => b.confidence - a.confidence);
        }

        function calculateSpearman(x, y) {
            const n = x.length;
            if (n < 3) return 0;
            const rank = (arr) => {
                const sorted = arr.map((v, i) => ({v, i})).sort((a, b) => a.v - b.v);
                const ranks = new Array(n).fill(0);
                let i = 0;
                while (i < n) {
                    let j = i;
                    while (j < n - 1 && sorted[j].v === sorted[j+1].v) j++;
                    const r = (i + j + 2) / 2;
                    for (let k = i; k <= j; k++) ranks[sorted[k].i] = r;
                    i = j + 1;
                }
                return ranks;
            };
            const rx = rank(x);
            const ry = rank(y);
            let dSum = 0;
            for(let i=0; i<n; i++) dSum += (rx[i] - ry[i])**2;
            return 1 - ((6 * dSum) / (n * (n**2 - 1)));
        }

        function calculateAggregatedStats(samples) {
            const stats = {};
            const keys = Object.keys(samples[0].env);
            keys.forEach(k => {
                const vals = samples.map(s => parseFloat(s.env[k])).filter(v => !isNaN(v));
                if (vals.length > 0) {
                    const sum = vals.reduce((a,b)=>a+b,0);
                    const mean = sum/vals.length;
                    const variance = vals.reduce((a,b)=>a+(b-mean)**2,0) / vals.length;
                    stats[k] = { mean, sd: Math.sqrt(variance), min: Math.min(...vals), max: Math.max(...vals) };
                }
            });
            return stats;
        }

                                                            onChange={e=>handleEnvChange(field.key, e.target.value)}
                                                            className="w-full bg-white border border-slate-200 rounded p-1.5 text-sm font-mono text-slate-600 focus:border-cyan-500 outline-none pr-8"
                                                        />
                                                        <span className="absolute right-2 top-1.5 text-[9px] text-slate-400">{field.unit}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">{t('taxa_list')}</label>
                                            <span className="text-[10px] text-cyan-600 cursor-help" title="Paste from Excel: Name [TAB] Count">Excel</span>
                                        </div>
                                        <textarea 
                                            value={taxaText} 
                                            onChange={e=>setTaxaText(e.target.value)} 
                                            placeholder={t('taxa_hint')}
                                            className="w-full h-32 bg-slate-50 border border-slate-200 rounded p-2 text-xs font-mono"
                                        ></textarea>
                                    </div>

                                    <button onClick={addSample} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-lg font-bold text-sm uppercase tracking-widest shadow-lg transition-all active:scale-95">
                                        {t('btn_record')}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* DATA LIST PANEL */}
                        <div className="lg:col-span-7">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 min-h-[600px] flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                                    <div>
                                        <h2 className="text-lg font-black text-slate-800">{t('list_title')}</h2>
                                        <div className="text-xs text-slate-400 font-mono mt-1">{t('list_total')}: {existingSites.length}, {samplings.length} {t('samples')}</div>
                                    </div>
                                    <button onClick={()=>{if(confirm('Delete All?')) setSamplings([])}} className="text-slate-400 hover:text-red-500 transition-colors" title={t('delete_all')}>
                                        <Icon name="Trash" />
                                    </button>
                                </div>
                                
                                <div className="p-4 space-y-4 flex-1 overflow-y-auto max-h-[800px]">
                                    {existingSites.length === 0 && (
                                        <div className="text-center py-20 opacity-40">
                                            <Icon name="FolderOpen" size={48} className="mx-auto mb-4 text-slate-300" />
                                            <p className="font-bold text-slate-500">{t('folder_empty')}</p>
                                            <p className="text-sm">{t('folder_empty_hint')}</p>
                                        </div>
                                    )}

                                    {existingSites.map(siteId => {
                                        const siteSamples = groupedSamplings[siteId];
                                        const isOpen = openFolders[siteId];
                                        const isSelected = selectedAnalysisSiteId === siteId;

                                        return (
                                            <div key={siteId} className={`border rounded-xl transition-all overflow-hidden ${isSelected ? 'border-cyan-400 ring-1 ring-cyan-100' : 'border-slate-200'}`}>
                                                <div className={`p-3 flex items-center justify-between cursor-pointer select-none ${isSelected ? 'bg-cyan-50' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                                    <div className="flex items-center gap-3 flex-1" onClick={() => toggleFolder(siteId)}>
                                                        <div className="text-slate-400">
                                                            {isOpen ? <Icon name="FolderOpen" className="text-cyan-600"/> : <Icon name="Folder" />}
                                                        </div>
                                                        <div>
                                                            <h3 className="font-bold text-slate-800 text-sm">{siteId}</h3>
                                                            <div className="text-[10px] text-slate-500 font-mono flex gap-2">
                                                                <span>{siteSamples.length} {t('samples')}</span>
                                                                {siteSamples.length < 5 && <span className="text-amber-600 font-bold">(n&lt;5)</span>}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-4">
                                                        <label className="flex items-center gap-2 cursor-pointer px-3 py-1 rounded hover:bg-white/50 border border-transparent hover:border-slate-200 transition-all">
                                                            <input 
                                                                type="radio" 
                                                                name="analysis-site-select" 
                                                                checked={isSelected} 
                                                                onChange={() => setSelectedAnalysisSiteId(siteId)}
                                                                className="accent-cyan-600 w-4 h-4 cursor-pointer"
                                                            />
                                                            <span className={`text-xs font-bold uppercase ${isSelected ? 'text-cyan-700' : 'text-slate-400'}`}>
                                                                {isSelected ? t('selected') : t('select_analysis')}
                                                            </span>
                                                        </label>

                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); deleteSite(siteId); }}
                                                            className="text-slate-300 hover:text-red-500 p-2"
                                                        >
                                                            <Icon name="Trash" size={14}/>
                                                        </button>

                                                        <div onClick={() => toggleFolder(siteId)} className="text-slate-400 p-1">
                                                            {isOpen ? <Icon name="ChevronDown" size={16}/> : <Icon name="ChevronRight" size={16}/>}
                                                        </div>
                                                    </div>
                                                </div>

                                                {isOpen && (
                                                    <div className="bg-white border-t border-slate-100 p-2 space-y-2">
                                                        {siteSamples.map(s => (
                                                            <div key={s.id} className="flex justify-between items-center p-2 rounded hover:bg-slate-50 border border-transparent hover:border-slate-100 group ml-6 border-l-2 border-l-slate-200">
                                                                <div className="flex gap-4 items-center">
                                                                    <div className="font-mono text-xs font-bold text-slate-700 w-24">{s.date}</div>
                                                                    <div className="text-xs text-slate-500">
                                                                        <span className="font-bold">{s.taxa.length} taxa</span>, {s.taxa.reduce((a,b)=>a+b.count,0)} ind.
                                                                    </div>
                                                                    <div className="flex gap-2 text-[10px] text-slate-400 font-mono">
                                                                         {s.env.pH && <span>pH:{s.env.pH}</span>}
                                                                         {s.env.conductivity_uS_cm && <span>Cond:{s.env.conductivity_uS_cm}</span>}
                                                                    </div>
                                                                </div>
                                                                <button onClick={()=>deleteSample(s.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <Icon name="Trash" size={14} />
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // --- REPORT COMPONENT ---
        const ReportView = ({ data, siteId, onBack, t }) => {

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const chartRefAll = useRef(null); // Reference for the new All Taxa chart
            const chartInstanceAll = useRef(null);
            
            const [missingParams, setMissingParams] = useState([]);

            // Main Chart (Dominant + Env)
            useEffect(() => {
                if (data.dominantAnalysis && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    
                    const sortedSamples = [...data.samples].sort((a,b) => new Date(a.date) - new Date(b.date));
                    const labels = sortedSamples.map(s => s.date);
                    
                    const datasets = [];
                    const missing = [];

                    data.dominantAnalysis.forEach((sp, idx) => {
                        const colors = ['#0891b2', '#0d9488', '#e11d48', '#d97706', '#7c3aed'];
                        const dataPoints = sortedSamples.map(s => {
                            const taxon = s.taxa.find(t => t.name === sp.name);
                            return taxon ? taxon.count : 0;
                        });

                        datasets.push({
                            label: sp.name,
                            data: dataPoints,
                            borderColor: colors[idx % colors.length],
                            backgroundColor: colors[idx % colors.length],
                            type: 'bar', 
                            yAxisID: 'y',
                            order: 2, 
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        });
                    });

                    // Localize labels for chart
                    const envParams = [
                        {key: 'pH', label: t('param_ph'), color: '#1e293b', axisId: 'y_ph'}, 
                        {key: 'conductivity_uS_cm', label: t('param_cond'), color: '#64748b', axisId: 'y_cond'},
                        {key: 'nitrate_mg_L', label: t('param_no3'), color: '#94a3b8', axisId: 'y_nut'} 
                    ];

                    envParams.forEach((p, i) => {
                        const vals = sortedSamples.map(s => {
                            const v = parseFloat(s.env[p.key]);
                            return isNaN(v) ? null : v;
                        });

                        const hasData = vals.some(v => v !== null);

                        if (hasData) {
                            datasets.push({
                                label: p.label,
                                data: vals,
                                borderColor: p.color,
                                borderDash: i === 0 ? [] : [5, 5], 
                                borderWidth: 2,
                                pointRadius: 3,
                                type: 'line',
                                yAxisID: p.axisId,
                                tension: 0.3,
                                order: 1 
                            });
                        } else {
                            missing.push(p.label);
                        }
                    });

                    setMissingParams(missing);

                    if (chartInstance.current) chartInstance.current.destroy();

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { position: 'bottom' },
                                title: { display: true, text: t('chart_title') },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) { label += ': '; }
                                            if (context.parsed.y !== null) { label += context.parsed.y; }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: { title: { display: true, text: t('chart_x') } },
                                y: {
                                    type: 'linear', display: true, position: 'left',
                                    title: { display: true, text: t('chart_y_left') },
                                    grid: { drawOnChartArea: true }
                                },
                                y_ph: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_ph'),
                                    position: 'right', title: { display: true, text: 'pH' },
                                    grid: { drawOnChartArea: false },
                                    suggestedMin: 6, suggestedMax: 9
                                },
                                y_cond: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_cond'),
                                    position: 'right', title: { display: true, text: 'Cond' },
                                    grid: { drawOnChartArea: false },
                                },
                                y_nut: {
                                    type: 'linear',
                                    display: datasets.some(d => d.yAxisID === 'y_nut'), 
                                    position: 'right', title: { display: true, text: 'NO3' },
                                    grid: { drawOnChartArea: false },
                                }
                            }
                        }
                    });
                }
                
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data, t]);


            // NEW: All Taxa ÖSI Chart
            useEffect(() => {
                if (data.allSpeciesAnalysis && chartRefAll.current) {
                    const ctx = chartRefAll.current.getContext('2d');
                    
                    // Filter or Limit? No, instruction says ALL. 
                    // To keep it readable, we display them sorted by abundance.
                    // We can limit top 30 or 50 if it's too huge, but sticking to "All" as per request.
                    // If dataset is huge, chart.js handles it but bars become thin.
                    const speciesData = data.allSpeciesAnalysis;
                    
                    const labels = speciesData.map(s => s.name);
                    const osiValues = speciesData.map(s => s.ösi);
                    
                    // Highlight dominant species (top 5)
                    const bgColors = speciesData.map((s, i) => i < 5 ? 'rgba(8, 145, 178, 0.8)' : 'rgba(203, 213, 225, 0.6)');
                    const borderColors = speciesData.map((s, i) => i < 5 ? '#0891b2' : '#94a3b8');

                    if (chartInstanceAll.current) chartInstanceAll.current.destroy();

                    chartInstanceAll.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: t('osi_axis'),
                                data: osiValues,
                                backgroundColor: bgColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            indexAxis: 'y', // Horizontal Bar Chart for better readability of names
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                title: { display: true, text: t('chart_all_osi') },
                                tooltip: {
                                    callbacks: {
                                        label: (ctx) => `ÖSI: ${ctx.raw.toFixed(2)}`
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    title: { display: true, text: t('osi_axis') },
                                    suggestedMax: 2.0
                                },
                                y: {
                                    ticks: {
                                        autoSkip: false,
                                        font: { size: 10 }
                                    }
                                }
                            }
                        }
                    });
                }
                return () => { if (chartInstanceAll.current) chartInstanceAll.current.destroy(); };
            }, [data, t]);


            const handlePdfExport = () => {
                const element = document.getElementById('report-content');
                const opt = {
                    margin: 0,
                    filename: `Report_${siteId}_${new Date().toISOString().split('T')[0]}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                const btn = document.getElementById('btn-export-pdf');
                if(btn) btn.innerText = t('btn_processing');
                
                html2pdf().set(opt).from(element).save().then(() => {
                    if(btn) btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ${t('btn_pdf')}`;
                });
            };

            const generateSpeciesText = (stats) => {
                let indText = "";
                if (stats.s >= 4.5) indText = t('sp_ind_exc');
                else if (stats.s >= 3.5) indText = t('sp_ind_good');
                else if (stats.s >= 2.5) indText = t('sp_ind_tol');
                else indText = t('sp_ind_bad');

                let tolText = "";
                if (stats.tolFactor < 1.0) tolText = `${t('sp_tol_steno')} (${stats.tolFactor.toFixed(2)})`;
                else tolText = `${t('sp_tol_eury')} (${stats.tolFactor.toFixed(2)})`;

                let compText = "";
                if (stats.vi < 1.0) compText = `${t('sp_comp_low')} (VI=${stats.vi.toFixed(2)})`;
                else compText = `${t('sp_comp_high')} (VI=${stats.vi.toFixed(2)})`;

                let succText = "";
                if (stats.ösi > 0.5) succText = `${t('sp_succ_high')} (ÖSI=${stats.ösi.toFixed(2)})`;
                else succText = `${t('sp_succ_low')} (ÖSI=${stats.ösi.toFixed(2)})`;

                // --- NEW ÖSI INTERPRETATION LOGIC ---
                const isHighStress = stats.avgStress > 0.5;
                const isTolerant = stats.s < 2.5;
                const isSensitive = stats.s > 4.0;
                const isMono = stats.relAbundance > 0.8;

                let osiInterp = "";
                if (stats.ösi > 0.5) osiInterp = t('osi_high_success');
                else if (stats.ösi < 0.2) osiInterp = t('osi_low_success');
                else osiInterp = t('osi_mod_success');

                if (isHighStress && isTolerant) osiInterp += " " + t('osi_strat_stress_tol');
                else if (!isHighStress && isSensitive) osiInterp += " " + t('osi_strat_sensitive');
                else if (isHighStress && isSensitive) osiInterp += " " + t('osi_warn_drift');

                if (isMono) osiInterp += " " + t('osi_warn_mono');

                // --- NEW ECOLOGICAL PROFILE DESCRIPTION (p5) ---
                const v = stats.v || 1;
                let profileText = `Ecological Context: A ${v > 2 ? 'stenoecious (narrow-tolerance)' : 'euryecious (broad-tolerance)'} taxon (Valence: ${v}). `;
                if (stats.s > 4.0) profileText += "Typically associated with pristine, reference conditions. ";
                else if (stats.s < 2.5) profileText += "Typically serves as a primary colonizer in disturbed environments. ";
                else profileText += "Occupies an intermediate ecological niche. ";
                
                if (stats.ösi > 0.5) profileText += "Current high ÖSI indicates successful competitive exclusion of other species.";
                else profileText += "Moderate ÖSI suggests coexistence rather than dominance.";

                return {
                    p1: indText,
                    p2: tolText,
                    p3: `${compText} ${succText}`,
                    p4: osiInterp,
                    p5: profileText // Added new profile text
                };
            };

            const getNarrative = () => {
                const s = data.samples;
                const stats = data.aggregatedStats;
                const n = data.n;

                const avgIPS = s.reduce((a,b) => a + (b.indices.ips||0), 0) / (s.filter(x=>x.indices.ips).length || 1);
                const avgTol = s.reduce((a,b) => a + b.indices.pctTolerant, 0) / n;
                const avgSens = s.reduce((a,b) => a + b.indices.pctSensitive, 0) / n;
                const avgShan = s.reduce((a,b) => a + b.indices.shannon, 0) / n;
                const avgCoverage = s.reduce((a,b) => a + (b.indices.ipsCoverage||0), 0) / n;
                const avgDO = s.reduce((a,b) => a + (b.indices.doSat||0), 0) / (s.filter(x=>x.indices.doSat).length || 1);

                // Reliability text (mostly static with numbers)
                let reliabilityText = `(${avgCoverage.toFixed(1)}% coverage, n=${n}).`;

                // Ecological State
                let ecoState = "";
                let nutrientText = "";
                
                if (avgIPS >= 4.2) { ecoState = t('eco_high'); nutrientText = t('nut_high'); }
                else if (avgIPS >= 3.6) { ecoState = t('eco_good'); nutrientText = t('nut_good'); }
                else if (avgIPS >= 2.8) { ecoState = t('eco_mod'); nutrientText = t('nut_mod'); }
                else if (avgIPS >= 2.0) { ecoState = t('eco_poor'); nutrientText = t('nut_poor'); }
                else { ecoState = t('eco_bad'); nutrientText = t('nut_bad'); }

                // Structure
                let structureEval = "";
                const isHighDiversity = avgShan > 3.0;
                const isLowDiversity = avgShan < 1.5;
                const isTolerantDominated = avgTol > 50;
                const isSensitiveDominated = avgSens > 50;

                if (isLowDiversity && isTolerantDominated) structureEval = t('struc_deg');
                else if (isLowDiversity && isSensitiveDominated) structureEval = t('struc_clean');
                else if (isHighDiversity && avgIPS < 3.0) structureEval = t('struc_int');
                else if (isHighDiversity) structureEval = t('struc_high');
                else structureEval = `(Shannon: ${avgShan.toFixed(2)}) ` + t('struc_mix');

                // Consistency
                const no3 = stats.nitrate_mg_L?.mean;
                const po4 = stats.phosphate_mg_L?.mean;
                let consistencyText = t('cons_none');

                if (no3 !== undefined || po4 !== undefined) {
                    const chemNutrientStress = (no3 > 10 || po4 > 0.1); 
                    const bioNutrientStress = avgIPS < 3.5;
                    
                    if (chemNutrientStress && bioNutrientStress) consistencyText = t('cons_match_bad');
                    else if (!chemNutrientStress && !bioNutrientStress) consistencyText = t('cons_match_good');
                    else if (chemNutrientStress && !bioNutrientStress) consistencyText = t('cons_mild');
                    else if (!chemNutrientStress && bioNutrientStress) consistencyText = t('cons_bad');
                }

                // Trend
                let trendText = t('trend_none');
                if (n >= 2) {
                    const sortedS = [...s].sort((a,b) => new Date(a.date) - new Date(b.date));
                    const first = sortedS[0];
                    const last = sortedS[sortedS.length-1];
                    const ipsDiff = (last.indices.ips||0) - (first.indices.ips||0);
                    if (Math.abs(ipsDiff) < 0.5) trendText = t('trend_stable');
                    else if (ipsDiff > 0) trendText = t('trend_imp');
                    else trendText = t('trend_deg');
                }

                // Multi-index scientific interpretation (read-only)
                const avgTDI = s.filter(x => x.indices.tdi != null).length > 0
                    ? s.reduce((a,b) => a + (b.indices.tdi||0), 0) / s.filter(x => x.indices.tdi != null).length
                    : null;
                const avgIBD  = avgIPS > 0 ? Math.min(20, avgIPS * 0.9 + 0.5) : null;
                const avgEPID = avgTol > 0 ? Math.min(4, avgTol / 25) : null;
                const avgSID  = avgIPS > 0 ? Math.max(1, Math.min(4, 5 - avgIPS)) : null;
                let multiIndexText = '';
                if (avgIPS > 0) {
                    const parts = [];
                    if (avgTDI != null) {
                        if (avgIPS >= 3.6 && avgTDI < 40)
                            parts.push('Az IPS és TDI indexek jó ökológiai állapotot jeleznek, alacsony tápanyagterheléssel.');
                        else if (avgIPS >= 3.6 && avgTDI >= 40 && avgTDI < 60)
                            parts.push('Az IPS index jó állapotot jelez, míg a TDI mérsékelt tápanyagterhelést mutat.');
                        else if (avgIPS < 3.6 && avgTDI >= 60)
                            parts.push('A TDI magas értéke és az alacsony IPS eutrofizációs stresszt jelez.');
                        else if (avgIPS < 2.8 && avgTDI >= 40)
                            parts.push('Az IPS alacsony értéke és a TDI együttesen csökkent ökológiai állapotot és fokozott tápanyagterhelést jeleznek.');
                    }
                    if (avgIBD != null) {
                        if (avgIBD >= 14)      parts.push('Az IBD index kiváló vízminőséget jelez.');
                        else if (avgIBD >= 10) parts.push('Az IBD index jó vízminőségi osztályba sorolja a mintavételi helyet.');
                        else if (avgIBD >= 7)  parts.push('Az IBD index közepes vízminőséget tükröz.');
                        else                   parts.push('Az IBD index rossz ökológiai állapotot jelez.');
                    }
                    if (avgEPID != null) {
                        if (avgEPID >= 3)      parts.push('Az EPI-D index erős eutrofizációra utal.');
                        else if (avgEPID >= 2) parts.push('Az EPI-D index mérsékelt eutrofizációs nyomást jelez.');
                        else                   parts.push('Az EPI-D index alacsony eutrofizációs terhelést mutat.');
                    }
                    if (avgSID != null) {
                        if (avgSID >= 3.5)     parts.push('A szaprobiális index (SID) erős szerves szennyezést jelez.');
                        else if (avgSID >= 2.5) parts.push('A SID mérsékelt szerves terhelésre utal.');
                        else                   parts.push('A SID alacsony szerves szennyezést jelez, a vizsgált víztest biológiailag tisztának minősíthető.');
                    }
                    multiIndexText = parts.join(' ');
                }


                // ── CHAO1, DI-TP, DI-pH, SPEAR ─────────────────────────────────
                const validChao1 = s.filter(x => x.indices.chao1 != null);
                const avgChao1 = validChao1.length > 0
                    ? validChao1.reduce((a,b) => a + b.indices.chao1, 0) / validChao1.length
                    : null;

                const validDiTp = s.filter(x => x.indices.diTp != null);
                const avgDiTp = validDiTp.length > 0
                    ? validDiTp.reduce((a,b) => a + b.indices.diTp, 0) / validDiTp.length
                    : null;

                const validDiPh = s.filter(x => x.indices.diPh != null);
                const avgDiPh = validDiPh.length > 0
                    ? validDiPh.reduce((a,b) => a + b.indices.diPh, 0) / validDiPh.length
                    : null;

                const validSpear = s.filter(x => x.indices.spear != null);
                const avgSpear = validSpear.length > 0
                    ? validSpear.reduce((a,b) => a + b.indices.spear, 0) / validSpear.length
                    : null;

                // Chao1 vs observed richness
                const avgRichness = s.reduce((a,b) => a + b.indices.richness, 0) / n;
                let chao1Text = '';
                if (avgChao1 != null) {
                    const completeness = avgRichness > 0 ? (avgRichness / avgChao1) * 100 : 0;
                    chao1Text = `Chao1 = ${avgChao1.toFixed(1)} faj (megfigyelt: ${avgRichness.toFixed(0)} faj; mintázottság: ${completeness.toFixed(0)}%). `;
                    if (completeness >= 80) chao1Text += 'A mintavétel reprezentatív, a közösség diverzitása jól becsülhető.';
                    else if (completeness >= 60) chao1Text += 'A mintavétel közepes lefedettségű; a tényleges fajgazdagság feltehetően nagyobb.';
                    else chao1Text += 'Alacsony mintázottság – a Chao1 alapján jelentős fajkészlet maradt feltáratlan.';
                }

                // DI-TP interpretation
                let diTpText = '';
                if (avgDiTp != null) {
                    let diTpClass = '';
                    if (avgDiTp < 10) diTpClass = 'oligotróf (<10 µg/L) – kiváló állapot';
                    else if (avgDiTp < 25) diTpClass = 'mezotróf (10–25 µg/L) – jó állapot';
                    else if (avgDiTp < 50) diTpClass = 'mező-eutróf (25–50 µg/L) – mérsékelt terhelés';
                    else if (avgDiTp < 100) diTpClass = 'eutróf (50–100 µg/L) – erős tápanyagterhelés';
                    else diTpClass = 'hipertróf (>100 µg/L) – kritikus eutrofizáció';
                    diTpText = `DI-TP = ${avgDiTp.toFixed(1)} µg/L – ${diTpClass}.`;
                }

                // DI-pH interpretation
                let diPhText = '';
                if (avgDiPh != null) {
                    let diPhClass = '';
                    if (avgDiPh < 5.5) diPhClass = 'erősen savas (acidobiontic); természetes lápi vagy savanyú sziklás élőhely jellemző';
                    else if (avgDiPh < 6.5) diPhClass = 'enyhén savas; puha vizes, lápi hatású rendszer';
                    else if (avgDiPh < 7.5) diPhClass = 'semleges–gyengén lúgos; optimális tartomány';
                    else if (avgDiPh < 8.5) diPhClass = 'lúgos; kemény vizű, esetleg algavirágzásra hajlamos';
                    else diPhClass = 'erősen lúgos; szezonális algabloom vagy szennyezés gyanúja';
                    diPhText = `DI-pH = ${avgDiPh.toFixed(2)} – ${diPhClass}.`;
                }

                // SPEAR interpretation
                let spearText = '';
                if (avgSpear != null) {
                    let spearClass = '';
                    if (avgSpear >= 50) spearClass = 'magas érzékeny-faj arány (≥50%) – a növényvédőszer-terhelés valószínűleg alacsony; egészséges ökoszisztéma';
                    else if (avgSpear >= 30) spearClass = 'közepes (30–50%) – mérsékelten herbicid-terhelt élőhely';
                    else if (avgSpear >= 15) spearClass = 'alacsony (15–30%) – növényvédőszer-stressz fennáll; monitorozás javasolt';
                    else spearClass = 'KRITIKUSAN alacsony (<15%) – súlyos herbicid/peszticid-terhelés valószínűsíthető';
                    spearText = `SPEARₓₗₑₜ = ${avgSpear.toFixed(1)}% – ${spearClass}.`;
                }
                // ────────────────────────────────────────────────────────────────

                // ── TOXIC & GILL-HARM SPECIES ANALYSIS ─────────────────────────
                // Results are pre-computed in the worker where speciesDb is available
                const hs = data.harmfulSpecies || {};
                const toxicCount     = hs.toxicCount     || 0;
                const gillPhysCount  = hs.gillPhysCount  || 0;
                const gillBloomCount = hs.gillBloomCount || 0;
                const totalWithDB    = hs.totalWithDB    || 0;
                const detectedToxic     = hs.detectedToxic     || [];
                const detectedGillPhys  = hs.detectedGillPhys  || [];
                const detectedGillBloom = hs.detectedGillBloom || [];
                const toxicRatio     = hs.toxicRatio     || 0;
                const gillPhysRatio  = hs.gillPhysRatio  || 0;
                const gillBloomRatio = hs.gillBloomRatio || 0;

                // Toxin assessment
                let toxicDanger = '', toxicColor = '', toxicBg = '', toxicBorder = '';
                if (toxicRatio === 0) {
                    toxicDanger = 'Nem észlelhető toxintermelő faj a mintában.';
                    toxicColor = 'text-green-900'; toxicBg = 'bg-green-50'; toxicBorder = 'border-green-300';
                } else if (toxicRatio < 5) {
                    toxicDanger = 'Minimális kockázat: toxintermelő fajok aránya alacsony (<5%). Potenciális domoinsav/okadásav terhelés figyelemmel kísérése javasolt.';
                    toxicColor = 'text-yellow-900'; toxicBg = 'bg-yellow-50'; toxicBorder = 'border-yellow-300';
                } else if (toxicRatio < 15) {
                    toxicDanger = 'Közepes kockázat: toxintermelő fajok aránya mérsékelt (5–15%). Rendszeres monitorozás és halvizsgálat javasolt.';
                    toxicColor = 'text-orange-900'; toxicBg = 'bg-orange-50'; toxicBorder = 'border-orange-400';
                } else {
                    toxicDanger = 'KIFEJEZETT KOCKÁZAT: Toxintermelő fajok aránya magas (>15%). Azonnali vizsgálat és hatósági értesítés javasolt! Ivóvízkivételi és halfogyasztási tilalom mérlegelendő!';
                    toxicColor = 'text-red-900'; toxicBg = 'bg-red-50'; toxicBorder = 'border-red-500';
                }

                // Physical gill injury – LOW threshold (even 1–3% is dangerous)
                let gillPhysDanger = '', gillPhysColor = '', gillPhysBg = '', gillPhysBorder = '';
                if (gillPhysRatio === 0) {
                    gillPhysDanger = 'Nem észlelhető fizikai kopoltyúkárosító faj.';
                    gillPhysColor = 'text-green-900'; gillPhysBg = 'bg-green-50'; gillPhysBorder = 'border-green-300';
                } else if (gillPhysRatio < 1) {
                    gillPhysDanger = 'Minimális fizikai kockázat (<1%): tüskés/lándzsás fajok jelen vannak, de igen alacsony arányban. Haltenyésztési területen fokozott megfigyelés ajánlott.';
                    gillPhysColor = 'text-yellow-900'; gillPhysBg = 'bg-yellow-50'; gillPhysBorder = 'border-yellow-300';
                } else if (gillPhysRatio < 3) {
                    gillPhysDanger = 'KÖZEPES FIZIKAI KOCKÁZAT (1–3%): Tüskés/lándzsás fajok már kis sejtszámnál is kopoltyúvérzést, laceratiot okozhatnak! Haltenyésztési területen azonnali megfigyelés és mortalitásellenőrzés szükséges.';
                    gillPhysColor = 'text-orange-900'; gillPhysBg = 'bg-orange-50'; gillPhysBorder = 'border-orange-400';
                } else {
                    gillPhysDanger = 'MAGAS FIZIKAI KOPOLTYÚKOCKÁZAT (>3%): Akut halpusztulás kockázata fennáll! A tüskés/lándzsás fajok közvetlenül roncsolják a kopoltyúszövetet. Halállomány azonnali védelme, esetleges kivonása javasolt!';
                    gillPhysColor = 'text-red-900'; gillPhysBg = 'bg-red-50'; gillPhysBorder = 'border-red-500';
                }

                // Bloom gill harm – HIGH threshold (dangerous only when dominant)
                let gillBloomDanger = '', gillBloomColor = '', gillBloomBg = '', gillBloomBorder = '';
                if (gillBloomRatio === 0) {
                    gillBloomDanger = 'Nem észlelhető bloom-kockázatú faj a mintában.';
                    gillBloomColor = 'text-green-900'; gillBloomBg = 'bg-green-50'; gillBloomBorder = 'border-green-300';
                } else if (gillBloomRatio < 15) {
                    gillBloomDanger = `Alacsony bloom-kockázat (<15%): A fajok kis arányban vannak jelen, virágzás esetén azonban O₂-depléció és nyálka-elzáródás veszélyével kell számolni. Tápanyagterhelés csökkentése javasolt.`;
                    gillBloomColor = 'text-yellow-900'; gillBloomBg = 'bg-yellow-50'; gillBloomBorder = 'border-yellow-300';
                } else if (gillBloomRatio < 30) {
                    gillBloomDanger = 'MÉRSÉKELT BLOOM-KOCKÁZAT (15–30%): A fajok közepes dominanciája esetén tömeges elszaporodásuk oxigénhiányt, kopoltyú-nyálkaelzáródást okozhat. Aktív monitoring és tápanyagkezelés szükséges.';
                    gillBloomColor = 'text-orange-900'; gillBloomBg = 'bg-orange-50'; gillBloomBorder = 'border-orange-400';
                } else {
                    gillBloomDanger = 'MAGAS BLOOM-KOCKÁZAT (>30%): A fajok dominálják a közösséget. Aktuális vagy közelgő virágzás esetén súlyos oxigénhiány és kopoltyú-elzáródás miatti halpusztulás várható! Azonnali beavatkozás indokolt.';
                    gillBloomColor = 'text-red-900'; gillBloomBg = 'bg-red-50'; gillBloomBorder = 'border-red-500';
                }
                // ────────────────────────────────────────────────────────────────
                return (
                    <div className="space-y-6 text-justify text-slate-800 text-sm leading-relaxed font-normal">
                        <div className="bg-slate-50 p-4 rounded border border-slate-200">
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">1. {t('section3_title').split('(')[0]}</h4>
                            <p className="mb-0">
                                <strong>{ecoState}</strong>. <br/>
                                {nutrientText}
                            </p>
                        </div>
                        <div>
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">2. Structure</h4>
                            <p>{structureEval} {reliabilityText}</p>
                        </div>
                        <div>
                            <h4 className="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">3. Validation</h4>
                            <p>{consistencyText}</p>
                            <p className="mt-2">{trendText}</p>
                        </div>
                        {multiIndexText && (
                            <div className="bg-blue-50 p-4 rounded border border-blue-200">
                                <h4 className="font-bold text-blue-900 mb-2 uppercase text-xs tracking-wider">4. Index-alapú értékelés (IPS / TDI / IBD / EPI-D / SID)</h4>
                                <p className="text-blue-900">{multiIndexText}</p>
                            </div>
                        )}

                        {(avgChao1 != null || avgDiTp != null || avgDiPh != null || avgSpear != null) && (
                            <div className="bg-purple-50 p-4 rounded border border-purple-200 space-y-3">
                                <h4 className="font-bold text-purple-900 mb-2 uppercase text-xs tracking-wider">
                                    6. Chao1 · DI-TP · DI-pH · SPEAR<sub>diatoms</sub>
                                </h4>
                                {avgChao1 != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Chao1 gazdagságbecslő:</span>
                                        <p className="text-purple-900 mt-0.5">{chao1Text}</p>
                                    </div>
                                )}
                                {avgDiTp != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Diatóma-alapú foszfor (DI-TP):</span>
                                        <p className="text-purple-900 mt-0.5">{diTpText}</p>
                                    </div>
                                )}
                                {avgDiPh != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Diatóma-alapú pH (DI-pH):</span>
                                        <p className="text-purple-900 mt-0.5">{diPhText}</p>
                                    </div>
                                )}
                                {avgSpear != null && (
                                    <div>
                                        <span className="font-semibold text-purple-800">Növényvédőszer-érzékenység (SPEAR):</span>
                                        <p className="text-purple-900 mt-0.5">{spearText}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className={`p-4 rounded border ${toxicBg} ${toxicBorder}`}>
                            <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${toxicColor}`}>
                                5a. Toxintermelő fajok értékelése (domoinsav / okadásav / ASP / DSP)
                            </h4>
                            <p className={toxicColor}>
                                <strong>Toxintermelő fajok aránya: {toxicRatio.toFixed(1)}%</strong>
                                {toxicCount > 0 && <span> ({toxicCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${toxicColor}`}>{toxicDanger}</p>
                            {detectedToxic.length > 0 && (
                                <p className={`mt-2 text-xs italic ${toxicColor}`}>
                                    Azonosított fajok: {detectedToxic.sort().join(', ')}
                                </p>
                            )}
                        </div>

                        <div className={`p-4 rounded border ${gillPhysBg} ${gillPhysBorder}`}>
                            <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${gillPhysColor}`}>
                                5b. Fizikai kopoltyúkárosítók (tüskés setae / lándzsás sejtek)
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${gillPhysColor}`}>
                                ⚠ Ezek a fajok már kis sejtszámnál is közvetlenül roncsolják a kopoltyúszövetet. Küszöb: &gt;1% = közepes; &gt;3% = magas kockázat.
                            </p>
                            <p className={gillPhysColor}>
                                <strong>Fizikai károsítók aránya: {gillPhysRatio.toFixed(2)}%</strong>
                                {gillPhysCount > 0 && <span> ({gillPhysCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${gillPhysColor}`}>{gillPhysDanger}</p>
                            {detectedGillPhys.length > 0 && (
                                <p className={`mt-2 text-xs italic ${gillPhysColor}`}>
                                    Azonosított fajok: {detectedGillPhys.sort().join(', ')}
                                </p>
                            )}
                        </div>

                        <div className={`p-4 rounded border ${gillBloomBg} ${gillBloomBorder}`}>
                            <h4 className={`font-bold mb-2 uppercase text-xs tracking-wider ${gillBloomColor}`}>
                                5c. Bloom-kockázatú kopoltyúkárosítók (O₂-depléció / nyálka / hipoxia)
                            </h4>
                            <p className={`text-xs mb-2 opacity-75 ${gillBloomColor}`}>
                                ℹ Ezek a fajok csak tömeges elszaporodáskor veszélyesek. Küszöb: &gt;15% = mérsékelt; &gt;30% = magas kockázat.
                            </p>
                            <p className={gillBloomColor}>
                                <strong>Bloom-kockázatú fajok aránya: {gillBloomRatio.toFixed(1)}%</strong>
                                {gillBloomCount > 0 && <span> ({gillBloomCount} rekord / {totalWithDB} összesen)</span>}
                            </p>
                            <p className={`mt-1 ${gillBloomColor}`}>{gillBloomDanger}</p>
                            {detectedGillBloom.length > 0 && (
                                <p className={`mt-2 text-xs italic ${gillBloomColor}`}>
                                    Azonosított fajok: {detectedGillBloom.sort().join(', ')}
                                </p>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="bg-white min-h-screen">
                    <div className="bg-slate-900 text-white p-8 print:p-0 print:text-black print:bg-white print:border-b-2 print:border-black">
                        <div className="max-w-5xl mx-auto flex justify-between items-start">
                            <div>
                                <div className="text-cyan-400 font-bold tracking-[0.3em] text-xs uppercase mb-2">Eco-Stat Report v8.1.3</div>
                                <h1 className="text-3xl font-black mb-1">{siteId}</h1>
                                <p className="text-slate-400 font-mono text-sm">{t('generated')}: {new Date(data.timestamp).toLocaleString()}</p>
                            </div>
                            <div className="flex gap-4 no-print">
                                <button onClick={onBack} className="text-slate-400 hover:text-white font-bold text-xs uppercase">{t('btn_back')}</button>
                                <button 
                                    id="btn-export-pdf"
                                    onClick={handlePdfExport} 
                                    className="bg-cyan-600 text-white px-4 py-2 rounded font-bold text-xs uppercase flex items-center gap-2 hover:bg-cyan-500 shadow-lg"
                                >
                                    <Icon name="Download" /> {t('btn_pdf')}
                                </button>
                                <button onClick={()=>window.print()} className="bg-white text-slate-900 px-4 py-2 rounded font-bold text-xs uppercase flex items-center gap-2 hover:bg-cyan-50">
                                    <Icon name="Printer" /> {t('btn_print')}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="report-content" className="max-w-5xl mx-auto p-8 prose prose-slate max-w-none print:p-0 print:py-4 bg-white">
                        
                        {data.isHypothesis && (
                            <div className="bg-amber-50 border-l-4 border-amber-500 p-4 mb-8 rounded-r-lg print:border-gray-300 print:bg-gray-50">
                                <div className="flex items-center gap-2 text-amber-800 font-bold mb-1">
                                    <Icon name="AlertTriangle" />
                                    <span>{t('warning_hypothesis')} (n={data.n})</span>
                                </div>
                                <p className="text-sm text-amber-900 m-0">
                                    {t('warning_text')}
                                </p>
                            </div>
                        )}

                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide">{t('section1_title')}</h2>
                        <div className="overflow-x-auto mb-12">
                            <table className="w-full text-sm text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 border-b border-slate-200 text-xs uppercase text-slate-600">
                                        <th className="p-3">Date</th>
                                        <th className="p-3">Richness (S)</th>
                                        <th className="p-3">Shannon (H')</th>
                                        <th className="p-3">IPS (Est.)</th>
                                        <th className="p-3">IPS Coverage</th>
                                        <th className="p-3">% Tolerant</th>
                                        <th className="p-3">DO Sat%</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.samples.map(s => (
                                        <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50">
                                            <td className="p-3 font-mono font-bold">{s.date}</td>
                                            <td className="p-3">{s.indices.richness}</td>
                                            <td className="p-3">{s.indices.shannon.toFixed(2)}</td>
                                            <td className="p-3 font-bold text-blue-700">{s.indices.ips ? s.indices.ips.toFixed(2) : '-'}</td>
                                            <td className="p-3 text-slate-500 text-xs">{s.indices.ipsCoverage ? s.indices.ipsCoverage.toFixed(1)+'%' : '-'}</td>
                                            <td className="p-3">{s.indices.pctTolerant.toFixed(1)}%</td>
                                            <td className="p-3">{s.indices.doSat ? s.indices.doSat.toFixed(1)+'%' : '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="page-break"></div>
                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide mt-8">{t('section2_title')}</h2>
                        
                        {data.speciesAnalysis.length === 0 ? (
                            <p className="italic text-slate-500">No statistically significant correlations found (or n&lt;3).</p>
                        ) : (
                            <div className="space-y-6">
                                {data.speciesAnalysis.map((res, i) => (
                                    <div key={i} className="border border-slate-200 rounded-lg p-5 break-inside-avoid shadow-sm print:shadow-none print:border-gray-300">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800 m-0 leading-tight italic">{res.species}</h3>
                                                <div className="text-xs text-slate-500 font-bold uppercase mt-1">vs. {res.parameter.replace('_', ' ')}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-2xl font-black text-cyan-600 leading-none">{res.confidence}%</div>
                                                <div className="text-[10px] text-slate-400 uppercase tracking-widest">Confidence</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mb-4 bg-slate-50 p-3 rounded">
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Effect (Rho)</span>
                                                <span className={`font-bold ${res.rho > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                    {res.rho > 0 ? 'POS' : 'NEG'} ({res.rho.toFixed(2)})
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Optimum</span>
                                                <span className="font-mono font-bold">
                                                    {res.optimum ? res.optimum.toFixed(2) : 'N/A'}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Tolerance (SD)</span>
                                                <span className="font-mono">
                                                    ±{res.tolerance ? res.tolerance.toFixed(2) : '-'}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Stability</span>
                                                <span className="font-mono">
                                                    {(res.stability*100).toFixed(0)}%
                                                </span>
                                            </div>
                                        </div>

                                        <div className="text-sm text-slate-600 bg-white p-3 border-l-2 border-slate-300">
                                            Correlates {res.rho > 0 ? 'positively' : 'negatively'} with parameter ({res.n} samples, present in {res.present_n}). 
                                            {Math.abs(res.rho) > 0.6 ? ' Strong correlation.' : ' Moderate correlation.'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="page-break"></div>
                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide mt-8">{t('section3_title')}</h2>
                        <div className="bg-slate-50 border border-slate-200 p-6 rounded-lg shadow-sm text-justify leading-relaxed text-slate-800 mt-4 text-sm font-medium">
                            {getNarrative()}
                        </div>

                        <div className="page-break"></div>
                        <div className="mt-12">
                            <div className="flex items-center gap-3 border-b-2 border-cyan-500 pb-2 mb-6">
                                <Icon name="Activity" className="text-cyan-600" size={24}/>
                                <h2 className="text-xl font-black text-slate-900 uppercase tracking-wide m-0">
                                    {t('extra_title')}
                                </h2>
                            </div>

                            <div className="bg-white p-4 rounded-xl shadow-md border border-slate-200 mb-8">
                                <canvas ref={chartRef} className="max-h-[500px] w-full"></canvas>
                                {missingParams.length > 0 && (
                                    <div className="mt-4 text-xs text-amber-700 bg-amber-50 p-3 rounded border border-amber-200">
                                        <strong>{t('missing_data')}:</strong> {t('missing_data_desc')} {missingParams.join(', ')}.
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-1 gap-6">
