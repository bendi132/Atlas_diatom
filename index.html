                                <div className="flex items-center gap-3 border-b-2 border-indigo-300 pb-2 mb-4">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                                    </svg>
                                    <h2 className="text-lg font-black text-slate-900 uppercase tracking-wide m-0">
                                        Ω-ÖSI Ökológiai Stressz Index — Idősor
                                    </h2>
                                </div>
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-4" style={{height:'300px'}}>
                                    <canvas ref={chartRefOmega} style={{width:'100%', height:'100%'}}></canvas>
                                </div>
                                <p className="text-xs text-slate-400 mt-2 text-center">
                                    🟢 &lt;0.8 Alacsony · 🟡 0.8–1.5 Közepes · 🔴 &gt;1.5 Magas (Ω-ÖSI – Ökológiai Stressz Index)
                                </p>
                            </div>
                        )}
                        {/* ── END Ω-ÖSI IDŐSOR ────────────────────────────────────────── */}

                        <div className="page-break"></div>
                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide mt-8">{t('section2_title')}</h2>
                        
                        {data.speciesAnalysis.length === 0 ? (
                            <p className="italic text-slate-500">No statistically significant correlations found (or n&lt;3).</p>
                        ) : (
                            <div className="space-y-6">
                                {data.speciesAnalysis.map((res, i) => (
                                    <div key={i} className="border border-slate-200 rounded-lg p-5 break-inside-avoid shadow-sm print:shadow-none print:border-gray-300">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800 m-0 leading-tight italic">{res.species}</h3>
                                                <div className="text-xs text-slate-500 font-bold uppercase mt-1">vs. {res.parameter.replace('_', ' ')}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-2xl font-black text-cyan-600 leading-none">{res.confidence}%</div>
                                                <div className="text-[10px] text-slate-400 uppercase tracking-widest">Confidence</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mb-4 bg-slate-50 p-3 rounded">
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Effect (Rho)</span>
                                                <span className={`font-bold ${res.rho > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                    {res.rho > 0 ? 'POS' : 'NEG'} ({res.rho.toFixed(2)})
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Optimum</span>
                                                <span className="font-mono font-bold">
                                                    {res.optimum ? res.optimum.toFixed(2) : 'N/A'}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Tolerance (SD)</span>
                                                <span className="font-mono">
                                                    ±{res.tolerance ? res.tolerance.toFixed(2) : '-'}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-[10px] text-slate-400 uppercase">Stability</span>
                                                <span className="font-mono">
                                                    {(res.stability*100).toFixed(0)}%
                                                </span>
                                            </div>
                                        </div>

                                        <div className="text-sm text-slate-600 bg-white p-3 border-l-2 border-slate-300">
                                            Correlates {res.rho > 0 ? 'positively' : 'negatively'} with parameter ({res.n} samples, present in {res.present_n}). 
                                            {Math.abs(res.rho) > 0.6 ? ' Strong correlation.' : ' Moderate correlation.'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="page-break"></div>
                        <h2 className="text-xl font-black text-cyan-900 border-b-2 border-cyan-100 pb-2 uppercase tracking-wide mt-8">{t('section3_title')}</h2>
                        <div className="bg-slate-50 border border-slate-200 p-6 rounded-lg shadow-sm text-justify leading-relaxed text-slate-800 mt-4 text-sm font-medium">
                            {getNarrative()}
                        </div>

                        <div className="page-break"></div>
                        <div className="mt-12">
                            <div className="flex items-center gap-3 border-b-2 border-cyan-500 pb-2 mb-6">
                                <Icon name="Activity" className="text-cyan-600" size={24}/>
                                <h2 className="text-xl font-black text-slate-900 uppercase tracking-wide m-0">
                                    {t('extra_title')}
                                </h2>
                            </div>

                            <div className="bg-white p-4 rounded-xl shadow-md border border-slate-200 mb-8 chart-container-main" style={{height: '400px'}}>
                                <canvas ref={chartRef} style={{width:'100%', height:'100%'}}></canvas>
                                {missingParams.length > 0 && (
                                    <div className="mt-4 text-xs text-amber-700 bg-amber-50 p-3 rounded border border-amber-200">
                                        <strong>{t('missing_data')}:</strong> {t('missing_data_desc')} {missingParams.join(', ')}.
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-1 gap-6">
                                {data.dominantAnalysis && data.dominantAnalysis.map((sp, i) => {
                                    const texts = generateSpeciesText(sp);
                                    return (
                                        <div key={i} className="border border-l-4 border-slate-200 border-l-cyan-500 bg-white rounded-r-lg p-5 shadow-sm break-inside-avoid">
                                            <div className="flex justify-between items-center mb-3">
                                                <h3 className="text-lg font-bold text-slate-800 italic">{sp.name}</h3>
                                                <div className="flex gap-2 text-xs font-mono">
                                                    <span className="bg-slate-100 px-2 py-1 rounded">Rel. Abund: {(sp.relAbundance*100).toFixed(1)}%</span>
                                                    <span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded font-black border border-indigo-200">
                                                        Ω-ÖSI: {sp.ωosi !== undefined ? sp.ωosi.toFixed(3) : sp.ösi.toFixed(2)}
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-3 text-sm text-slate-700 text-justify">
                                                <p className="flex gap-2">
                                                    <span className="font-bold text-cyan-700 min-w-[20px]">1.</span>
                                                    <span>{texts.p1}</span>
                                                </p>
                                                <p className="flex gap-2">
                                                    <span className="font-bold text-cyan-700 min-w-[20px]">2.</span>
                                                    <span>{texts.p2}</span>
                                                </p>
                                                <p className="flex gap-2">
                                                    <span className="font-bold text-cyan-700 min-w-[20px]">3.</span>
                                                    <span>{texts.p3}</span>
                                                </p>
                                                
                                                {/* Ω-OSI INTERPRETATION SUBSECTION */}
                                                <div className="mt-3 pt-2 border-t border-slate-100">
                                                    <h4 className="font-bold text-indigo-700 text-xs uppercase mb-1">Ω-ÖSI – Ökológiai Stressz Index Értelmezés</h4>
                                                    <p className="text-sm text-slate-600">{texts.p4}</p>
                                                    <p className="text-sm text-slate-600 mt-2 italic">{texts.p5}</p>
                                                </div>
                                            </div>

                                            <div className="mt-3 pt-3 border-t border-slate-100 text-[10px] text-slate-400 font-mono flex gap-4">
                                                <span>Sensitivity (s): {sp.s}</span>
                                                <span>VI: {sp.vi.toFixed(2)}</span>
                                                <span>Tol. Factor: {sp.tolFactor.toFixed(2)}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* --- NEW SECTION: All Taxa Chart --- */}
                            <div className="mt-12 break-inside-avoid">
                                <div className="flex items-center gap-3 border-b-2 border-slate-200 pb-2 mb-6">
                                    <Icon name="Database" className="text-slate-400" size={20}/>
                                    <h2 className="text-lg font-bold text-slate-700 uppercase tracking-wide m-0">
                                        {t('extra_all_taxa_title')}
                                    </h2>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-md border border-slate-200 chart-container-all-taxa" style={{height: '600px'}}>
                                    <canvas ref={chartRefAll} style={{width:'100%', height:'100%'}}></canvas>
                                </div>
                                <p className="text-xs text-slate-400 mt-2 text-center">
                                    * Ω-ÖSI (Omega Ökológiai Stressz Index) – Minden Taxon (Abundancia szerint rendezve). Top 5 domináns faj lilával jelölve.
                                </p>
                            </div>

                        </div>

                        {/* ── TROPHIC NUTRIENT PREFERENCE SECTION ── */}
                        {data.trophicStats && (() => {
                            const ts = data.trophicStats;
                            // Determine dominant trophic category (excluding unknown)
                            const cats = [
                                { key: 'O', pct: ts.oligoPct, label: t('trophic_oligo_label'), color: '#22c55e', bg: 'bg-green-50', border: 'border-green-300', headColor: 'text-green-800' },
                                { key: 'M', pct: ts.mesoPct,  label: t('trophic_meso_label'),  color: '#f97316', bg: 'bg-orange-50', border: 'border-orange-300', headColor: 'text-orange-800' },
                                { key: 'E', pct: ts.eutroPct, label: t('trophic_eutro_label'), color: '#ef4444', bg: 'bg-red-50',    border: 'border-red-300',    headColor: 'text-red-800'    },
                            ];
                            const dominant = cats.reduce((a, b) => a.pct > b.pct ? a : b);
                            let evalText = t('trophic_eval_mixed');
                            const knownPct = ts.oligoPct + ts.mesoPct + ts.eutroPct;
                            if (knownPct > 0) {
                                const domShare = dominant.pct / knownPct;
                                if (domShare >= 0.45) {
                                    if (dominant.key === 'O') evalText = t('trophic_eval_oligo');
                                    else if (dominant.key === 'M') evalText = t('trophic_eval_meso');
                                    else evalText = t('trophic_eval_eutro');
                                }
                            }
                            return (
                                <div className="mt-12 page-break break-inside-avoid">
                                    <div className="flex items-center gap-3 border-b-2 border-emerald-400 pb-2 mb-6">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/>
                                        </svg>
                                        <h2 className="text-xl font-black text-slate-900 uppercase tracking-wide m-0">
                                            {t('trophic_section_title')}
                                        </h2>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                                        {/* Pie chart */}
                                        <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-4 chart-container-trophic" style={{height:'320px'}}>
                                            <canvas ref={chartRefTrophic} style={{width:'100%', height:'100%'}}></canvas>
                                        </div>

                                        {/* Stats + evaluation */}
                                        <div className="flex flex-col gap-4">
                                            {/* colour legend / stat bars */}
                                            {[
                                                { label: t('trophic_oligo_label'),   pct: ts.oligoPct,   n: ts.oligoSpecies ? ts.oligoSpecies.length : 0,  bar: 'bg-green-500'  },
                                                { label: t('trophic_meso_label'),    pct: ts.mesoPct,    n: ts.mesoSpecies  ? ts.mesoSpecies.length  : 0,  bar: 'bg-orange-500' },
                                                { label: t('trophic_eutro_label'),   pct: ts.eutroPct,   n: ts.eutroSpecies ? ts.eutroSpecies.length : 0,  bar: 'bg-red-500'    },
                                                { label: t('trophic_unknown_label'), pct: ts.unknownPct, n: null,                                           bar: 'bg-slate-400'  },
                                            ].map(row => (
                                                <div key={row.label}>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="text-xs font-semibold text-slate-700">{row.label}</span>
                                                        <span className="text-xs font-mono text-slate-500">
                                                            {row.pct.toFixed(1)}%{row.n !== null ? ` · ${row.n} sp.` : ''}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 rounded-full h-2.5">
                                                        <div className={`${row.bar} h-2.5 rounded-full`} style={{width: Math.min(100, row.pct) + '%'}}></div>
                                                    </div>
                                                </div>
                                            ))}

                                            {/* 1-sentence evaluation */}
                                            <div className={`mt-2 p-3 rounded-lg border text-sm font-medium ${dominant.bg} ${dominant.border} ${dominant.headColor}`}>
                                                <span className="font-bold">Értékelés: </span>{evalText}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                        {/* ── END TROPHIC SECTION ── */}

                        <div className="mt-12 pt-8 border-t border-slate-200 text-xs text-slate-500">
                            <h4 className="font-bold text-slate-700 uppercase mb-2">{t('section4_title')}</h4>
                            <ul className="list-disc pl-4 space-y-1">
                                <li><strong>Confidence Score:</strong> 0.3*Coverage + 0.3*EffectSize + 0.25*Stability + 0.15*Fit. (n/20 corr).</li>
                                <li><strong>Optimum:</strong> Weighted Averaging (WA).</li>
                                <li><strong>Index:</strong> Shannon (ln base), IPS (OMNIDIA compatible).</li>
                                <li><strong>Stat Engine:</strong> Spearman Rank Correlation + Bootstrapping (1000 iter).</li>
                                <li><strong>Competition Index (VI):</strong> VI_i = Σ(|Ai − Aj| / (Ai + Aj)).</li>
                                <li><strong>Ω-ÖSI – Omega Ökológiai Stressz Index:</strong>{' '}
                                    Ω_i = (1 − Σ_j[w_j · exp(−0.5·(x_i−μ_j)²/σ_j²) · Φ_j] + λ·H(X_i) + ξ·D_KL(P_i‖Q_i))
                                    / (mean(σ_j) + ε + γ·G_i + η·‖dx_i/dt‖).
                                    Paraméterek: x_i = rel. abundancia; μ_j = s/5; σ_j = max(0.1, v/5); w_j = Φ_j = 1;
                                    λ=0.15 (Shannon-súly); ξ=0.10 (KL-súly); γ=0.20 (gradiens-súly); η=0.10 (temporális súly); ε=1e-6;
                                    G_i = |s−3|/2; H = normált Shannon-entrópia; D_KL = KL-divergencia vs. egyenletes ref.;
                                    dx/dt = temporális abundancia-változás sebessége. Értelmezés: Ω &lt; 0.8 = alacsony stressz; 0.8–1.5 = közepes; &gt; 1.5 = magas.</li>
                            </ul>
                        </div>

                        {/* ── REFERENCES SECTION ── */}
                        <div className="mt-10 pt-6 border-t border-slate-200">
                            <h4 className="font-bold text-slate-800 uppercase tracking-wide text-sm mb-4">{t('refs_title')}</h4>
                            <div className="space-y-1.5 text-xs text-slate-600 leading-relaxed">
                                {[
                                    "Battarbee, R.W. (1986): Diatom analysis. In: Berglund, B.E. (ed.) Handbook of Holocene Palaeoecology and Palaeohydrology. Wiley, Chichester, pp. 527–570.",

                                    "Rott, E., Pipp, E., Pfister, P., Van Dam, H., Ortler, K., Binder, N. & Pall, K. (1999): Indikationslisten für Aufwuchsalgen in österreichischen Fliessgewässern. Teil 2: Trophieindikation. Bundesministerium für Land- und Forstwirtschaft, Wien.",

                                    "Van Dam, H., Mertens, A. & Sinkeldam, J. (1994): A coded checklist and ecological indicator values of freshwater diatoms from the Netherlands. Netherlands Journal of Aquatic Ecology 28(1): 117–133.",

        };

        // ============================================================
        // ============================================================
        // AUTHENTICATION – Supabase Auth (email + jelszó + kód)
        // ============================================================

        const AUTH_USERNAME_KEY = 'atlas_username';
        const AUTH_EMAIL_KEY    = 'atlas_email';

        // ════════════════════════════════════════════════════════════
        // ██████████████████  ADMIN HOZZÁFÉRÉSI KÓDOK  ██████████████
        // ════════════════════════════════════════════════════════════
        //
        //  ► A kódokat a Supabase Dashboard-on kezeld:
        //    Tábla neve: "access_codes"
        //    Oszlopok:   user_id (uuid, nullable), code (text, 6 számjegy)
        //
        //  ► Kód hozzárendelése egy felhasználóhoz:
        //    Supabase → Table Editor → access_codes → Insert row
        //    code: "123456"   user_id: (üresen hagyod)
        //
        //  ► Ha valakinek le kell tiltani a hozzáférését:
        //    Töröld ki a sorát az access_codes táblából.
        //
        //  ► Egy felhasználóhoz pontosan egy sor tartozhat.
        //    A kód 6 számjegyű legyen (pl. 472819).
        //
        // ════════════════════════════════════════════════════════════

        // ── Login / Register Screen ───────────────────────────────────────────
        const LoginScreen = ({ onAuthenticated }) => {
            const [mode, setMode]             = React.useState('login');
            const [username, setUsername]     = React.useState('');
            const [email, setEmail]           = React.useState('');
            const [password, setPassword]     = React.useState('');
            const [accessCode, setAccessCode] = React.useState('');
            const [loading, setLoading]       = React.useState(false);
            const [error, setError]           = React.useState('');
            const [showPw, setShowPw]         = React.useState(false);

            const handleSubmit = async () => {
                if (!email.trim() || !/\S+@\S+\.\S+/.test(email)) { setError('Kérjük, adjon meg érvényes e-mail címet.'); return; }
                if (password.length < 6) { setError('A jelszónak legalább 6 karakter hosszúnak kell lennie.'); return; }
                if (!/^\d{6}$/.test(accessCode)) { setError('Az azonosító kód pontosan 6 számjegyű kell legyen.'); return; }
                if (mode === 'register' && !username.trim()) { setError('Kérjük, adja meg a felhasználónevet.'); return; }

                setLoading(true); setError('');
                try {
                    if (mode === 'register') {
                        // 1. Kód ellenőrzés – létezik-e és szabad-e?
                        const { data: codeRow, error: codeErr } = await supabase
                            .from('access_codes')
                            .select('user_id, code')
                            .eq('code', accessCode)
                            .maybeSingle();
                        if (codeErr) throw codeErr;
                        if (!codeRow) { setError('Érvénytelen azonosító kód.'); setLoading(false); return; }
                        if (codeRow.user_id) { setError('Ez az azonosító kód már használatban van.'); setLoading(false); return; }

                        // 2. Supabase Auth regisztráció
                        const { data: authData, error: signUpErr } = await supabase.auth.signUp({
                            email: email.trim(),
                            password: password,
                            options: { data: { username: username.trim() } }
                        });
                        if (signUpErr) throw signUpErr;
                        const userId = authData.user?.id;
                        if (!userId) throw new Error('Regisztráció sikertelen.');

                        // 3. Kód hozzárendelése a Supabase Auth user_id-hez
                        await supabase.from('access_codes').update({ user_id: userId }).eq('code', accessCode);

                        // 4. Username mentése profiles táblába
                        await supabase.from('profiles').upsert({ id: userId, username: username.trim(), email: email.trim() });

                        localStorage.setItem(AUTH_USERNAME_KEY, username.trim());
                        localStorage.setItem(AUTH_EMAIL_KEY, email.trim());
                        onAuthenticated(userId, username.trim(), email.trim());

                    } else {
                        // 1. Supabase Auth bejelentkezés
                        const { data: authData, error: signInErr } = await supabase.auth.signInWithPassword({
                            email: email.trim(),
                            password: password
                        });
                        if (signInErr) { setError('Hibás e-mail cím vagy jelszó.'); setLoading(false); return; }
                        const userId = authData.user?.id;

                        // 2. Kód ellenőrzés – ehhez a user_id-hez tartozik-e?
                        const { data: codeRow, error: codeErr2 } = await supabase
                            .from('access_codes')
                            .select('user_id')
                            .eq('code', accessCode)
                            .maybeSingle();
                        if (codeErr2) throw codeErr2;
                        if (!codeRow || codeRow.user_id !== userId) {
                            await supabase.auth.signOut();
                            setError('Érvénytelen azonosító kód ehhez a fiókhoz.');
                            setLoading(false); return;
                        }

                        // 3. Profil lekérés – user_metadata elsőként (RLS-mentes), majd profiles tábla
                        const { data: profile } = await supabase.from('profiles').select('username, email').eq('id', userId).maybeSingle();
                        const uname = authData.user?.user_metadata?.username
                            || profile?.username
                            || email.split('@')[0];

                        // Mentjük a user_metadata-ba is, hogy újratöltéskor is elérhető legyen
                        if (!authData.user?.user_metadata?.username && profile?.username) {
                            await supabase.auth.updateUser({ data: { username: profile.username } });
                        }

                        localStorage.setItem(AUTH_USERNAME_KEY, uname);
                        localStorage.setItem(AUTH_EMAIL_KEY, email.trim());
                        onAuthenticated(userId, uname, email.trim());
                    }
                } catch (err) {
                    setError('Hiba: ' + (err.message || 'Ismeretlen hiba'));
                } finally { setLoading(false); }
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') handleSubmit(); };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="absolute inset-0 pointer-events-none" style={{opacity:0.04, backgroundImage:'linear-gradient(#06b6d4 1px,transparent 1px),linear-gradient(90deg,#06b6d4 1px,transparent 1px)', backgroundSize:'40px 40px'}}></div>
                    <div className="relative w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-cyan-500 text-slate-900 mb-4 shadow-lg" style={{boxShadow:'0 0 32px rgba(6,182,212,0.3)'}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
                                </svg>
                            </div>
                            <h1 className="text-2xl font-black text-white tracking-tight">ATLAS DIATOM</h1>
                            <p className="text-cyan-400 text-sm font-mono mt-1">— Secure Access —</p>
                        </div>
                        <div style={{display:'flex', background:'rgba(15,23,42,0.8)', borderRadius:'12px', padding:'4px', marginBottom:'20px', border:'1px solid rgba(148,163,184,0.15)'}}>
                            {[['login','Bejelentkezés'],['register','Regisztráció']].map(([m,label]) => (
                                <button key={m} onClick={() => { setMode(m); setError(''); }} style={{flex:1, padding:'10px', fontSize:'13px', fontWeight:700, border:'none', cursor:'pointer', borderRadius:'9px', transition:'all 0.2s', background: mode===m ? 'linear-gradient(135deg,#0891b2,#0e7490)' : 'transparent', color: mode===m ? 'white' : '#64748b', boxShadow: mode===m ? '0 4px 12px rgba(6,182,212,0.3)' : 'none'}}>
                                    {label}
                                </button>
                            ))}
                        </div>
                        <div className="bg-slate-800 rounded-2xl p-8" style={{border:'1px solid rgba(148,163,184,0.15)', boxShadow:'0 25px 50px rgba(0,0,0,0.5)'}}>
                            <h2 className="text-white font-bold text-lg mb-6">{mode==='login' ? 'Üdvözöljük!' : 'Új fiók létrehozása'}</h2>
                            <label className="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Felhasználónév / Cég neve</label>
                            <input type="text" autoFocus value={username}
                                onChange={e => { setUsername(e.target.value); setError(''); }}
                                onKeyDown={e => { if (e.key==='Enter') document.getElementById('atlas-email-field').focus(); }}
                                placeholder="pl. Botanika Kft."
                                className="w-full bg-slate-900 text-white rounded-lg px-4 py-3 text-sm outline-none placeholder-slate-500 transition-all mb-4"
                                style={{border:'1px solid rgba(148,163,184,0.2)'}}
                                onFocus={e => e.target.style.borderColor='#06b6d4'}
                                onBlur={e => e.target.style.borderColor='rgba(148,163,184,0.2)'}
                            />
                            <label className="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">E-mail cím</label>
                            <input id="atlas-email-field" type="email" value={email}
                                onChange={e => { setEmail(e.target.value); setError(''); }}
                                onKeyDown={e => { if (e.key==='Enter') document.getElementById('atlas-pw-input').focus(); }}
                                placeholder="nev@intezet.hu"
                                className="w-full bg-slate-900 text-white rounded-lg px-4 py-3 text-sm outline-none placeholder-slate-500 transition-all mb-4"
                                style={{border:'1px solid rgba(148,163,184,0.2)'}}
                                onFocus={e => e.target.style.borderColor='#06b6d4'}
                                onBlur={e => e.target.style.borderColor='rgba(148,163,184,0.2)'}
                            />
                            <label className="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Jelszó</label>
                            <div style={{position:'relative'}}>
                                <input id="atlas-pw-input" type={showPw ? 'text' : 'password'} value={password}
                                    onChange={e => { setPassword(e.target.value); setError(''); }}
                                    onKeyDown={e => { if (e.key==='Enter') document.getElementById('atlas-code-input').focus(); }}
                                    placeholder={mode==='register' ? 'Min. 6 karakter' : '••••••••'}
                                    className="w-full bg-slate-900 text-white rounded-lg px-4 py-3 text-sm outline-none placeholder-slate-500 transition-all"
                                    style={{border:'1px solid rgba(148,163,184,0.2)', paddingRight:'44px'}}
                                    onFocus={e => e.target.style.borderColor='#06b6d4'}
                                    onBlur={e => e.target.style.borderColor='rgba(148,163,184,0.2)'}
                                />
                                <button onClick={() => setShowPw(s=>!s)} style={{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'#64748b', padding:'4px'}}>
                                    {showPw
                                        ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                        : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    }
                                </button>
                            </div>

                            {/* ── AZONOSÍTÓ KÓD MEZŐ ── */}
                            <label className="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2 mt-4" style={{letterSpacing:'0.08em'}}>
                                <span style={{marginRight:'6px'}}>🔑</span>
                                Azonosító Kód
                                <span style={{color:'#475569', fontWeight:400, textTransform:'none', fontSize:'10px', marginLeft:'8px'}}>
                                    (6 számjegy – csak jogosult felhasználóknak)
                                </span>
                            </label>
                            <input
                                id="atlas-code-input"
                                type="text"
                                inputMode="numeric"
                                maxLength={6}
                                value={accessCode}
                                onChange={e => { const v = e.target.value.replace(/\D/g,''); setAccessCode(v); setError(''); }}
                                onKeyDown={handleKeyDown}
                                placeholder="● ● ● ● ● ●"
                                className="w-full bg-slate-900 text-white rounded-lg px-4 py-3 text-sm outline-none placeholder-slate-600 transition-all font-mono tracking-[0.5em] text-center"
                                style={{border:'1px solid rgba(6,182,212,0.35)', letterSpacing: accessCode ? '0.5em' : '0.5em'}}
                                onFocus={e => e.target.style.borderColor='#06b6d4'}
                                onBlur={e => e.target.style.borderColor='rgba(6,182,212,0.35)'}
                            />
                            {/* ── ─────────────────── ── */}

                            {error && <p className="mt-3 text-red-400 text-xs">⚠ {error}</p>}
                            <button onClick={handleSubmit} disabled={loading}
                                className="mt-6 w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg text-sm uppercase tracking-wider transition-all flex items-center justify-center gap-2"
                                style={{opacity: loading ? 0.7 : 1}}>
                                {loading
                                    ? <><span className="inline-block w-4 h-4 border-2 border-white rounded-full" style={{borderTopColor:'transparent', animation:'spin 0.8s linear infinite'}}></span> Folyamatban...</>
                                    : mode==='login' ? 'Bejelentkezés →' : 'Fiók létrehozása →'}
                            </button>
                        </div>
                        <p className="text-center text-slate-600 text-xs mt-6 font-mono">ATLAS DIATOM v8.1.3 · Advanced Eco-Stat System</p>
                    </div>
                    <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                </div>
            );
        };

        // ── UserMenu ──────────────────────────────────────────────────────────
        const UserMenu = ({ userInfo, onLogout }) => {
            const [open, setOpen]           = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('profil');
            const menuRef = React.useRef(null);
            const [samples, setSamples] = React.useState([]);

            React.useEffect(() => {
                const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            // Load sample counts from Supabase (Supabase Auth user ID alapján)
            React.useEffect(() => {
                const loadCounts = async () => {
                    try {
                        const { data: { session } } = await supabase.auth.getSession();
                        const userId = session?.user?.id;
                        if (!userId) return;
                        const { data, error } = await supabase
                            .from('Data')
                            .select('id, sample_name')
                            .eq('user_id', userId);
                        if (!error && data) setSamples(data.map(row => ({ id: row.id, site_id: row.sample_name || '' })));
                    } catch(e) { /* silent */ }
                };
                loadCounts();
            }, []);

            // Re-fetch when menu opens so counts are fresh
            React.useEffect(() => {
                if (!open) return;
                const loadCounts = async () => {
                    try {
                        const { data: { session } } = await supabase.auth.getSession();
                        const userId = session?.user?.id;
                        if (!userId) return;
                        const { data, error } = await supabase
                            .from('Data')
                            .select('id, sample_name')
                            .eq('user_id', userId);
                        if (!error && data) setSamples(data.map(row => ({ id: row.id, site_id: row.sample_name || '' })));
                    } catch(e) { /* silent */ }
                };
                loadCounts();
            }, [open]);

            const siteGroups = samples.reduce((acc, s) => { acc[s.site_id] = (acc[s.site_id]||0)+1; return acc; }, {});
            const initials = (userInfo?.username || '?').slice(0,2).toUpperCase();

            return (
                <div ref={menuRef} className="no-print" style={{position:'fixed', top:'12px', right:'12px', zIndex:9999}}>
                    <button onClick={() => setOpen(o => !o)}
                        style={{display:'flex', alignItems:'center', gap:'8px', background:'rgba(15,23,42,0.95)', border:'1px solid rgba(6,182,212,0.25)', borderRadius:'10px', padding:'6px 12px 6px 6px', cursor:'pointer', backdropFilter:'blur(8px)', transition:'all 0.2s', boxShadow:'0 4px 16px rgba(0,0,0,0.4)'}}
                        onMouseEnter={e => e.currentTarget.style.borderColor='rgba(6,182,212,0.6)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor='rgba(6,182,212,0.25)'}>
                        <div style={{width:'28px', height:'28px', borderRadius:'8px', background:'linear-gradient(135deg,#0891b2,#0e7490)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:800, color:'white', flexShrink:0}}>
                            {initials}
                        </div>
                        <span style={{color:'#e2e8f0', fontSize:'12px', fontWeight:600, maxWidth:'120px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                            {userInfo?.username || 'Felhasználó'}
                        </span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:'transform 0.2s', transform: open ? 'rotate(180deg)' : 'rotate(0deg)', flexShrink:0}}>
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    {open && (
                        <div style={{position:'absolute', top:'calc(100% + 8px)', right:0, width:'320px', background:'rgba(15,23,42,0.98)', border:'1px solid rgba(6,182,212,0.2)', borderRadius:'14px', boxShadow:'0 24px 48px rgba(0,0,0,0.6)', overflow:'hidden', backdropFilter:'blur(12px)'}}>
                            <div style={{padding:'16px 16px 0', borderBottom:'1px solid rgba(148,163,184,0.1)'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'14px'}}>
                                    <div style={{width:'42px', height:'42px', borderRadius:'12px', background:'linear-gradient(135deg,#0891b2,#0e7490)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', fontWeight:800, color:'white', flexShrink:0, boxShadow:'0 0 16px rgba(6,182,212,0.3)'}}>
                                        {initials}
                                    </div>
                                    <div style={{overflow:'hidden'}}>
                                        <div style={{color:'#f1f5f9', fontWeight:700, fontSize:'14px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{userInfo?.username || '—'}</div>
                                        <div style={{color:'#64748b', fontSize:'11px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{userInfo?.email || '—'}</div>
                                    </div>
                                </div>
                                <div style={{display:'flex', gap:'4px'}}>
                                    {['profil','mintak'].map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} style={{flex:1, padding:'7px 0', fontSize:'11px', fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase', border:'none', cursor:'pointer', borderRadius:'6px 6px 0 0', transition:'all 0.15s', background: activeTab===tab ? 'rgba(6,182,212,0.15)' : 'transparent', color: activeTab===tab ? '#22d3ee' : '#64748b', borderBottom: activeTab===tab ? '2px solid #22d3ee' : '2px solid transparent'}}>
                                            {tab==='profil' ? '👤 Profil' : `📋 Mintáim (${samples.length})`}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div style={{padding:'14px 16px', maxHeight:'260px', overflowY:'auto'}}>
                                {activeTab === 'profil' ? (
                                    <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                                        {[
                                            {icon:'🏢', label:'Felhasználónév / Cég', value: userInfo?.username},
                                            {icon:'✉️', label:'E-mail cím', value: userInfo?.email},
                                            {icon:'🧪', label:'Összes minta', value:`${samples.length} db`},
                                            {icon:'📁', label:'Víztestek száma', value:`${Object.keys(siteGroups).length} db`},
                                        ].map(row => (
                                            <div key={row.label} style={{display:'flex', alignItems:'center', gap:'10px', padding:'8px 10px', background:'rgba(30,41,59,0.6)', borderRadius:'8px', border:'1px solid rgba(148,163,184,0.08)'}}>
                                                <span style={{fontSize:'15px', width:'20px', textAlign:'center', flexShrink:0}}>{row.icon}</span>
                                                <div>
                                                    <div style={{color:'#64748b', fontSize:'10px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em'}}>{row.label}</div>
                                                    <div style={{color:'#e2e8f0', fontSize:'13px', fontWeight:500}}>{row.value||'—'}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                        {Object.keys(siteGroups).length === 0
                                            ? <p style={{color:'#475569', fontSize:'12px', textAlign:'center', padding:'20px 0'}}>Még nincsenek rögzített minták.</p>
                                            : Object.entries(siteGroups).map(([site, count]) => (
                                                <div key={site} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', background:'rgba(30,41,59,0.6)', borderRadius:'8px', border:'1px solid rgba(148,163,184,0.08)'}}>
                                                    <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                                        <span style={{fontSize:'13px'}}>🌊</span>
                                                        <span style={{color:'#cbd5e1', fontSize:'12px', fontWeight:500}}>{site}</span>
                                                    </div>
                                                    <span style={{background:'rgba(6,182,212,0.15)', color:'#22d3ee', fontSize:'10px', fontWeight:700, padding:'2px 8px', borderRadius:'20px', border:'1px solid rgba(6,182,212,0.2)'}}>{count} minta</span>
                                                </div>
                                            ))
                                        }
                                    </div>
                                )}
                            </div>
                            <div style={{padding:'10px 16px', borderTop:'1px solid rgba(148,163,184,0.1)'}}>
                                <button onClick={onLogout}
                                    style={{width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:'7px', padding:'8px', background:'rgba(127,29,29,0.25)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:'8px', color:'#fca5a5', fontSize:'12px', fontWeight:600, cursor:'pointer', transition:'all 0.15s'}}
                                    onMouseEnter={e => e.currentTarget.style.background='rgba(127,29,29,0.5)'}
                                    onMouseLeave={e => e.currentTarget.style.background='rgba(127,29,29,0.25)'}>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                    Kijelentkezés
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ── AuthWrapper ───────────────────────────────────────────────────────
        const AuthWrapper = ({ children }) => {
            const [authenticated, setAuthenticated] = React.useState(false);
            const [userInfo, setUserInfo]           = React.useState(null);
            const [checking, setChecking]           = React.useState(true);

            React.useEffect(() => {
                // Ellenőrzés: van-e aktív Supabase Auth session?
                const checkSession = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        // user_metadata elsőként – ez RLS nélkül elérhető
                        let uname = session.user.user_metadata?.username;
                        
                        // Ha nincs user_metadata-ban, próbáljuk a profiles táblából
                        if (!uname) {
                            const { data: profile } = await supabase
                                .from('profiles')
                                .select('username')
                                .eq('id', session.user.id)
                                .maybeSingle();
                            uname = profile?.username;
                            // Ha megvan, mentjük user_metadata-ba a jövőre
                            if (uname) {
                                await supabase.auth.updateUser({ data: { username: uname } });
                            }
                        }
                        
                        uname = uname || session.user.email.split('@')[0];
                        localStorage.setItem(AUTH_USERNAME_KEY, uname);
                        setUserInfo({ id: session.user.id, username: uname, email: session.user.email });
                        setAuthenticated(true);
                    }
                    setChecking(false);
                };
                checkSession();

                // Session változás figyelése (pl. token lejárat)
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    if (!session) {
                        setAuthenticated(false);
                        setUserInfo(null);
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            const handleAuthenticated = (userId, username, email) => {
                setUserInfo({ id: userId, username, email });
                setAuthenticated(true);
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                localStorage.removeItem(AUTH_USERNAME_KEY);
                localStorage.removeItem(AUTH_EMAIL_KEY);
                localStorage.removeItem('atlas_diatom_data');
                setAuthenticated(false);
                setUserInfo(null);
            };

            if (checking) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center">
                    <div className="text-cyan-400 font-mono text-sm animate-pulse">Betöltés...</div>
                </div>
            );
            if (!authenticated) return <LoginScreen onAuthenticated={handleAuthenticated} />;
            return (
                <>
                    <UserMenu userInfo={userInfo} onLogout={handleLogout} />
                    {React.cloneElement(children, { currentUserId: userInfo?.id })}
                </>
            );
        };
        // ============================================================
        // END AUTHENTICATION
        // ============================================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AuthWrapper>
                <App />
            </AuthWrapper>
        );
    </script>
</body>
</html>(
